<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="dictTitle">数据字典管理 - 可持续金融系统</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="../i18n.js"></script>
  <style>
    /* ============ Design Tokens ============ */
    :root {
      --brand-50:#E8F0FB; --brand-100:#D1DFF4; --brand-300:#6E97D6;
      --brand-500:#2A66C2; --brand-700:#143F8F; --brand-900:#01256A;
      --green-50:#ECFDF5; --green-500:#10B981; --green-700:#047857;
      --success:#10B981; --success-bg:#ECFDF5; --success-border:#A7F3D0;
      --warning:#D97706; --warning-bg:#FFFBEB;
      --danger:#DC2626;  --danger-bg:#FEF2F2;
      --info:#2A66C2;    --info-bg:#E8F0FB;
      --ink-900:#0F172A; --ink-800:#1E293B; --ink-600:#475569;
      --ink-500:#64748B; --ink-400:#94A3B8; --ink-300:#CBD5E1;
      --line-200:#E2E8F0; --bg-muted:#F1F5F9; --bg-subtle:#F8FAFC;
      --white:#FFFFFF;
      --radius-sm:4px; --radius-md:6px; --radius-lg:8px;
      --radius-xl:12px; --radius-2xl:16px;
      --shadow-sm:0 1px 3px rgba(15,23,42,.06),0 1px 2px rgba(15,23,42,.04);
      --font-sans:"PingFang SC","Microsoft YaHei","Inter",system-ui,sans-serif;
      --font-mono:"JetBrains Mono","SF Mono",Menlo,Consolas,monospace;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font-sans);color:var(--ink-800);background:var(--bg-subtle);font-size:14px;line-height:1.57}
    .main-content{padding:20px;display:flex;flex-direction:column;gap:14px;}

    .card{background:var(--white);border:1px solid var(--line-200);border-radius:var(--radius-xl);overflow:hidden;box-shadow:var(--shadow-sm)}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border-radius:var(--radius-md);font-family:inherit;font-weight:500;cursor:pointer;transition:all .15s;border:1px solid transparent;line-height:1;white-space:nowrap}
    .btn-sm{padding:6px 12px;font-size:12px;line-height:20px;min-height:28px}
    .btn-md{padding:8px 16px;font-size:14px;line-height:22px;min-height:32px}
    .btn-primary{background:var(--brand-500);color:#fff}
    .btn-primary:hover{background:var(--brand-700)}
    .btn-secondary{background:var(--white);color:var(--ink-800);border-color:var(--ink-300)}
    .btn-secondary:hover{border-color:var(--brand-500);color:var(--brand-500)}
    .btn-ghost{background:transparent;color:var(--brand-500)}
    .btn-ghost:hover{background:var(--brand-50)}
    .btn-danger{background:var(--danger);color:#fff}
    .btn-danger:hover{background:#b91c1c}
    .btn-danger-ghost{background:transparent;color:var(--danger);border:1px solid var(--danger);padding:8px 16px}
    .btn-danger-ghost:hover{background:var(--danger-bg)}
    .btn svg{width:14px;height:14px;stroke-width:1.75}
    .input,.select-native{width:100%;padding:5px 12px;height:32px;font-family:inherit;font-size:14px;line-height:22px;color:var(--ink-900);background:var(--white);border:1px solid var(--ink-300);border-radius:var(--radius-md);transition:all .15s;outline:none}
    .input:focus,.select-native:focus{border-color:var(--brand-500);box-shadow:0 0 0 3px rgba(42,102,194,.12)}
    .input[readonly]{background:var(--bg-muted);color:var(--ink-500);cursor:default}
    .tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:var(--radius-sm);font-size:12px;font-weight:500;border:1px solid transparent;white-space:nowrap}
    .tag-success{background:var(--success-bg);color:var(--green-700);border-color:#A7F3D0}
    .tag-brand{background:var(--brand-50);color:var(--brand-700);border-color:var(--brand-100)}
    .tag-warning{background:var(--warning-bg);color:var(--warning);border-color:#FDE68A}
    .status-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:6px}
    .status-dot.success{background:var(--success)}
    .status-dot.disabled{background:var(--ink-400)}
    .checkbox-label{display:inline-flex;align-items:center;gap:6px;cursor:pointer;white-space:nowrap}
    .checkbox-label input{width:16px;height:16px;cursor:pointer}
    .pagination{display:flex;align-items:center;gap:12px;padding:12px 20px;border-top:1px solid var(--line-200);background:var(--white);font-size:14px}
    .pagination-controls{margin-left:auto;display:flex;gap:4px;align-items:center}
    .page-btn{min-width:32px;height:32px;padding:0 8px;border:1px solid var(--line-200);background:var(--white);border-radius:var(--radius-md);font-size:14px;color:var(--ink-800);cursor:pointer;display:inline-flex;align-items:center;justify-content:center}
    .page-btn.active{background:var(--brand-500);border-color:var(--brand-500);color:#fff}
    .page-btn:disabled{color:var(--ink-300);cursor:not-allowed}

    /* 表格容器 */
    .table-wrapper{overflow-x:auto;position:relative}

    /* 树形表格 */
    .dict-table{width:100%;border-collapse:collapse;table-layout:fixed;min-width:1100px}
    .dict-table th{text-align:left;padding:12px 12px;background:var(--bg-subtle);color:var(--ink-600);font-weight:500;font-size:12px;border-bottom:1px solid var(--line-200);white-space:nowrap}
    .dict-table td{padding:12px 12px;border-bottom:1px solid var(--line-200);vertical-align:middle;white-space:nowrap;height:52px}
    .dict-table tr:last-child td{border-bottom:none}
    .dict-table tr:hover{background:var(--bg-subtle)}

    /* 列宽定义 - 调整确保状态和操作不重叠 */
    .dict-table th:nth-child(1),.dict-table td:nth-child(1){width:36px;text-align:center}
    .dict-table th:nth-child(2),.dict-table td:nth-child(2){width:22%}
    .dict-table th:nth-child(3),.dict-table td:nth-child(3){width:10%}
    .dict-table th:nth-child(4),.dict-table td:nth-child(4){width:20%}
    .dict-table th:nth-child(5),.dict-table td:nth-child(5){width:12%}
    .dict-table th:nth-child(6),.dict-table td:nth-child(6){width:7%}
    .dict-table th:nth-child(7),.dict-table td:nth-child(7){width:9%}
    .dict-table th:nth-child(8),.dict-table td:nth-child(8){width:14%}

    /* 描述单元格 - 悬浮提示 */
    .desc-cell{max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;display:block}
    .desc-cell:hover{color:var(--brand-500)}
    .desc-cell[data-fulltext]:hover::after{content:attr(data-fulltext);position:absolute;left:0;top:100%;background:var(--ink-900);color:#fff;padding:6px 12px;border-radius:var(--radius-md);font-size:12px;white-space:normal;word-break:break-word;max-width:350px;z-index:1000;box-shadow:var(--shadow-md);margin-top:4px}

    .tree-toggle{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;cursor:pointer;color:var(--ink-500);border-radius:var(--radius-sm);margin-right:4px;flex-shrink:0}
    .tree-toggle:hover{background:var(--bg-muted);color:var(--brand-500)}
    .tree-toggle svg{width:12px;height:12px;transition:transform .2s}
    .depth-0{padding-left:0}
    .depth-1{padding-left:24px}
    .depth-2{padding-left:48px}
    .depth-3{padding-left:72px}
    .depth-4{padding-left:96px}
    .depth-5{padding-left:120px}
    .dict-name{font-weight:500;color:var(--ink-900);white-space:nowrap}
    .dict-code{font-family:var(--font-mono);font-size:12px;color:var(--ink-500);background:var(--bg-muted);padding:2px 8px;border-radius:4px;display:inline-block;white-space:nowrap}
    .action-btns{display:flex;gap:4px;justify-content:flex-start;flex-wrap:nowrap}
    .action-btns .btn-sm{padding:4px 8px;font-size:11px}
    .toolbar{display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:1px solid var(--line-200);background:var(--white);flex-wrap:wrap}
    .toolbar-left{display:flex;gap:8px;align-items:center}
    .toolbar-right{margin-left:auto;display:flex;gap:8px;align-items:center}
    .copy-icon{cursor:pointer;color:var(--ink-400);margin-left:4px;opacity:0.6;transition:opacity 0.15s}
    .copy-icon:hover{opacity:1;color:var(--brand-500)}

    /* 模态框样式 */
    .modal-mask{position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:1500;display:none;align-items:center;justify-content:center;padding:16px}
    .modal-mask.open{display:flex}
    .modal{background:var(--white);border-radius:var(--radius-2xl);box-shadow:0 20px 40px rgba(15,23,42,.16);width:100%;max-width:600px;overflow:hidden}
    .modal-head{display:flex;align-items:center;padding:16px 24px;border-bottom:1px solid var(--line-200)}
    .modal-title{font-size:16px;font-weight:600;color:var(--ink-900)}
    .modal-close{margin-left:auto;background:none;border:none;cursor:pointer;color:var(--ink-500);padding:4px}
    .modal-body{padding:24px;max-height:70vh;overflow-y:auto}
    .modal-foot{display:flex;justify-content:flex-end;gap:12px;padding:12px 24px;border-top:1px solid var(--line-200);background:var(--bg-subtle)}
    .form-field{margin-bottom:16px}
    .form-label{font-size:14px;color:var(--ink-800);font-weight:500;margin-bottom:6px;display:block}
    .form-label .req{color:var(--danger);margin-right:4px}
    .radio-group{display:flex;gap:24px}
    .radio{display:inline-flex;align-items:center;gap:8px;cursor:pointer}
    .radio input{appearance:none;width:16px;height:16px;border:1.5px solid var(--ink-300);border-radius:50%}
    .radio input:checked{border-color:var(--brand-500);border-width:5px}
    .row-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .flex-between{display:flex;justify-content:space-between;align-items:center}
    .text-center{text-align:center}
    .py-8{padding-top:32px;padding-bottom:32px}
    .upload-zone{border:2px dashed var(--ink-300);border-radius:var(--radius-lg);padding:24px;text-align:center;cursor:pointer;transition:all .15s}
    .upload-zone:hover{border-color:var(--brand-500);background:var(--brand-50)}
    .mt-1{margin-top:4px}
    .mb-2{margin-bottom:8px}
  </style>
</head>
<body class="bg-slate-50">

  <main class="main-content">

  <!-- 筛选栏 -->
  <div class="card mb-4">
    <div class="p-4" style="border-bottom:none;background:var(--white)">
      <div class="grid grid-cols-4 gap-4">
        <div class="flex items-center gap-2">
          <label class="text-sm text-slate-600 min-w-[80px]" style="text-align:right" data-i18n="dictName">字典名称</label>
          <input type="text" class="input flex-1" id="searchName" data-i18n-placeholder="dictNamePlaceholder" placeholder="请输入字典名称">
        </div>
        <div class="flex items-center gap-2">
          <label class="text-sm text-slate-600 min-w-[80px]" style="text-align:right" data-i18n="dictCategory">字典分类</label>
          <select class="select-native flex-1" id="searchCategory">
            <option value="" data-i18n="all">全部</option>
            <option value="情景" data-i18n="scenario">情景</option>
            <option value="风险因子" data-i18n="riskFactor">风险因子</option>
            <option value="业务维护" data-i18n="businessMaintenance">业务维护</option>
          </select>
        </div>
        <div class="flex items-center gap-2">
          <label class="text-sm text-slate-600 min-w-[80px]" style="text-align:right" data-i18n="dictCode">字典编码</label>
          <input type="text" class="input flex-1" id="searchCode" data-i18n-placeholder="dictCodePlaceholder" placeholder="请输入字典编码">
        </div>
        <div class="flex items-center gap-2">
          <label class="text-sm text-slate-600 min-w-[80px]" style="text-align:right" data-i18n="status">状态</label>
          <select class="select-native flex-1" id="searchStatus">
            <option value="" data-i18n="all">全部</option>
            <option value="1" data-i18n="enabled">启用</option>
            <option value="0" data-i18n="disabled">禁用</option>
          </select>
        </div>
      </div>
      <div class="flex justify-end gap-2 mt-4">
        <button class="btn btn-secondary btn-md" onclick="resetSearch()" data-i18n="reset">重置</button>
        <button class="btn btn-primary btn-md" onclick="searchDict()" data-i18n="search">查询</button>
      </div>
    </div>
  </div>

  <!-- 字典树形表格 -->
  <div class="card">
    <div class="toolbar">
      <div class="toolbar-left">
        <button class="btn btn-primary btn-md" onclick="openDictModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span data-i18n="create">新建</span>
        </button>
        <button class="btn btn-secondary btn-md" onclick="openImportModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          <span data-i18n="batchImport">批量导入</span>
        </button>
        <button class="btn btn-secondary btn-md" onclick="exportDictData()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          <span data-i18n="batchExport">批量导出</span>
        </button>
        <button class="btn btn-danger btn-md" id="batchDeleteBtn" onclick="batchDelete()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          <span data-i18n="batchDelete">批量删除</span>
        </button>
      </div>
      <div class="toolbar-right">
        <label class="checkbox-label"><input type="checkbox" id="selectAllCheckbox" onchange="toggleSelectAll()"> <span class="text-sm text-slate-600" data-i18n="selectAll">全选</span></label>
        <span class="text-sm text-slate-500" id="selectedCount" data-i18n="selected">已选 0 项</span>
      </div>
    </div>
    <div class="table-wrapper">
      <table class="dict-table" id="dictTable">
        <thead>
          <tr>
            <th style="text-align:center"><input type="checkbox" id="headerSelectAll" onchange="toggleSelectAll()"></th>
            <th data-i18n="dictNameHeader">字典名称</th>
            <th data-i18n="dictCategoryHeader">字典分类</th>
            <th data-i18n="description">描述</th>
            <th data-i18n="dictCodeHeader">字典编码</th>
            <th data-i18n="sort">排序</th>
            <th data-i18n="statusHeader">状态</th>
            <th data-i18n="operations">操作</th>
          </tr>
        </thead>
        <tbody id="dictTreeBody">
          <tr><td colspan="8" class="text-center py-8 text-slate-400" data-i18n="loading">加载数据中...</td></tr>
        </tbody>
      </table>
    </div>
    <div class="pagination">
      <div class="pagination-info"><span data-i18n="totalRecordsPrefix">共 </span><strong id="totalCount">0</strong><span data-i18n="totalRecordsSuffix"> 条记录</span></div>
      <div class="pagination-controls" id="paginationControls"></div>
    </div>
  </div>

<!-- 新增/编辑字典模态框 -->
<div class="modal-mask" id="dictModal">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="modalTitle" data-i18n="createDictItem">新建字典项</div>
      <button class="modal-close" onclick="closeDictModal()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    </div>
    <div class="modal-body">
      <form id="dictForm" onsubmit="return false">
        <input type="hidden" id="dictId" value="">
        <div class="form-field">
          <label class="form-label" data-i18n="parentDict"><span class="req">*</span>上级字典</label>
          <select class="select-native" id="parentDictId">
            <option value="" data-i18n="topLevelDict">— 顶级字典 —</option>
          </select>
          <div class="text-xs text-slate-400 mt-1" data-i18n="maxDepth5">最多支持5级深度</div>
        </div>
        <div class="row-2">
          <div class="form-field">
            <label class="form-label" data-i18n="dictNameReq"><span class="req">*</span>字典名称</label>
            <input class="input" id="dictName" data-i18n-placeholder="dictNamePlaceholder" placeholder="请输入字典名称">
          </div>
          <div class="form-field">
            <label class="form-label" data-i18n="dictCode">字典编码</label>
            <div class="flex items-center gap-2">
              <input class="input flex-1" id="dictCode" readonly data-i18n-placeholder="dictCodeAuto" placeholder="系统自动生成" style="background:var(--bg-muted)">
              <span class="copy-icon" onclick="copyToClipboard('dictCode')" data-i18n-title="copyCode" title="复制编码"><svg width="16" height="16" viewBox="0 0 16 16" style="vertical-align:middle"><rect x="2" y="2" width="12" height="12" rx="2" stroke="currentColor" fill="none" stroke-width="1.3"/><line x1="5" y1="6" x2="11" y2="6" stroke="currentColor" stroke-width="1.3"/><line x1="5" y1="9" x2="11" y2="9" stroke="currentColor" stroke-width="1.3"/></svg></span>
            </div>
            <div class="text-xs text-slate-400 mt-1" data-i18n="codeAutoGenNote">编码由系统自动生成，不可编辑</div>
          </div>
        </div>
        <div class="form-field">
          <label class="form-label" data-i18n="dictCategoryReq"><span class="req">*</span>字典分类</label>
          <select class="select-native" id="dictCategory">
            <option value="情景" data-i18n="scenario">情景</option>
            <option value="风险因子" data-i18n="riskFactor">风险因子</option>
            <option value="业务维护" data-i18n="businessMaintenance">业务维护</option>
          </select>
        </div>
        <div class="form-field">
          <label class="form-label" data-i18n="sortOrder">排序号</label>
          <input type="number" class="input" id="sortOrder" value="0">
        </div>
        <div class="form-field">
          <label class="form-label" data-i18n="description">描述</label>
          <textarea class="textarea" id="description" rows="3" data-i18n-placeholder="descriptionPlaceholder" placeholder="详细描述该字典项的含义、用途等"></textarea>
        </div>
        <div class="form-field">
          <label class="form-label" data-i18n="status">状态</label>
          <div class="radio-group">
            <label class="radio"><input type="radio" name="status" value="1" checked> <span data-i18n="enabled">启用</span></label>
            <label class="radio"><input type="radio" name="status" value="0"> <span data-i18n="disabled">禁用</span></label>
          </div>
        </div>
      </form>
    </div>
    <div class="modal-foot">
      <button class="btn btn-secondary btn-md" onclick="closeDictModal()" data-i18n="cancel">取消</button>
      <button class="btn btn-primary btn-md" onclick="saveDict()" data-i18n="save">保存</button>
    </div>
  </div>
</div>

<!-- 批量导入模态框 -->
<div class="modal-mask" id="importModal">
  <div class="modal" style="max-width:700px">
    <div class="modal-head">
      <div class="modal-title" data-i18n="batchImportDict">批量导入字典</div>
      <button class="modal-close" onclick="closeImportModal()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="mb-4">
        <div class="flex-between mb-2">
          <span class="font-medium text-slate-700" data-i18n="templateDownload">模板下载</span>
          <button class="btn btn-ghost btn-sm" onclick="downloadTemplate()" data-i18n="downloadTemplateBtn">下载导入模板.xlsx</button>
        </div>
        <div class="text-xs text-slate-500 mb-3" data-i18n="templateFields">模板字段：名称、父级编码(可选)、分类、排序、状态(1启用/0禁用)、描述。编码自动生成</div>
      </div>
      <div class="upload-zone" id="uploadZone" onclick="document.getElementById('excelFile').click()">
        <svg class="w-8 h-8 text-slate-400 mx-auto mb-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M12 18v-4"/><path d="M9 14l3-4 3 4"/></svg>
        <p class="text-sm text-slate-600" data-i18n="clickOrDrag">点击或拖拽文件至此区域</p>
        <p class="text-xs text-slate-400 mt-1" data-i18n="supportFormats">支持 .xlsx, .xls 格式</p>
        <input type="file" id="excelFile" accept=".xlsx,.xls" style="display:none" onchange="handleFileImport(this.files)">
      </div>
      <div id="importPreview" class="mt-4" style="display:none">
        <div class="flex-between items-center mb-2">
          <span class="font-medium" data-i18n="importPreview">导入预览</span>
          <button class="btn btn-primary btn-sm" onclick="confirmImport()" data-i18n="confirmImport">确认导入</button>
        </div>
