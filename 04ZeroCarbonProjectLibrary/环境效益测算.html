<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="pageTitle">环境效益测算 · 潜在项目库</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --brand-50: #E8F0FB; --brand-100: #D1DFF4; --brand-300: #6E97D6;
            --brand-500: #2A66C2; --brand-700: #143F8F; --brand-900: #01256A;
            --green-50: #ECFDF5; --green-500: #10B981; --green-700: #047857;
            --success: #10B981; --success-bg: #ECFDF5; --success-border: #A7F3D0;
            --warning: #D97706; --warning-bg: #FFFBEB; --warning-border: #FDE68A;
            --danger: #DC2626; --danger-bg: #FEF2F2; --danger-border: #FECACA;
            --info: #2A66C2; --info-bg: #E8F0FB; --info-border: #D1DFF4;
            --ink-900: #0F172A; --ink-800: #1E293B; --ink-600: #475569;
            --ink-500: #64748B; --ink-400: #94A3B8; --ink-300: #CBD5E1;
            --line-200: #E2E8F0; --bg-muted: #F1F5F9; --bg-subtle: #F8FAFC;
            --white: #FFFFFF; --radius-sm: 4px; --radius-md: 6px;
            --radius-lg: 8px; --radius-xl: 12px; --radius-2xl: 16px;
            --font-sans: 'PingFang SC','Microsoft YaHei','Inter',system-ui,sans-serif;
            --font-num: 'Inter','SF Pro Display',system-ui,sans-serif;
        }
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:var(--font-sans);color:var(--ink-800);background:var(--bg-subtle);font-size:14px;line-height:1.57;-webkit-font-smoothing:antialiased;height:100vh;overflow:hidden}
        .custom-scroll::-webkit-scrollbar{width:6px;height:6px}
        .custom-scroll::-webkit-scrollbar-track{background:transparent}
        .custom-scroll::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
        .custom-scroll::-webkit-scrollbar-thumb:hover{background:var(--brand-500)}
        .btn{display:inline-flex;align-items:center;gap:6px;border-radius:var(--radius-md);font-family:inherit;font-weight:500;cursor:pointer;transition:all .15s;border:1px solid transparent;line-height:1;white-space:nowrap}
        .btn-sm{padding:6px 12px;font-size:12px;line-height:20px;height:28px}
        .btn-md{padding:8px 16px;font-size:14px;line-height:22px;height:32px}
        .btn-primary{background:var(--brand-500);color:#fff}
        .btn-primary:hover{background:var(--brand-700)}
        .btn-secondary{background:var(--white);color:var(--ink-800);border-color:var(--ink-300)}
        .btn-secondary:hover{border-color:var(--brand-500);color:var(--brand-500)}
        .btn-outline-brand{background:var(--white);color:var(--brand-500);border-color:#A3C2E8}
        .btn-outline-brand:hover{background:var(--brand-50);border-color:var(--brand-500)}
        .stat-card{background:var(--white);border-radius:var(--radius-md);border:1px solid var(--line-200);padding:6px 12px;display:flex;flex-direction:column;gap:1px;min-width:110px}
        .stat-card .stat-value{font-size:18px;font-weight:700;font-family:var(--font-num)}
        .stat-card .stat-label{font-size:11px;color:var(--ink-500)}
        .section-card{background:var(--white);border-radius:var(--radius-xl);border:1px solid var(--line-200);overflow:hidden;margin-bottom:16px}
        .section-card .card-head{padding:14px 24px;border-bottom:1px solid var(--line-200);background:var(--bg-subtle);font-weight:600;color:var(--ink-900);font-size:15px;display:flex;align-items:center;justify-content:space-between}
        .section-card .card-body{padding:16px 24px}
        .table-wrap{overflow:auto;position:relative}
        .table-wrap table{width:100%;border-collapse:separate;border-spacing:0;font-size:13px;min-width:2200px}
        .table-wrap thead{position:sticky;top:0;z-index:10}
        .table-wrap th{background:var(--bg-muted);padding:10px 14px;text-align:left;font-weight:600;color:var(--ink-600);border-bottom:1px solid var(--line-200);white-space:nowrap;font-size:12px;text-transform:uppercase;letter-spacing:.3px}
        .table-wrap td{padding:10px 14px;border-bottom:1px solid var(--line-200);vertical-align:middle;white-space:nowrap}
        .table-wrap tbody tr:hover{background:var(--bg-subtle)}
        .table-wrap .col-seq{width:50px;text-align:center;color:var(--ink-400)}
        .table-wrap .col-actions{position:sticky;right:0;background:var(--white);z-index:5;min-width:120px;box-shadow:-4px 0 12px rgba(0,0,0,0.06)}
        .table-wrap thead .col-actions{background:var(--bg-muted);z-index:11}
        .table-wrap tbody tr:hover .col-actions{background:var(--bg-subtle)}
        .table-wrap .col-approval{position:sticky;right:120px;background:var(--white);z-index:5;box-shadow:-4px 0 8px rgba(0,0,0,0.04)}
        .table-wrap thead .col-approval{background:var(--bg-muted);z-index:10}
        .table-wrap tbody tr:hover .col-approval{background:var(--bg-subtle)}
        .filter-row{display:flex;flex-wrap:wrap;align-items:center;gap:8px 20px}
        .filter-group-inline{display:flex;align-items:center;gap:6px;white-space:nowrap}
        .filter-group-inline label{font-size:12px;color:var(--ink-500);font-weight:500;white-space:nowrap}
        .filter-group-inline input,.filter-group-inline select{padding:6px 10px;border:1px solid var(--line-200);border-radius:var(--radius-md);font-size:13px;background:var(--white);outline:none;height:32px;width:160px}
        .filter-group-inline input:focus,.filter-group-inline select:focus{border-color:var(--brand-500)}
        .filter-group-inline input.wide{width:220px}
        .filter-group-inline select.wide{width:200px}
        .filter-group-inline .date-range{display:flex;align-items:center;gap:4px}
        .filter-group-inline .date-range input{width:120px}
    </style>
    <script src="../i18n.js"></script>
</head>
<body>
<div class="flex flex-col" style="height:100vh;background:var(--bg-subtle);">
    <div class="flex-1 overflow-y-auto custom-scroll" style="padding:12px 24px 24px 24px;">

        <!-- 统计卡片区 -->
        <div class="section-card" style="border:none;">
            <div class="card-body" style="padding:12px 16px;">
                <div style="font-size:14px;font-weight:600;color:var(--ink-800);margin-bottom:6px;" data-i18n="stat_title">绿色信贷环境效益统计</div>
                <div id="statCardsGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:6px;">
                </div>
            </div>
        </div>

        <!-- 筛选条件区 -->
        <div class="section-card">
            <!-- 筛选栏 -->
            <div style="padding:16px 24px;border-bottom:1px solid var(--line-200);background:var(--bg-subtle);flex-shrink:0;">
                <!-- 筛选条件：flex-wrap 自动换行 -->
                <div style="display:flex;flex-wrap:wrap;gap:12px 16px;align-items:flex-end;">
                    <div class="filter-group-inline"><label data-i18n="filter_client">客户信息：</label><input type="text" class="wide" data-i18n-placeholder="placeholder_client"></div>
                    <div class="filter-group-inline"><label data-i18n="filter_approval">审批状态：</label><select id="selApproval"><option data-i18n="all_status">全部状态</option></select></div>
                    <div class="filter-group-inline"><label data-i18n="filter_industry">国民经济行业分类：</label><select class="wide" id="selIndustry"><option data-i18n="all_industries">全部行业</option></select></div>
                    <div class="filter-group-inline"><label data-i18n="filter_branch">所属支行机构：</label><select id="selBranch"><option data-i18n="all_branches">全部机构</option></select></div>
                    <span id="filterExpandRows" style="display:none;">
                        <div class="filter-group-inline"><label data-i18n="filter_gf_cat">绿色金融分类(2025)：</label><select class="wide" id="selGfCat"><option data-i18n="all_categories">全部分类</option></select></div>
                        <div class="filter-group-inline"><label data-i18n="filter_manager">主办经理：</label><input type="text" data-i18n-placeholder="placeholder_manager"></div>
                        <div class="filter-group-inline"><label data-i18n="filter_project">项目信息：</label><input type="text" class="wide" data-i18n-placeholder="placeholder_project"></div>
                        <div class="filter-group-inline"><label data-i18n="filter_date">数据日期：</label><div class="date-range"><input type="date" value="2015-10-02"><span>~</span><input type="date" value="2015-10-10"></div></div>
                    </span>
                </div>
                <!-- 按钮区：右下角 -->
                <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:12px;">
                    <button id="filterToggleBtn" class="btn btn-secondary btn-sm" onclick="toggleFilter()" style="padding:6px 8px;">▼</button>
                    <button class="btn btn-primary btn-sm" data-i18n="search">查询</button>
                    <button class="btn btn-secondary btn-sm" data-i18n="reset">重置</button>
                </div>
            </div>
            <!-- 操作栏：导出数据在左 -->
            <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 24px;border-bottom:1px solid var(--line-200);flex-shrink:0;">
                <div style="display:flex;gap:8px;">
                    <button class="btn btn-secondary btn-sm" onclick="alert(I18N.t('download_ok'))">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" style="width:14px;height:14px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        <span data-i18n="export">导出数据</span>
                    </button>
                </div>
                <span style="font-size:14px;color:var(--ink-400);">共 1,126 条</span>
            </div>
        </div>

        <!-- 测算任务列表 -->
        <div class="section-card">
            <div class="card-body" style="padding:0;">
                <div class="table-wrap custom-scroll" style="max-height:450px;">
                    <table>
                        <thead>
                            <tr>
                                <th class="col-seq" data-i18n="th_seq">序号</th>
                                <th data-i18n="th_project_code">项目代码</th>
                                <th data-i18n="th_bank_code">本行项目编号</th>
                                <th data-i18n="th_project_name">项目名称</th>
                                <th data-i18n="th_industry">项目所属行业</th>
                                <th data-i18n="th_investment">项目总投资额（万元）</th>
                                <th data-i18n="th_location">项目所在地</th>
                                <th data-i18n="th_client_name">客户名称</th>
                                <th data-i18n="th_credit_code">统一社会信用代码</th>
                                <th data-i18n="th_client_industry">客户国民经济行业</th>
                                <th data-i18n="th_gf_cat">绿色金融分类(2025)</th>
                                <th data-i18n="th_host_branch">主办机构</th>
                                <th data-i18n="th_region">管理辖区</th>
                                <th data-i18n="th_manager">主办经理</th>
                                <th data-i18n="th_task_node">当前任务节点</th>
                                <th data-i18n="th_calc_status">测算状态</th>
                                <th class="col-approval" data-i18n="th_approval">审批状态</th>
                                <th data-i18n="th_update">最近更新时间</th>
                                <th data-i18n="th_create">创建时间</th>
                                <th class="col-actions" data-i18n="th_actions">操作</th>
                            </tr>
                        </thead>
                        <tbody id="projectTableBody">
                        </tbody>
                    </table>
                </div>
            </div>
            <!-- 分页 -->
            <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 24px;border-top:1px solid var(--line-200);" id="paginationBar">
                <span style="font-size:13px;color:var(--ink-400);" id="totalCount">共 1,126 条</span>
                <div style="display:flex;align-items:center;gap:8px;">
                    <span style="font-size:13px;color:var(--ink-500);" data-i18n="per_page">20条/页</span>
                    <button class="btn btn-secondary btn-sm">‹</button>
                    <span style="padding:2px 8px;font-size:13px;background:var(--brand-500);color:white;border-radius:4px;">1</span>
                    <button class="btn btn-secondary btn-sm">2</button>
                    <button class="btn btn-secondary btn-sm">3</button>
                    <span style="font-size:13px;color:var(--ink-400);">…</span>
                    <button class="btn btn-secondary btn-sm">50</button>
                    <button class="btn btn-secondary btn-sm">›</button>
                    <span style="font-size:13px;color:var(--ink-500);" id="pageJumper"><span id="pageJumperText">11/50<span data-i18n="page">页</span></span> <span data-i18n="jump_to">跳至</span> <input type="number" style="width:48px;padding:2px 6px;border:1px solid var(--line-200);border-radius:4px;text-align:center;" value="1"> <span data-i18n="page">页</span></span>
                </div>
            </div>
        </div>
    </div>
</div>

    function formatT(key, replacements){
        var result = I18N.t(key);
        if(replacements){

                result = result.replace('{'+i+'}', replacements[i]);
            }

        return result;
    }

    // ==================== 筛选下拉框 ====================
    function populateFilters(){

        var gfCatOptions = ['1.1.1节能锅炉制造','3.2.1节能技术改造','5.1.1.1超低能耗建筑建设','5.1.1资源循环利用'];

        // Industry select: first option is "all_industries", then data options (data is actual names, not i18n)

        for(var j=0; j<industryOptions.length; j++){
            var opt = document.createElement('option');
            opt.textContent = industryOptions[j];

        var selBr = document.getElementById('selBranch');
        for(var k=0; k<branchOptions.length; k++){
            var opt2 = document.createElement('option');
            opt2.textContent = branchOptions[k];
            selBr.appendChild(opt2);
        }
        // Approval - i18n keys
        var selApp = document.getElementById('selApproval');

    function refreshApprovalOptions(){
        var selApp = document.getElementById('selApproval');
        var appKeys = ['pending_approval','approved','rejected','not_submitted'];
        // Skip first option (全部状态)
        var opts = selApp.querySelectorAll('option');
        for(var i=1; i<opts.length; i++){
            if(appKeys[i-1]) opts[i].textContent = I18N.t(appKeys[i-1]);
        }
    }

    var filterExpanded=false;

        var rows=document.getElementById('filterExpandRows');
        var btn=document.getElementById('filterToggleBtn');
        if(filterExpanded){
            rows.style.display='none';
            btn.innerHTML='▼';
            filterExpanded=false;
        }else{
            rows.style.display='contents';
            btn.innerHTML='▲';
            filterExpanded=true;
        }
    }
    function updateToggleBtn(){
        var btn=document.getElementById('filterToggleBtn');
        if(filterExpanded){
            btn.innerHTML = I18N.t('collapse');
        }else{
            btn.innerHTML = I18N.t('expand');
        }
    }

    // ==================== 业务函数 ====================
    function getCurrentDir(){var p=window.location.pathname;return p.substring(0,p.lastIndexOf('/')+1)}
    function goToDetail(mode){
        var dir=getCurrentDir();
        var targetUrl;
        if (mode === 'approve') {
            // 审核员 → 审批页
            targetUrl = dir + '环境效益测算审批.html';
        } else if (mode === 'view') {
            // 查看详情 → 查看页
            targetUrl = dir + '环境效益测算查看.html';
        } else {
            // 'edit'/'calc' — 客户经理测算填报/重新测算
            targetUrl = dir + '环境效益测算填报.html';
        }
        if(window.parent!==window){
            var pageId='env-detail-'+Date.now()+'-'+Math.random().toString(36).substr(2,6);
            var label=mode==='view' ? I18N.t('view_detail') : I18N.t('go_process');
            window.parent.postMessage({type:'openPage',pageId:pageId,file:targetUrl,label:label},'*');
        }else{window.location.href=targetUrl}
    }

    // ==================== 环境效益测算 — 完整角色权限矩阵 ====================
    var currentRole = '客户经理';

    function nodeMatches(nodeText, roleKeyword) {
        if (!nodeText) return false;
        return nodeText.indexOf(roleKeyword) !== -1;
    }

    function buildActionButtons(row) {
        var appr = row.getAttribute('data-approval') || '';
        var node = row.getAttribute('data-node') || '';
        var projectId = row.getAttribute('data-project-id') || '';
        var container = row.querySelector('.col-actions .action-btns');
        if (!container) return;
        container.innerHTML = '';

        var btns = [];

        // ---- 公司客户经理（主办经理） ----
        if (currentRole === '客户经理') {
            if (appr === '未提交') {
                btns.push({label:'去测算', cls:'btn btn-primary btn-sm', action:'edit'});
            } else if (appr === '审批中') {
                btns.push({label:'查看详情', cls:'btn btn-outline-brand btn-sm', action:'view'});
            } else if (appr === '已驳回') {
                btns.push({label:'重新测算', cls:'btn btn-primary btn-sm', action:'edit'});
            } else if (appr === '已完成') {
                btns.push({label:'查看详情', cls:'btn btn-outline-brand btn-sm', action:'view'});
            }
        }
        // ---- 公司绿金联系人 ----
        else if (currentRole === '公司绿金联系人') {
            if (appr === '审批中' && nodeMatches(node, '绿金联系人')) {
                btns.push({label:'去处理', cls:'btn btn-primary btn-sm', action:'approve'});
            } else if (appr === '已完成') {
                btns.push({label:'查看详情', cls:'btn btn-outline-brand btn-sm', action:'view'});
            }
            // 未提交/已驳回/审批中非当前节点 → —
        }
        // ---- 总行公司初审 ----
        else if (currentRole === '总行公司初审') {
            if (appr === '审批中' && nodeMatches(node, '总行初审')) {
                btns.push({label:'去处理', cls:'btn btn-primary btn-sm', action:'approve'});
            } else if (appr === '已完成') {
                btns.push({label:'查看详情', cls:'btn btn-outline-brand btn-sm', action:'view'});
            }
            // 未提交/已驳回/审批中非当前节点 → —
        }
        // ---- 总行公司复核 ----
        else if (currentRole === '总行公司复核') {
            if (appr === '审批中' && nodeMatches(node, '总行复核')) {
                btns.push({label:'去处理', cls:'btn btn-primary btn-sm', action:'approve'});
            } else if (appr === '已完成') {
                btns.push({label:'查看详情', cls:'btn btn-outline-brand btn-sm', action:'view'});
            }
            // 未提交/已驳回/审批中非当前节点 → —
        }
        // ---- 总行管理员（仅查看） ----
        else if (currentRole === '总行管理员') {
            if (appr !== '未提交') {
                btns.push({label:'查看详情', cls:'btn btn-outline-brand btn-sm', action:'view'});
            }
        }

        // 渲染按钮
        btns.forEach(function(b) {
            var btn = document.createElement('button');
            btn.className = b.cls;
            btn.textContent = b.label;
            btn.onclick = function() { goToDetail(b.action); };
            container.appendChild(btn);
        });
    }

    function applyRolePermissions() {
        var rows = document.querySelectorAll('#projectTableBody tr');
        rows.forEach(function(row) {
            buildActionButtons(row);
        });
    }

    window.addEventListener('message', function(e) {
        if (e.data && e.data.type === 'roleChange' && e.data.role) {
            currentRole = e.data.role;
            setTimeout(applyRolePermissions, 50);
        }
    });

    // ==================== 初始化 ====================
    document.title = I18N.t('pageTitle');
    populateFilters();
    renderAll();
    setTimeout(applyRolePermissions, 150);
</script>
