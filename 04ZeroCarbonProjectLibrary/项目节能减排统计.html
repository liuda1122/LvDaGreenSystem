<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="title">绿色项目资产节能减排量统计 · 可持续金融管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --brand-50:#E8F0FB;--brand-100:#D1DFF4;--brand-300:#6E97D6;--brand-500:#2A66C2;--brand-700:#143F8F;--brand-900:#01256A;
            --green-50:#ECFDF5;--green-500:#10B981;--green-700:#047857;
            --success:#10B981;--success-bg:#ECFDF5;--success-border:#A7F3D0;
            --warning:#D97706;--warning-bg:#FFFBEB;--warning-border:#FDE68A;
            --danger:#DC2626;--danger-bg:#FEF2F2;--danger-border:#FECACA;
            --info:#2A66C2;--info-bg:#E8F0FB;--info-border:#D1DFF4;
            --ink-900:#0F172A;--ink-800:#1E293B;--ink-600:#475569;--ink-500:#64748B;--ink-400:#94A3B8;--ink-300:#CBD5E1;
            --line-200:#E2E8F0;--bg-muted:#F1F5F9;--bg-subtle:#F8FAFC;--white:#FFFFFF;
            --radius-sm:4px;--radius-md:6px;--radius-lg:8px;--radius-xl:12px;--radius-2xl:16px;
            --font-sans:'PingFang SC','Microsoft YaHei','Inter',system-ui,sans-serif;
            --font-num:'Inter','SF Pro Display',system-ui,sans-serif;
        }
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:var(--font-sans);color:var(--ink-800);background:var(--bg-subtle);font-size:14px;line-height:1.57;-webkit-font-smoothing:antialiased;height:100vh;overflow:hidden}
        .custom-scroll::-webkit-scrollbar{width:6px;height:6px}
        .custom-scroll::-webkit-scrollbar-track{background:transparent}
        .custom-scroll::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
        .custom-scroll::-webkit-scrollbar-thumb:hover{background:var(--brand-500)}
        .btn{display:inline-flex;align-items:center;gap:6px;border-radius:var(--radius-md);font-family:inherit;font-weight:500;cursor:pointer;transition:all .15s;border:1px solid transparent;line-height:1;white-space:nowrap}
        .btn-sm{padding:6px 12px;font-size:12px;line-height:20px;height:28px}
        .btn-md{padding:8px 16px;font-size:14px;line-height:22px;height:32px}
        .btn-primary{background:var(--brand-500);color:#fff}.btn-primary:hover{background:var(--brand-700)}
        .btn-secondary{background:var(--white);color:var(--ink-800);border-color:var(--ink-300)}.btn-secondary:hover{border-color:var(--brand-500);color:var(--brand-500)}
        .btn-outline-brand{background:var(--white);color:var(--brand-500);border-color:#A3C2E8}.btn-outline-brand:hover{background:var(--brand-50);border-color:var(--brand-500)}
        .btn-deep-blue{background:var(--brand-700);color:#fff}.btn-deep-blue:hover{background:var(--brand-900)}
        .tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:var(--radius-sm);font-size:12px;font-weight:500;line-height:1.5;border:1px solid transparent;white-space:nowrap}
        .tag-info{background:var(--info-bg);color:var(--brand-700);border-color:var(--info-border)}
        .stat-card{background:var(--white);border-radius:var(--radius-md);border:1px solid var(--line-200);padding:10px 14px;display:flex;flex-direction:column;gap:2px;min-width:120px}
        .stat-card .stat-value{font-size:18px;font-weight:700;font-family:var(--font-num);color:var(--brand-700)}
        .stat-card .stat-label{font-size:11px;color:var(--ink-500)}
        .stat-card.green .stat-value{color:var(--green-700)}
        .section-card{background:var(--white);border-radius:var(--radius-xl);border:1px solid var(--line-200);overflow:hidden;margin-bottom:12px}
        .section-card .card-head{padding:12px 20px;border-bottom:1px solid var(--line-200);background:var(--bg-subtle);font-weight:600;color:var(--ink-900);font-size:14px;display:flex;align-items:center;justify-content:space-between}
        .section-card .card-body{padding:0}
        .table-wrap{overflow:auto;position:relative}
        .table-wrap table{width:100%;border-collapse:separate;border-spacing:0;font-size:13px;min-width:2400px}
        .table-wrap thead{position:sticky;top:0;z-index:10}
        .table-wrap th{background:var(--bg-muted);padding:10px 14px;text-align:left;font-weight:600;color:var(--ink-600);border-bottom:1px solid var(--line-200);white-space:nowrap;font-size:12px}
        .table-wrap td{padding:10px 14px;border-bottom:1px solid var(--line-200);vertical-align:middle;white-space:nowrap}
        .table-wrap tbody tr:hover{background:var(--bg-subtle)}
        .table-wrap .col-seq{width:44px;text-align:center;color:var(--ink-400)}
        .table-wrap .col-actions{position:sticky;right:0;background:var(--white);z-index:5;min-width:100px;box-shadow:-4px 0 12px rgba(0,0,0,0.06)}
        .table-wrap thead .col-actions{background:var(--bg-muted);z-index:11}
        .table-wrap tbody tr:hover .col-actions{background:var(--bg-subtle)}
        .col-sep-left{border-left:2px solid var(--brand-100) !important}
        .col-sep-right{border-right:2px solid var(--brand-100) !important}
        .filter-row{display:flex;flex-wrap:wrap;align-items:center;gap:10px 16px}
        .filter-group-inline{display:flex;align-items:center;gap:6px;white-space:nowrap}
        .filter-group-inline label{font-size:12px;color:var(--ink-500);font-weight:500;white-space:nowrap}
        .filter-group-inline input,.filter-group-inline select{padding:6px 10px;border:1px solid var(--line-200);border-radius:var(--radius-md);font-size:13px;background:var(--white);outline:none;height:32px}
        .filter-group-inline input{width:180px}
        .filter-group-inline select{width:160px}
        .filter-group-inline input:focus,.filter-group-inline select:focus{border-color:var(--brand-500)}
        .filter-group-inline .date-range{display:flex;align-items:center;gap:4px}
        .filter-group-inline .date-range input{width:120px}
    </style>
    <script src="../i18n.js"></script>
</head>
<body>
<div class="flex flex-col" style="height:100vh;background:var(--bg-subtle);">
    <div class="flex-1 overflow-y-auto custom-scroll" style="padding:12px 24px 24px 24px;">

        <!-- 统计卡片 -->
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:12px;" id="statsCards">
            <div class="stat-card"><span class="stat-value" id="statContracts">48</span><span class="stat-label" data-i18n="stat_contracts">业务总数</span></div>
            <div class="stat-card"><span class="stat-value" id="statContractBalance">156,832.50</span><span class="stat-label" data-i18n="stat_balance">业务余额（万元）</span></div>
            <div class="stat-card green"><span class="stat-value" id="statCO2">18,456.78</span><span class="stat-label" data-i18n="stat_co2">年减排CO₂（吨）</span></div>
            <div class="stat-card green"><span class="stat-value" id="statSO2">856.32</span><span class="stat-label" data-i18n="stat_so2">年减排SO₂（吨）</span></div>
            <div class="stat-card green"><span class="stat-value" id="statCoal">12,350.00</span><span class="stat-label" data-i18n="stat_coal">年节标准煤（吨）</span></div>
            <div class="stat-card green"><span class="stat-value" id="statWater">3,680.50</span><span class="stat-label" data-i18n="stat_water">年节水量（万吨）</span></div>
        </div>


        <!-- 筛选条件 -->
        <div class="section-card">
            <div style="padding:14px 20px;border-bottom:1px solid var(--line-200);background:var(--bg-subtle);">
                <div class="filter-row">
                    <div class="filter-group-inline"><label data-i18n="filter_contract">业务信息：</label><input type="text" data-i18n-placeholder="placeholder_contract" placeholder="业务编号"></div>
                    <div class="filter-group-inline"><label data-i18n="filter_project">项目信息：</label><input type="text" data-i18n-placeholder="placeholder_project" placeholder="项目名称/代码"></div>
                    <div class="filter-group-inline"><label data-i18n="filter_industry">投向行业：</label><select id="selIndustry"><option value="" data-i18n="all_industries">全部行业</option><option>制造业</option><option>电力、热力、燃气及水生产和供应业</option><option>建筑业</option><option>交通运输、仓储和邮政业</option><option>水利、环境和公共设施管理业</option><option>农、林、牧、渔业</option></select></div>
                    <div class="filter-group-inline"><label data-i18n="filter_date">数据日期：</label><div class="date-range"><input type="date" value="2024-01-01"><span>~</span><input type="date" value="2025-12-31"></div></div>
                </div>
                <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:10px;">
                    <button class="btn btn-primary btn-sm" onclick="renderTable()" data-i18n="search">查询</button>
                    <button class="btn btn-secondary btn-sm" onclick="resetFilter()" data-i18n="reset">重置</button>
                </div>
            </div>
            <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 20px;border-bottom:1px solid var(--line-200);">
                <button class="btn btn-secondary btn-sm" onclick="exportData()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" style="width:14px;height:14px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    <span data-i18n="export">导出数据</span>
                </button>
                <span style="font-size:13px;color:var(--ink-400);" id="totalCount">共 48 条</span>
            </div>
        </div>

        <!-- 数据表格 -->
        <div class="section-card">
            <div class="card-body">
                <div class="table-wrap custom-scroll" style="max-height:500px;">
                    <table>
                        <thead>
                            <tr>
                                <th class="col-seq" data-i18n="th_seq">序号</th>
                                <th data-i18n="th_contract_code">业务编号</th>
                                <th data-i18n="th_product_type">产品品种</th>
                                <th data-i18n="th_contract_amount">业务金额（万元）</th>
                                <th data-i18n="th_contract_balance">业务余额（万元）</th>
                                <th data-i18n="th_project_code">项目代码</th>
                                <th data-i18n="th_project_name">项目名称</th>
                                <th data-i18n="th_industry">项目投向行业</th>
                                <th data-i18n="th_investment">项目总投资额（万元）</th>
                                <th data-i18n="th_co2">年减排CO₂（吨）</th>
                                <th data-i18n="th_so2">年减排SO₂（吨）</th>
                                <th data-i18n="th_nox">年减排NOx（吨）</th>
                                <th data-i18n="th_cod">年减排COD（吨）</th>
                                <th data-i18n="th_nh3n">年减排氨氮（吨）</th>
                                <th data-i18n="th_coal_save">年节标准煤（吨）</th>
                                <th data-i18n="th_water_save">年节水量（万吨）</th>
                                <th data-i18n="th_data_date">数据日期</th>
                                <th class="col-actions" data-i18n="th_actions">操作</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                        </tbody>
                    </table>
                </div>
            </div>
            <!-- 分页 -->
            <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-top:1px solid var(--line-200);" id="paginationBar">
                <span style="font-size:13px;color:var(--ink-400);" id="totalRecords">共 48 条</span>
                <div style="display:flex;align-items:center;gap:8px;">
                    <span style="font-size:13px;color:var(--ink-500);" data-i18n="per_page">20条/页</span>
                    <button class="btn btn-secondary btn-sm" disabled>‹</button>
                    <span style="padding:2px 8px;font-size:13px;background:var(--brand-500);color:white;border-radius:4px;">1</span>
                    <button class="btn btn-secondary btn-sm">2</button>
                    <button class="btn btn-secondary btn-sm">3</button>
                    <button class="btn btn-secondary btn-sm">›</button>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    // ==================== I18N 页级字典 ====================
    I18N.setDict({
        title: {zh:'绿色项目资产节能减排量统计 · 可持续金融管理系统', en:'Project Energy-Saving & Emission-Reduction Stats · Sustainable Finance System'},
        page_title: {zh:'绿色项目资产节能减排量统计', en:'Project Energy-Saving & Emission-Reduction Stats'},
        month_end_tag: {zh:'月末生成', en:'Month-End Generated'},
        view_summary: {zh:'统计表', en:'Summary'},
        view_detail: {zh:'明细表', en:'Detail'},
        stat_contracts: {zh:'业务总数', en:'Total Business'},
        stat_balance: {zh:'业务余额（万元）', en:'Business Balance (10k CNY)'},
        stat_co2: {zh:'年减排CO₂（吨）', en:'Annual CO₂ Reduction (tons)'},
        stat_so2: {zh:'年减排SO₂（吨）', en:'Annual SO₂ Reduction (tons)'},
        stat_coal: {zh:'年节标准煤（吨）', en:'Annual Coal Saved (tons)'},
        stat_water: {zh:'年节水量（万吨）', en:'Annual Water Saved (10k tons)'},
        search: {zh:'查询', en:'Search'},
        reset: {zh:'重置', en:'Reset'},
        export: {zh:'导出数据', en:'Export Data'},
        filter_contract: {zh:'业务信息：', en:'Business Info'},
        filter_project: {zh:'项目信息：', en:'Project Info'},
        filter_industry: {zh:'投向行业：', en:'Industry'},
        filter_date: {zh:'数据日期：', en:'Data Date'},
        all_industries: {zh:'全部行业', en:'All Industries'},
        placeholder_contract: {zh:'业务编号', en:'Business No.'},
        placeholder_project: {zh:'项目名称/代码', en:'Project name/code'},
        per_page: {zh:'20条/页', en:'20/page'},
        th_seq: {zh:'序号', en:'#'},
        th_contract_code: {zh:'业务编号', en:'Business No.'},
        th_product_type: {zh:'产品品种', en:'Product Type'},
        th_contract_amount: {zh:'业务金额（万元）', en:'Business Amount (10k CNY)'},
        th_contract_balance: {zh:'业务余额（万元）', en:'Business Balance (10k CNY)'},
        th_project_code: {zh:'项目代码', en:'Project Code'},
        th_project_name: {zh:'项目名称', en:'Project Name'},
        th_industry: {zh:'项目投向行业', en:'Project Industry'},
        th_investment: {zh:'项目总投资额（万元）', en:'Total Investment (10k CNY)'},
        th_co2: {zh:'年减排CO₂（吨）', en:'CO₂ Reduction (tons)'},
        th_so2: {zh:'年减排SO₂（吨）', en:'SO₂ Reduction (tons)'},
        th_nox: {zh:'年减排NOx（吨）', en:'NOx Reduction (tons)'},
        th_cod: {zh:'年减排COD（吨）', en:'COD Reduction (tons)'},
        th_nh3n: {zh:'年减排氨氮（吨）', en:'NH₃-N Reduction (tons)'},
        th_coal_save: {zh:'年节标准煤（吨）', en:'Coal Saved (tons)'},
        th_water_save: {zh:'年节水量（万吨）', en:'Water Saved (10k tons)'},
        th_data_date: {zh:'数据日期', en:'Data Date'},
        th_actions: {zh:'操作', en:'Actions'},
        action_view: {zh:'查看测算', en:'View Calc'},
        export_ok: {zh:'导出成功！文件：绿色项目资产节能减排量统计.xlsx', en:'Export successful! File: Project Energy-Saving Stats.xlsx'}
    });

    // ==================== 模拟数据 ====================
    var productTypes = ['流动资金贷款','固定资产贷款','项目贷款','银团贷款','并购贷款','绿色债券'];
    var industries = ['制造业','电力、热力、燃气及水生产和供应业','建筑业','交通运输、仓储和邮政业','水利、环境和公共设施管理业','农、林、牧、渔业'];
    var projectNames = [
        '超低能耗建筑建设项目','风力发电场建设工程','太阳能光伏电站项目','污水处理厂升级改造','新能源汽车产业园',
        '绿色数据中心建设','海绵城市雨水收集系统','废旧物资回收利用基地','天然林保护修复工程','高效节能装备制造基地',
        '城市轨道交通绿色化改造','生物质能热电联产项目','绿色港口岸电设施建设','装配式建筑产业基地','工业余热回收利用项目',
        '生态湿地保护修复工程','智能电网升级改造','绿色矿山环境治理','有机农业示范基地','流域水环境综合治理',
        '充电桩网络建设','垃圾焚烧发电项目','海水淡化工程','矿山生态修复','低碳产业园区建设',
        '绿色农房改造','智能交通系统','碳捕集利用设施','高效节水灌溉','光伏扶贫电站',
        '城镇污水管网改造','风电机组制造基地','锂电池回收利用','绿色仓储物流中心','河湖生态缓冲带建设',
        '绿色认证农产品加工','核能供热示范工程','既有建筑节能改造','餐厨垃圾资源化处理','农村人居环境整治',
        '地热能供暖项目','氢能产业园','绿色建材生产线','抽水蓄能电站','海洋牧场建设',
        '节能环保产业园','绿色船舶制造','固废综合利用项目','近零能耗建筑示范','智慧能源管理平台'
    ];

    function genRand(seed, min, max){
        var r = ((seed * 1103515245 + 12345) & 0x7fffffff) / 0x7fffffff;
        return (min + r * (max - min));
    }

    function fmtNum(val, decimals){
        if(decimals === undefined) decimals = 2;
        return val.toFixed(decimals).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    }

    var contractData = [];
    for(var i=0; i<48; i++){
        var contractAmount = genRand(i, 3000, 60000);
        var contractBalance = contractAmount * genRand(i+50, 0.3, 0.95);
        var investment = genRand(i+200, contractAmount * 0.8, contractAmount * 2.5);
        contractData.push({
            seq: i+1,
            contractCode: 'HT' + String(202400001 + i),
            productType: productTypes[i % productTypes.length],
            contractAmount: fmtNum(contractAmount),
            contractBalance: fmtNum(contractBalance),
            projectCode: 'PJ' + String(20230001 + i),
            projectName: projectNames[i % projectNames.length],
            industry: industries[i % industries.length],
            investment: fmtNum(investment),
            co2: fmtNum(genRand(i+300, 100, 8000)),
            so2: fmtNum(genRand(i+400, 5, 500)),
            nox: fmtNum(genRand(i+500, 3, 300)),
            cod: fmtNum(genRand(i+600, 1, 200)),
            nh3n: fmtNum(genRand(i+700, 0.5, 80), 2),
            coalSave: fmtNum(genRand(i+800, 50, 5000)),
            waterSave: fmtNum(genRand(i+900, 5, 800)),
            dataDate: '2025-0' + (Math.floor(i/8)+1).toString() + '-' + String(Math.floor(i%28)+1).padStart(2,'0')
        });
    }

    function renderTable(){
        var tbody = document.getElementById('tableBody');
        var html = '';

        for(var i=0; i<contractData.length; i++){
            var r = contractData[i];
            html += '<tr>'+'<td class="col-seq">'+r.seq+'</td>'+'<td style="font-family:monospace;font-size:12px;font-weight:500;color:var(--brand-700);">'+r.contractCode+'</td>'+'<td>'+r.productType+'</td>'+'<td style="font-family:var(--font-num);text-align:right;">'+r.contractAmount+'</td>'+'<td style="font-family:var(--font-num);text-align:right;font-weight:500;">'+r.contractBalance+'</td>'+'<td style="font-family:monospace;font-size:12px;">'+r.projectCode+'</td>'+'<td style="font-weight:500;">'+r.projectName+'</td>'+'<td>'+r.industry+'</td>'+'<td style="font-family:var(--font-num);text-align:right;">'+r.investment+'</td>'+'<td style="font-family:var(--font-num);text-align:right;color:var(--green-700);">'+r.co2+'</td>'+'<td style="font-family:var(--font-num);text-align:right;color:var(--green-700);">'+r.so2+'</td>'+'<td style="font-family:var(--font-num);text-align:right;color:var(--green-700);">'+r.nox+'</td>'+'<td style="font-family:var(--font-num);text-align:right;color:var(--green-700);">'+r.cod+'</td>'+'<td style="font-family:var(--font-num);text-align:right;color:var(--green-700);">'+r.nh3n+'</td>'+'<td style="font-family:var(--font-num);text-align:right;">'+r.coalSave+'</td>'+'<td style="font-family:var(--font-num);text-align:right;">'+r.waterSave+'</td>'+'<td>'+r.dataDate+'</td>'+'<td class="col-actions"><button class="btn btn-outline-brand btn-sm" onclick="viewCalc(\''+r.contractCode+'\')" data-i18n="action_view">'+I18N.t('action_view')+'</button></td>'+'</tr>';
        }
        tbody.innerHTML = html;
        updateStats();
    }

    function updateStats(){
        var totalBalance = 0, totalCO2 = 0, totalSO2 = 0, totalCoal = 0, totalWater = 0;
        for(var i=0; i<contractData.length; i++){
            totalBalance += parseFloat(contractData[i].contractBalance.replace(/,/g,''));
            totalCO2 += parseFloat(contractData[i].co2.replace(/,/g,''));
            totalSO2 += parseFloat(contractData[i].so2.replace(/,/g,''));
            totalCoal += parseFloat(contractData[i].coalSave.replace(/,/g,''));
            totalWater += parseFloat(contractData[i].waterSave.replace(/,/g,''));
        }
        document.getElementById('statContracts').textContent = contractData.length;
        document.getElementById('statContractBalance').textContent = fmtNum(totalBalance);
        document.getElementById('statCO2').textContent = fmtNum(totalCO2);
        document.getElementById('statSO2').textContent = fmtNum(totalSO2);
        document.getElementById('statCoal').textContent = fmtNum(totalCoal);
        document.getElementById('statWater').textContent = fmtNum(totalWater);
    }

    var currentView = 'detail';
    function resetFilter(){
        renderTable();
    }

    function exportData(){
        alert(I18N.t('export_ok'));
    }

    function viewCalc(contractCode){
        var dir = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/')+1);
        var targetUrl = dir + '环境效益测算查看.html?contractCode=' + contractCode + '&ref=project-energy-saving';
        var label = I18N.t('action_view') + ' - ' + contractCode;
        if(window.parent !== window){
            window.parent.postMessage({type:'openPage', pageId:'env-benefit-view-'+contractCode, file:targetUrl, label:label}, '*');
        }
    }

    // ==================== 语言切换回调 ====================
    window.onLangChange = function(lang){
        renderTable();
    };

    // ==================== 初始化渲染 ====================
    renderTable();
</script>
</body>
</html>
