<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="pageTitle">绿色潜在客户清单</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../i18n.js"></script>
    <style>
        :root {
            --brand-50: #E8F0FB;
            --brand-100: #D1DFF4;
            --brand-300: #6E97D6;
            --brand-500: #2A66C2;
            --brand-700: #143F8F;
            --brand-900: #01256A;
            --green-50: #ECFDF5;
            --green-500: #10B981;
            --green-700: #047857;
            --success: #10B981;
            --success-bg: #ECFDF5;
            --success-border: #A7F3D0;
            --warning: #D97706;
            --warning-bg: #FFFBEB;
            --warning-border: #FDE68A;
            --danger: #DC2626;
            --danger-bg: #FEF2F2;
            --danger-border: #FECACA;
            --info: #2A66C2;
            --info-bg: #E8F0FB;
            --info-border: #D1DFF4;
            --ink-900: #0F172A;
            --ink-800: #1E293B;
            --ink-600: #475569;
            --ink-500: #64748B;
            --ink-400: #94A3B8;
            --ink-300: #CBD5E1;
            --line-200: #E2E8F0;
            --bg-muted: #F1F5F9;
            --bg-subtle: #F8FAFC;
            --white: #FFFFFF;
            --radius-sm: 4px;
            --radius-md: 6px;
            --radius-lg: 8px;
            --radius-xl: 12px;
            --radius-2xl: 16px;
            --shadow-xs: 0 1px 2px rgba(15, 23, 42, .04);
            --shadow-sm: 0 1px 3px rgba(15, 23, 42, .06), 0 1px 2px rgba(15, 23, 42, .04);
            --shadow-md: 0 4px 12px rgba(15, 23, 42, .08), 0 2px 4px rgba(15, 23, 42, .04);
            --font-sans: 'PingFang SC', 'Microsoft YaHei', 'Inter', system-ui, sans-serif;
            --font-num: 'Inter', 'SF Pro Display', system-ui, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-sans);
            color: var(--ink-800);
            background: var(--bg-subtle);
            font-size: 14px;
            line-height: 1.57;
            -webkit-font-smoothing: antialiased;
            height: 100vh;
            overflow: hidden;
        }

        .custom-scroll::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
        .custom-scroll::-webkit-scrollbar-thumb:hover {
            background: var(--brand-500);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border-radius: var(--radius-md);
            font-family: inherit;
            font-weight: 500;
            cursor: pointer;
            transition: all .15s;
            border: 1px solid transparent;
            line-height: 1;
            white-space: nowrap;
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
            line-height: 20px;
            height: 28px;
        }
        .btn-md {
            padding: 8px 16px;
            font-size: 14px;
            line-height: 22px;
            height: 32px;
        }
        .btn-primary {
            background: var(--brand-500);
            color: #fff;
        }
        .btn-primary:hover {
            background: var(--brand-700);
        }
        .btn-secondary {
            background: var(--white);
            color: var(--ink-800);
            border-color: var(--ink-300);
        }
        .btn-secondary:hover {
            border-color: var(--brand-500);
            color: var(--brand-500);
        }

        /* 深蓝按钮 - 品牌主色 */
        .btn-deep-blue {
            background: var(--brand-700);
            color: #fff;
        }
        .btn-deep-blue:hover {
            background: var(--brand-900);
        }

        /* 浅蓝按钮 - 品牌浅色 */
        .btn-light-blue {
            background: var(--brand-100);
            color: var(--brand-700);
            border-color: var(--brand-300);
        }
        .btn-light-blue:hover {
            background: var(--brand-50);
            border-color: var(--brand-500);
            color: var(--brand-700);
        }

        .btn-success {
            background: var(--green-500);
            color: #fff;
        }
        .btn-success:hover {
            background: var(--green-700);
        }

        .tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-weight: 500;
            line-height: 1.5;
            border: 1px solid transparent;
            white-space: nowrap;
        }
        .tag-success {
            background: var(--success-bg);
            color: var(--green-700);
            border-color: var(--success-border);
        }

        .section-card {
            background: var(--white);
            border-radius: var(--radius-xl);
            border: 1px solid var(--line-200);
            overflow: hidden;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .green-level {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .green-level.dark {
            background: #065F46;
            color: #A7F3D0;
        }
        .green-level.medium {
            background: #047857;
            color: #D1FAE5;
        }
        .green-level.light {
            background: #10B981;
            color: #FFFFFF;
        }
        .green-level.non {
            background: var(--bg-muted);
            color: var(--ink-500);
        }

        /* 表格容器 - 支持右侧操作列冻结 */
        .table-wrap {
            overflow: auto;
            flex: 1;
            position: relative;
        }
        .table-wrap table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 13px;
            min-width: 1400px;
        }
        .table-wrap thead {
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .table-wrap th {
            background: var(--bg-muted);
            padding: 10px 14px;
            text-align: left;
            font-weight: 600;
            color: var(--ink-600);
            border-bottom: 1px solid var(--line-200);
            white-space: nowrap;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .table-wrap td {
            padding: 10px 14px;
            border-bottom: 1px solid var(--line-200);
            vertical-align: middle;
            white-space: nowrap;
        }
        .table-wrap tbody tr:hover {
            background: var(--bg-subtle);
        }
        .table-wrap .col-seq {
            width: 50px;
            text-align: center;
            color: var(--ink-400);
        }

        /* 操作列冻结 - 使用 sticky 定位 */
        .table-wrap .col-actions {
            position: sticky;
            right: 0;
            background: var(--white);
            z-index: 5;
            min-width: 190px;
            box-shadow: -4px 0 12px rgba(0, 0, 0, 0.06);
        }
        .table-wrap thead .col-actions {
            background: var(--bg-muted);
            z-index: 11;
        }
        .table-wrap tbody tr:hover .col-actions {
            background: var(--bg-subtle);
        }
        .table-wrap .col-actions .action-btns {
            display: flex;
            gap: 8px;
            flex-wrap: nowrap;
        }

        /* 面包屑 - 已隐藏 */
        .breadcrumb {
            display: none;
        }

        /* 导出成功弹窗 */
        .modal-mask {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.45);
            z-index: 1600;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .modal-mask.open {
            display: flex;
        }
        .modal {
            background: var(--white);
            border-radius: var(--radius-2xl);
            box-shadow: 0 20px 40px rgba(15, 23, 42, .16), 0 8px 16px rgba(15, 23, 42, .06);
            width: 100%;
            max-width: 420px;
            overflow: hidden;
            animation: modalIn .18s ease-out;
        }
        @keyframes modalIn {
            from {
                opacity: 0;
                transform: translateY(8px) scale(.98);
            }
            to {
                opacity: 1;
                transform: none;
            }
        }
        .modal-head {
            display: flex;
            align-items: center;
            padding: 16px 24px;
            border-bottom: 1px solid var(--line-200);
        }
        .modal-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--ink-900);
        }
        .modal-close {
            margin-left: auto;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--ink-500);
            padding: 4px;
            display: flex;
            border-radius: var(--radius-sm);
        }
        .modal-close:hover {
            background: var(--bg-muted);
            color: var(--ink-900);
        }
        .modal-body {
            padding: 24px;
            color: var(--ink-800);
            font-size: 14px;
            text-align: center;
            padding: 32px 24px;
        }
        .modal-foot {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 12px 24px;
            border-top: 1px solid var(--line-200);
            background: var(--bg-subtle);
        }

        .export-success {
            background: var(--success-bg);
            color: var(--green-700);
            padding: 16px 20px;
            border-radius: 6px;
            font-size: 14px;
            border: 1px solid var(--success-border);
            text-align: center;
        }
        .export-success .icon {
            font-size: 32px;
            display: block;
            margin-bottom: 8px;
        }
        .export-success .count {
            font-weight: 600;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <!-- 主体 -->
    <div class="flex flex-col" style="height:100vh;background:var(--bg-subtle);">

        <!-- 面包屑导航已删除 -->

        <!-- 内容区域 -->
        <div class="flex-1 overflow-hidden" style="padding:20px 24px 24px 24px;">
            <div class="section-card" style="height:100%;">

                <!-- 筛选栏 -->
                <div style="padding:16px 24px;border-bottom:1px solid var(--line-200);background:var(--bg-subtle);flex-shrink:0;">
                    <div class="flex flex-wrap items-end gap-4">
                        <div class="flex-1 min-w-[200px]">
                            <label class="text-xs text-slate-500 font-medium block mb-1" data-i18n="filter_enterprise">企业信息</label>
                            <input type="text" id="filterInput" data-i18n-placeholder="filter_placeholder" placeholder="请输入企业名称/编号/统一社会信用代码" class="w-full px-3 py-1.5 border border-slate-200 rounded-md text-sm focus:outline-none focus:ring-1 focus:ring-brand-500">
                        </div>
                        <div class="flex-1 min-w-[140px]">
                            <label class="text-xs text-slate-500 font-medium block mb-1" data-i18n="filter_green_level">绿色等级</label>
                            <select class="w-full px-3 py-1.5 border border-slate-200 rounded-md text-sm bg-white">
                                <option data-i18n="all_levels">全部等级</option>
                                <option data-i18n="deep_green">深绿</option>
                                <option data-i18n="mid_green">中绿</option>
                                <option data-i18n="light_green">浅绿</option>
                                <option data-i18n="non_green">非绿</option>
                            </select>
                        </div>
                        <div class="flex-1 min-w-[140px]">
                            <label class="text-xs text-slate-500 font-medium block mb-1" data-i18n="filter_attention">关注状态</label>
                            <select class="w-full px-3 py-1.5 border border-slate-200 rounded-md text-sm bg-white">
                                <option data-i18n="all_status">全部状态</option>
                                <option data-i18n="followed">已关注</option>
                                <option data-i18n="not_followed">未关注</option>
                            </select>
                        </div>
                        <div class="flex-1 min-w-[140px]">
                            <label class="text-xs text-slate-500 font-medium block mb-1" data-i18n="filter_region">企业所属地区</label>
                            <select class="w-full px-3 py-1.5 border border-slate-200 rounded-md text-sm bg-white">
                                <option data-i18n="all_regions">全部地区</option>
                                <option data-i18n="region_zhejiang">浙江省</option>
                                <option data-i18n="region_jiangsu">江苏省</option>
                                <option data-i18n="region_shanghai">上海市</option>
                                <option data-i18n="region_beijing">北京市</option>
                                <option data-i18n="region_hebei">河北省</option>
                                <option data-i18n="region_fujian">福建省</option>
                                <option data-i18n="region_chongqing">重庆市</option>
                            </select>
                        </div>
                        <div class="flex-1 min-w-[160px]">
                            <label class="text-xs text-slate-500 font-medium block mb-1" data-i18n="filter_industry">国民经济行业分类</label>
                            <select class="w-full px-3 py-1.5 border border-slate-200 rounded-md text-sm bg-white">
                                <option data-i18n="select_industry">请选择国民经济行业分类</option>
                                <option data-i18n="industry_chem_mfg">化学原料和化学制品制造业</option>
                                <option data-i18n="industry_syn_fiber">合成纤维制造</option>
                                <option data-i18n="industry_solar">太阳能发电</option>
                                <option data-i18n="industry_cogen">热电联产</option>
                                <option data-i18n="industry_new_energy">新能源</option>
                                <option data-i18n="industry_steel_rolling">钢压延加工</option>
                                <option data-i18n="industry_steel_smelt">钢铁冶炼</option>
                            </select>
                        </div>
                        <div class="flex items-center gap-2">
                            <button class="btn btn-primary btn-sm" data-i18n="search">查询</button>
                            <button class="btn btn-secondary btn-sm" data-i18n="reset">重置</button>
                        </div>
                    </div>
                </div>

                <!-- 操作栏 - 导出数据按钮带向下图标 -->
                <div class="flex items-center justify-between px-6 py-3 border-b border-slate-100 flex-shrink-0">
                    <div class="flex gap-2 flex-wrap">
                        <button class="btn btn-secondary btn-sm" onclick="exportData()">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                            <span data-i18n="export_data">导出数据</span>
                        </button>
                    </div>
                    <span class="text-sm text-slate-400" id="totalRecordsTop">共 1,284 条</span>
                </div>

                <!-- 表格 - 操作列冻结 -->
                <div class="table-wrap custom-scroll">
                    <table>
                        <thead>
                            <tr>
                                <th class="col-seq" data-i18n="th_seq">序号</th>
                                <th data-i18n="th_enterprise">企业名称</th>
                                <th data-i18n="th_sector">所属产业</th>
                                <th data-i18n="th_credit_code">统一社会信用代码</th>
                                <th data-i18n="th_region">所属地区</th>
                                <th data-i18n="th_status">经营状态</th>
                                <th data-i18n="th_capital">注册资本</th>
                                <th data-i18n="th_currency">注册资本币种</th>
                                <th data-i18n="th_green_level">绿色等级</th>
                                <th data-i18n="th_main_biz">主营业务</th>
                                <th data-i18n="th_industry_cat">国民经济行业大类</th>
                                <th data-i18n="th_industry_sub">国民经济行业小类</th>
                                <th class="col-actions" data-i18n="th_actions">操作</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                        </tbody>
                    </table>
                </div>

                <!-- 分页 -->
                <div class="flex items-center justify-between px-6 py-3 border-t border-slate-100 flex-shrink-0">
                    <span class="text-sm text-slate-400" id="totalRecordsBottom">共 1,284 条</span>
                    <div class="flex items-center gap-2">
                        <button class="btn btn-secondary btn-sm">‹</button>
                        <span class="px-2 py-1 text-sm bg-brand-500 text-white rounded">1</span>
                        <button class="btn btn-secondary btn-sm">2</button>
                        <button class="btn btn-secondary btn-sm">3</button>
                        <span class="text-sm text-slate-400">…</span>
                        <button class="btn btn-secondary btn-sm">50</button>
                        <button class="btn btn-secondary btn-sm">›</button>
                        <span class="text-sm text-slate-500 ml-2"><span data-i18n="jump_to">跳至</span> <input type="number" class="w-12 px-1 py-0.5 border border-slate-300 rounded text-center text-sm" value="1"> /50<span data-i18n="page">页</span></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ============ 开始营销弹窗 ============ -->
    <div class="modal-mask" id="marketingModal">
        <div class="modal" style="max-width:480px;">
            <div class="modal-head">
                <div class="modal-title" data-i18n="mkt_modal_title">客户基本信息</div>
                <button class="modal-close" onclick="closeMarketingModal()">
                    <svg style="width:16px;height:16px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                </button>
            </div>
            <div class="modal-body" style="text-align:left;padding:20px 24px;">
                <div style="display:grid;grid-template-columns:120px 1fr;gap:10px 16px;font-size:13px;">
                    <span style="color:var(--ink-500);font-weight:500;" data-i18n="mkt_enterprise_name">企业名称：</span>
                    <span id="mktEnterpriseName" style="font-weight:500;color:var(--ink-900);">—</span>
                    <span style="color:var(--ink-500);font-weight:500;" data-i18n="mkt_credit_code">统一社会信用代码：</span>
                    <span id="mktCreditCode" style="font-family:monospace;font-size:12px;color:var(--ink-800);">—</span>
                    <span style="color:var(--ink-500);font-weight:500;" data-i18n="mkt_region">所属地区：</span>
                    <span id="mktRegion" style="color:var(--ink-800);">—</span>
                    <span style="color:var(--ink-500);font-weight:500;" data-i18n="mkt_sector">所属产业：</span>
                    <span id="mktSector" style="color:var(--ink-800);">—</span>
                    <span style="color:var(--ink-500);font-weight:500;" data-i18n="mkt_green_level">绿色等级：</span>
                    <span id="mktGreenLevel">—</span>
                    <span style="color:var(--ink-500);font-weight:500;" data-i18n="mkt_main_biz">主营业务：</span>
                    <span id="mktMainBiz" style="color:var(--ink-800);">—</span>
                    <span style="color:var(--ink-500);font-weight:500;" data-i18n="mkt_industry_cat">国民经济行业大类：</span>
                    <span id="mktIndustryCat" style="color:var(--ink-800);">—</span>
                </div>
            </div>
            <div class="modal-foot" style="justify-content:center;">
                <button class="btn btn-success btn-md" onclick="confirmStartMarketing()" data-i18n="mkt_confirm_start">确认开始营销</button>
                <button class="btn btn-secondary btn-md" onclick="closeMarketingModal()" data-i18n="mkt_cancel">取消</button>
            </div>
        </div>
    </div>

    <!-- ============ 导出成功弹窗 ============ -->
    <div class="modal-mask" id="exportModal">
        <div class="modal modal-sm modal-form">
            <div class="modal-head">
                <div class="modal-title" data-i18n="export_success">导出成功</div>
                <button class="modal-close" onclick="closeModal('exportModal')">
                    <svg style="width:16px;height:16px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                </button>
            </div>
            <div class="modal-body" style="text-align:center;padding:32px 24px;">
                <div class="export-success">
                    <span class="icon"><svg width="16" height="16" viewBox="0 0 16 16" style="vertical-align:middle"><circle cx="8" cy="8" r="7" stroke="currentColor" fill="none" stroke-width="1.3"/><polyline points="5 8 7 11 11 6" stroke="currentColor" fill="none" stroke-width="1.5"/></svg></span>
                    <div style="font-weight:600;font-size:16px;margin-bottom:4px;" data-i18n="export_msg">数据已导出</div>
                    <div style="font-size:13px;color:var(--ink-500);margin-top:4px;" id="exportCount">共导出 10 条记录</div>
                </div>
            </div>
            <div class="modal-foot" style="justify-content:center;">
                <button class="btn btn-md btn-primary" onclick="closeModal('exportModal')" data-i18n="ok">我知道了</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== i18n 字典 ====================
        I18N.setDict({
            pageTitle:               { zh: '绿色潜在客户清单',                 en: 'Green Potential Client List' },
            filter_enterprise:       { zh: '企业信息',                         en: 'Enterprise Info' },
            filter_green_level:      { zh: '绿色等级',                         en: 'Green Level' },
            filter_attention:        { zh: '关注状态',                         en: 'Attention Status' },
            filter_region:           { zh: '企业所属地区',                     en: 'Region' },
            filter_industry:         { zh: '国民经济行业分类',                 en: 'Industry Classification' },
            filter_placeholder:      { zh: '请输入企业名称/编号/统一社会信用代码', en: 'Enter enterprise name / code / credit number' },
            all_levels:              { zh: '全部等级',                         en: 'All Levels' },
            deep_green:              { zh: '深绿',                             en: 'Dark Green' },
            mid_green:               { zh: '中绿',                             en: 'Medium Green' },
            light_green:             { zh: '浅绿',                             en: 'Light Green' },
            non_green:               { zh: '非绿',                             en: 'Non-Green' },

        // ==================== 渲染表格 ====================
        function renderTable() {
            var tbody = document.getElementById('tableBody');
            var html = '';
            for (var i = 0; i < tableData.length; i++) {
                var r = tableData[i];
                html += '<tr>' +
                    '<td class="col-seq">' + (i + 1) + '</td>' +
                    '<td style="font-weight:500;color:var(--ink-900);">' + I18N.t(r.name) + '</td>' +
                    '<td>' + I18N.t(r.sectorKey) + '</td>' +
                    '<td style="font-family:monospace;font-size:12px;">' + r.creditCode + '</td>' +
                    '<td>' + I18N.t(r.region) + '</td>' +
                    '<td><span class="' + r.statusClass + '">' + I18N.t(r.statusKey) + '</span></td>' +
                    '<td>' + r.capital + '</td>' +
                    '<td>' + I18N.t(r.currencyKey) + '</td>' +
                    '<td><span class="green-level ' + r.greenLevelClass + '">' + I18N.t(r.greenLevelKey) + '</span></td>' +
                    '<td>' + I18N.t(r.mainBiz) + '</td>' +
                    '<td>' + I18N.t(r.industryCat) + '</td>' +
                    '<td>' + I18N.t(r.industrySub) + '</td>' +
                    '<td class="col-actions">' +
                        '<div class="action-btns">' +
                            '<button class="btn btn-deep-blue btn-sm" onclick="openReport(\'企业评价报告.html\')">' + I18N.t('action_eval_report') + '</button>' +
                            '<button class="btn btn-light-blue btn-sm" onclick="openReport(\'绿色业务营销报告.html\')">' + I18N.t('action_mkt_report') + '</button>' +
                            '<button class="btn btn-success btn-sm" onclick="startMarketing(' + i + ')">' + I18N.t('action_start_mkt') + '</button>' +
                        '</div>' +
                    '</td>' +
                    '</tr>';
            }
            tbody.innerHTML = html;
        }

            updateDynamicText();
        };

        // ==================== 通过 postMessage 通知父框架打开页面 ====================
        function openReport(filename) {
            var currentPath = window.location.pathname;
            var currentDir = currentPath.substring(0, currentPath.lastIndexOf('/') + 1);
            if (currentDir === '') {
                currentDir = './';
            }
            var targetUrl = currentDir + filename;

            var pageId = 'report-' + Date.now() + '-' + Math.random().toString(36).substr(2, 6);
            var label = filename.replace('.html', '').replace('绿色', '').trim();

            if (window.parent !== window) {
                window.parent.postMessage({
                    type: 'openPage',
                    pageId: pageId,
                    file: targetUrl,
                    label: label
                }, '*');
            } else {
                window.location.href = targetUrl;
            }
        }

        // ==================== 开始营销 ====================
        var currentMarketingIndex = -1;

        function startMarketing(index) {
            currentMarketingIndex = index;
            var r = tableData[index];
            if (!r) return;
            document.getElementById('mktEnterpriseName').textContent = I18N.t(r.name);
            document.getElementById('mktCreditCode').textContent = r.creditCode;
            document.getElementById('mktRegion').textContent = I18N.t(r.region);
            document.getElementById('mktSector').textContent = I18N.t(r.sectorKey);
            document.getElementById('mktGreenLevel').innerHTML = '<span class="green-level ' + r.greenLevelClass + '">' + I18N.t(r.greenLevelKey) + '</span>';
            document.getElementById('mktMainBiz').textContent = I18N.t(r.mainBiz);
            document.getElementById('mktIndustryCat').textContent = I18N.t(r.industryCat);
            document.getElementById('marketingModal').classList.add('open');
        }

        function closeMarketingModal() {
            document.getElementById('marketingModal').classList.remove('open');
            currentMarketingIndex = -1;
        }

        function confirmStartMarketing() {
            if (currentMarketingIndex < 0) return;
            var r = tableData[currentMarketingIndex];
            var currentPath = window.location.pathname;
            var currentDir = currentPath.substring(0, currentPath.lastIndexOf('/') + 1);
            if (currentDir === '') { currentDir = './'; }
            var targetUrl = currentDir + '潜在客户营销过程管理.html';
            var pageId = 'mkt-process-' + currentMarketingIndex + '-' + Date.now();
            var label = I18N.t('action_start_mkt');
            closeMarketingModal();
            if (window.parent !== window) {
                window.parent.postMessage({
                    type: 'openPage',
                    pageId: pageId,
                    file: targetUrl,
                    label: label
                }, '*');
            }
        }

        // ==================== 导出数据 ====================
        function exportData() {
            updateExportCount();
            document.getElementById('exportModal').classList.add('open');
        }

        // ==================== 关闭弹窗 ====================
        function closeModal(id) {
            document.getElementById(id).classList.remove('open');
        }

        // 点击遮罩关闭弹窗
        document.getElementById('marketingModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeMarketingModal();
            }
        });
        document.getElementById('exportModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal('exportModal');
            }
        });

        // ESC关闭弹窗
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeMarketingModal();
                closeModal('exportModal');
            }
        });

        // ==================== 初始化 ====================
        (function init() {
            // 首次渲染表格
            renderTable();
            // 应用 i18n 到 DOM
            I18N.applyToDOM();
            // 更新动态文本
            updateDynamicText();
        })();
    </script>

</body>
</html>
