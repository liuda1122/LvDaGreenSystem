<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>营销过程管理</title>
    <script src="../i18n.js"></script>
    <style>
        :root {
            --brand-50:#E8F0FB;--brand-500:#2A66C2;--brand-700:#143F8F;--brand-900:#01256A;
            --ink-900:#0F172A;--ink-800:#1E293B;--ink-600:#475569;--ink-500:#64748B;--ink-400:#94A3B8;
            --line-200:#E2E8F0;--bg-muted:#F1F5F9;--bg-subtle:#F8FAFC;--white:#FFFFFF;
            --radius-md:6px;--font-sans:'PingFang SC','Microsoft YaHei','Inter',system-ui,sans-serif;
        }
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:var(--font-sans);color:var(--ink-800);background:var(--bg-subtle);font-size:14px;line-height:1.57;height:100vh;overflow:hidden;display:flex;flex-direction:column}
        /* Tab bar */
        .tab-bar{display:flex;flex-shrink:0;background:var(--white);border-bottom:1px solid var(--line-200);padding:0 16px}
        .tab-item{padding:10px 20px;font-size:14px;color:var(--ink-500);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;user-select:none}
        .tab-item:hover{color:var(--brand-500)}
        .tab-item.active{color:var(--brand-500);font-weight:600;border-bottom-color:var(--brand-500)}
        /* Content area */
        .tab-content{flex:1;display:none;overflow:hidden}
        .tab-content.active{display:flex}
        .tab-content iframe{width:100%;height:100%;border:none}
    </style>
</head>
<body>
    <div class="tab-bar">
        <div class="tab-item active" id="tabClient" onclick="switchTab('client')" data-i18n="tabClient">客户营销过程</div>
        <div class="tab-item" id="tabProject" onclick="switchTab('project')" data-i18n="tabProject">项目营销过程</div>
    </div>
    <div class="tab-content active" id="contentClient">
        <iframe src="潜在客户营销过程管理.html"></iframe>
    </div>
    <div class="tab-content" id="contentProject">
        <iframe src="../04ZeroCarbonProjectLibrary/项目营销过程管理.html"></iframe>
    </div>

<script>
I18N.setDict({
    pageTitle:{zh:'营销过程管理',en:'MKT Process Mgmt'},
    tabClient:{zh:'客户营销过程',en:'Client MKT Process'},
    tabProject:{zh:'项目营销过程',en:'Project MKT Process'}
});
document.title=I18N.t('pageTitle');

function switchTab(tab){
    document.querySelectorAll('.tab-item').forEach(function(el){el.classList.remove('active')});
    document.querySelectorAll('.tab-content').forEach(function(el){el.classList.remove('active')});
    if(tab==='client'){
        document.getElementById('tabClient').classList.add('active');
        document.getElementById('contentClient').classList.add('active');
    }else{
        document.getElementById('tabProject').classList.add('active');
        document.getElementById('contentProject').classList.add('active');
    }
}

window.onLangChange=function(lang){
    document.title=I18N.t('pageTitle');
};
</script>
</body>
</html>
