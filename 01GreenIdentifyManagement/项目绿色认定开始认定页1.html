<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目绿色认定操作 · 可持续金融管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --brand-50: #E8F0FB;
            --brand-100: #D1DFF4;
            --brand-500: #2A66C2;
            --brand-700: #143F8F;
            --brand-900: #01256A;
            --green-50: #ECFDF5;
            --green-500: #10B981;
            --green-700: #047857;
            --success: #10B981;
            --success-bg: #ECFDF5;
            --success-border: #A7F3D0;
            --warning: #D97706;
            --warning-bg: #FFFBEB;
            --warning-border: #FDE68A;
            --danger: #DC2626;
            --danger-bg: #FEF2F2;
            --danger-border: #FECACA;
            --info: #2A66C2;
            --info-bg: #E8F0FB;
            --info-border: #D1DFF4;
            --ink-900: #0F172A;
            --ink-800: #1E293B;
            --ink-600: #475569;
            --ink-500: #64748B;
            --ink-400: #94A3B8;
            --ink-300: #CBD5E1;
            --line-200: #E2E8F0;
            --bg-muted: #F1F5F9;
            --bg-subtle: #F8FAFC;
            --white: #FFFFFF;
            --radius-sm: 4px;
            --radius-md: 6px;
            --radius-lg: 8px;
            --radius-xl: 12px;
            --radius-2xl: 16px;
            --shadow-lg: 0 10px 24px rgba(15, 23, 42, .10), 0 4px 8px rgba(15, 23, 42, .04);
            --shadow-xl: 0 20px 40px rgba(15, 23, 42, .16), 0 8px 16px rgba(15, 23, 42, .06);
            --font-sans: 'PingFang SC', 'Microsoft YaHei', 'Inter', system-ui, sans-serif;
            --font-num: 'Inter', 'SF Pro Display', system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', 'SF Mono', 'Menlo', 'Consolas', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-sans);
            color: var(--ink-800);
            background: var(--bg-subtle);
            font-size: 14px;
            line-height: 1.57;
            -webkit-font-smoothing: antialiased;
        }

        .custom-scroll::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
        .custom-scroll::-webkit-scrollbar-thumb:hover {
            background: var(--brand-500);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border-radius: var(--radius-md);
            font-family: inherit;
            font-weight: 500;
            cursor: pointer;
            transition: all .15s;
            border: 1px solid transparent;
            line-height: 1;
            white-space: nowrap;
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
            line-height: 20px;
            height: 28px;
        }
        .btn-md {
            padding: 8px 16px;
            font-size: 14px;
            line-height: 22px;
            height: 32px;
        }
        .btn-primary {
            background: var(--brand-500);
            color: #fff;
        }
        .btn-primary:hover {
            background: var(--brand-700);
        }
        .btn-secondary {
            background: var(--white);
            color: var(--ink-800);
            border-color: var(--ink-300);
        }
        .btn-secondary:hover {
            border-color: var(--brand-500);
            color: var(--brand-500);
        }
        .btn-success {
            background: var(--green-500);
            color: #fff;
        }
        .btn-success:hover {
            background: var(--green-700);
        }
        .btn-outline-brand {
            background: var(--white);
            color: var(--brand-500);
            border-color: #A3C2E8;
        }
        .btn-outline-brand:hover {
            background: var(--brand-50);
            border-color: var(--brand-500);
        }

        .tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-weight: 500;
            line-height: 1.5;
            border: 1px solid transparent;
            white-space: nowrap;
        }
        .tag-default {
            background: var(--bg-muted);
            color: var(--ink-600);
            border-color: var(--line-200);
        }
        .tag-success {
            background: var(--success-bg);
            color: var(--green-700);
            border-color: var(--success-border);
        }
        .tag-danger {
            background: var(--danger-bg);
            color: var(--danger);
            border-color: var(--danger-border);
        }
        .tag-warning {
            background: var(--warning-bg);
            color: var(--warning);
            border-color: var(--warning-border);
        }
        .tag-info {
            background: var(--info-bg);
            color: var(--info);
            border-color: var(--info-border);
        }
        .tag-identified {
            background: #D1FAE5;
            color: #065F46;
            border-color: #A7F3D0;
        }
        .tag-unidentified {
            background: #FEF3C7;
            color: #92400E;
            border-color: #FDE68A;
        }

        .section-card {
            background: var(--white);
            border-radius: var(--radius-xl);
            border: 1px solid var(--line-200);
            overflow: hidden;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 140px 1fr;
            gap: 6px 16px;
            align-items: baseline;
        }
        .info-label {
            font-size: 13px;
            color: var(--ink-500);
            font-weight: 500;
        }
        .info-value {
            font-size: 14px;
            color: var(--ink-900);
            word-break: break-word;
        }

        /* 绿色分类卡片 */
        .green-class-card {
            border: 2px solid var(--line-200);
            border-radius: var(--radius-lg);
            padding: 12px 16px;
            transition: all .2s;
            cursor: pointer;
            background: var(--white);
            position: relative;
        }
        .green-class-card:hover {
            border-color: var(--brand-300);
            background: var(--brand-50);
        }
        .green-class-card.active {
            border-color: var(--brand-500);
            background: var(--brand-50);
            box-shadow: 0 0 0 3px rgba(42, 102, 194, 0.15);
        }
        .green-class-card .level-1 {
            font-size: 14px;
            font-weight: 600;
            color: var(--ink-800);
        }
        .green-class-card .level-2 {
            font-size: 13px;
            color: var(--ink-600);
            margin-top: 2px;
        }
        .green-class-card .level-3 {
            font-size: 13px;
            color: var(--brand-700);
            font-weight: 500;
            margin-top: 2px;
        }
        .green-class-card .check-mark {
            display: none;
            color: var(--brand-500);
            font-weight: 600;
        }
        .green-class-card.active .check-mark {
            display: inline;
        }
        .green-class-card .info-hint {
            position: absolute;
            top: 8px;
            right: 12px;
            color: var(--ink-400);
            cursor: pointer;
            font-size: 16px;
            transition: color .2s;
        }
        .green-class-card .info-hint:hover {
            color: var(--brand-500);
        }
        .hint-tooltip {
            display: none;
            position: absolute;
            right: 0;
            top: 100%;
            margin-top: 6px;
            background: var(--ink-900);
            color: #fff;
            font-size: 12px;
            font-weight: 400;
            padding: 10px 14px;
            border-radius: var(--radius-md);
            max-width: 380px;
            width: max-content;
            z-index: 50;
            line-height: 1.6;
            box-shadow: var(--shadow-lg);
            text-align: left;
        }
        .hint-tooltip::before {
            content: '';
            position: absolute;
            right: 12px;
            top: -6px;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-bottom: 6px solid var(--ink-900);
        }
        .green-class-card:hover .hint-tooltip {
            display: block;
        }

        .reason-card {
            background: var(--bg-muted);
            border-radius: var(--radius-lg);
            padding: 16px;
            border-left: 3px solid var(--brand-500);
        }
        .suggestion-card {
            background: var(--green-50);
            border-radius: var(--radius-lg);
            padding: 16px;
            border-left: 3px solid var(--green-500);
        }

        .proof-section {
            border: 1px solid var(--line-200);
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: all .3s;
        }
        .proof-section .proof-header {
            padding: 12px 16px;
            background: var(--bg-muted);
            font-weight: 500;
            font-size: 14px;
            color: var(--ink-700);
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: default;
        }
        .proof-section .proof-body {
            padding: 16px;
            background: var(--white);
        }
        .proof-section.active {
            border-color: var(--brand-500);
            box-shadow: 0 0 0 2px rgba(42, 102, 194, 0.1);
        }

        .upload-zone {
            border: 2px dashed var(--line-200);
            border-radius: var(--radius-lg);
            padding: 28px 20px;
            text-align: center;
            color: var(--ink-400);
            transition: all .2s;
            cursor: pointer;
        }
        .upload-zone:hover {
            border-color: var(--brand-500);
            background: var(--brand-50);
        }

        .example-thumb {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            background: var(--bg-muted);
            border-radius: var(--radius-sm);
            font-size: 12px;
            border: 1px solid var(--line-200);
            cursor: pointer;
            transition: all .15s;
        }
        .example-thumb:hover {
            background: var(--brand-50);
            border-color: var(--brand-300);
        }

        /* Modal */
        .modal-mask {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.65);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(4px);
        }
        .modal-mask.open {
            display: flex;
        }
        .modal {
            background: var(--white);
            border-radius: var(--radius-2xl);
            box-shadow: var(--shadow-xl);
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            overflow: hidden;
            animation: modalIn .2s ease-out;
        }
        @keyframes modalIn {
            from {
                opacity: 0;
                transform: translateY(12px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .modal-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 24px;
            border-bottom: 1px solid var(--line-200);
            background: var(--white);
        }
        .modal-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--ink-900);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 400px;
        }
        .modal-close {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--ink-500);
            padding: 4px;
            display: flex;
            border-radius: var(--radius-sm);
            transition: background .15s;
        }
        .modal-close:hover {
            background: var(--bg-muted);
            color: var(--ink-900);
        }
        .modal-body {
            padding: 20px 24px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .modal-body img {
            max-width: 100%;
            max-height: 65vh;
            border-radius: var(--radius-lg);
            object-fit: contain;
            background: var(--bg-muted);
        }
        .modal-body .no-image {
            color: var(--ink-400);
            padding: 40px 0;
            text-align: center;
        }
        .modal-foot {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            padding: 12px 24px;
            border-top: 1px solid var(--line-200);
            background: var(--bg-subtle);
        }

        /* 空状态提示 */
        .empty-result {
            text-align: center;
            padding: 32px 20px;
            color: var(--ink-400);
        }
        .empty-result svg {
            margin: 0 auto 12px;
            color: var(--ink-300);
        }
        .empty-result .title {
            font-size: 15px;
            font-weight: 500;
            color: var(--ink-600);
            margin-bottom: 4px;
        }
        .empty-result .desc {
            font-size: 13px;
        }
    </style>
</head>
<body>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col overflow-hidden" style="height:100vh;background:var(--bg-subtle);">
        <!-- 返回栏 -->
        <div class="flex items-center justify-between px-8 py-3 flex-shrink-0" style="background:var(--white);border-bottom:1px solid var(--line-200)">
            <button onclick="goBackToList()" style="display:inline-flex;align-items:center;gap:6px;color:#2A66C2;font-weight:500;cursor:pointer;border:none;background:none;font-size:14px;font-family:inherit;padding:0 8px;height:32px;border-radius:6px;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                返回
            </button>
            <span id="pageTitle" style="font-weight:600;color:var(--ink-800);font-size:15px;">项目绿色认定</span>
            <span id="statusBadge" style="font-size:12px;"></span>
        </div>

        <!-- Content -->
        <div class="flex-1 overflow-y-auto custom-scroll" style="padding:24px;">
            <div class="max-w-5xl mx-auto space-y-6">

                <!-- 企业信息 -->
                <div class="section-card">
                    <div style="padding:16px 24px;border-bottom:1px solid var(--line-200);background:var(--bg-subtle);">
                        <span style="font-weight:600;color:var(--ink-900);font-size:15px;">企业信息</span>
                    </div>
                    <div style="padding:20px 24px;">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-3" id="companyInfo">
                            <!-- 由 JS 动态渲染 -->
                        </div>
                    </div>
                </div>

                <!-- 项目信息（只读） -->
                <div class="section-card">
                    <div style="padding:16px 24px;border-bottom:1px solid var(--line-200);background:var(--bg-subtle);">
                        <span style="font-weight:600;color:var(--ink-900);font-size:15px;">项目信息</span>
                    </div>
                    <div style="padding:20px 24px;">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-3" id="projectInfo">
                            <!-- 由 JS 动态渲染 -->
                        </div>
                    </div>
                </div>

                <!-- 绿色智能识别 -->
                <div class="section-card">
                    <div style="padding:16px 24px;border-bottom:1px solid var(--line-200);background:var(--bg-subtle);display:flex;align-items:center;justify-content:space-between;">
                        <span style="font-weight:600;color:var(--ink-900);font-size:15px;">绿色智能识别</span>
                        <span class="tag tag-info">大模型</span>
                    </div>
                    <div style="padding:20px 24px;">
                        <!-- 项目建设内容输入栏 -->
                        <div style="margin-bottom:16px;padding:12px 16px;background:var(--info-bg);border-radius:var(--radius-lg);border:1px solid var(--info-border);">
                            <div style="font-size:13px;color:var(--info);font-weight:500;margin-bottom:6px;">
                                项目建设内容
                            </div>
                            <textarea rows="3" id="projectContent" style="width:100%;padding:8px 12px;border:1px solid var(--line-200);border-radius:var(--radius-md);font-size:14px;font-family:inherit;resize:vertical;outline:none;transition:border .2s;background:var(--white);" onfocus="this.style.borderColor='var(--brand-500)'" onblur="this.style.borderColor='var(--line-200)'"></textarea>
                            <div style="margin-top:10px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
                                <span style="font-size:13px;color:var(--ink-500);">如需重新识别，可修改上述内容后点击：</span>
                                <button class="btn btn-primary btn-sm" onclick="handleRecognize()">模型识别</button>
                            </div>
                        </div>

                        <!-- 智能识别结果 -->
                        <div id="resultSection">
                            <!-- 空状态：未识别项目进入时显示 -->
                            <div id="emptyState" class="empty-result">
                                <svg class="w-16 h-16 mx-auto" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <circle cx="12" cy="12" r="10" stroke="currentColor"/>
                                    <path d="M12 8v4M12 16h.01" stroke="currentColor" stroke-linecap="round"/>
                                </svg>
                                <div class="title">暂未识别</div>
                                <div class="desc">点击上方「模型识别」按钮，AI 将自动分析项目绿色属性</div>
                            </div>

                            <!-- 识别结果内容（默认隐藏） -->
                            <div id="resultContent" style="display:none;">
                                <div style="font-size:13px;font-weight:600;color:var(--ink-800);margin-bottom:8px;">智能识别结果</div>
                                <div style="font-size:13px;color:var(--ink-500);margin-bottom:12px;">绿色金融标准：<span style="color:var(--ink-800);font-weight:500;">《绿色金融支持项目目录（2025年版）》</span></div>

                                <!-- 命中绿色分类 - 卡片式展示 -->
                                <div id="classCards" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px;">
                                    <!-- 由 JS 动态渲染 -->
                                </div>

                                <!-- 识别理由 -->
                                <div class="reason-card" id="reasonCard" style="margin-bottom:12px;">
                                    <div style="font-size:13px;font-weight:600;color:var(--ink-800);margin-bottom:4px;">识别理由</div>
                                    <div id="reasonText" style="font-size:14px;color:var(--ink-700);"></div>
                                </div>

                                <!-- 业务填报建议 -->
                                <div class="suggestion-card" id="suggestionCard">
                                    <div style="font-size:13px;font-weight:600;color:var(--green-700);margin-bottom:4px;">
                                        <svg width="16" height="16" viewBox="0 0 16 16" style="vertical-align:middle"><rect x="2" y="2" width="12" height="12" rx="2" stroke="currentColor" fill="none" stroke-width="1.3"/><line x1="5" y1="6" x2="11" y2="6" stroke="currentColor" stroke-width="1.3"/><line x1="5" y1="9" x2="11" y2="9" stroke="currentColor" stroke-width="1.3"/></svg> 业务填报建议
                                    </div>
                                    <div id="suggestionText" style="font-size:14px;color:var(--ink-700);"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 绿色佐证材料 -->
                <div class="section-card" id="proof-section-wrapper">
                    <div style="padding:16px 24px;border-bottom:1px solid var(--line-200);background:var(--bg-subtle);display:flex;align-items:center;justify-content:space-between;">
                        <span style="font-weight:600;color:var(--ink-900);font-size:15px;">绿色佐证材料</span>
                        <span style="font-size:12px;color:var(--ink-400);" id="proofHint">请点击上方绿色分类卡片查看对应佐证材料</span>
                    </div>
                    <div style="padding:20px 24px;" id="proofContainer">
                        <!-- 由 JS 动态渲染 -->
                        <div class="empty-result" id="proofEmpty" style="padding:24px 20px;">
                            <div class="desc">请先进行模型识别，识别完成后将展示对应的佐证材料清单</div>
                        </div>
                    </div>
                </div>

                <!-- 底部操作栏 -->
                <div style="display:flex;justify-content:flex-end;gap:12px;padding:4px 0 8px;">
                    <button class="btn btn-secondary btn-md" onclick="goBackToList()">返回</button>
                    <button class="btn btn-primary btn-md" onclick="handleSave()">
                        <svg width="16" height="16" viewBox="0 0 16 16" style="vertical-align:middle"><path d="M14 12v3H2v-3M5 6l3 3 3-3M8 9V2" stroke="currentColor" fill="none" stroke-width="1.5"/></svg> 保存
                    </button>
                </div>

            </div>
        </div>
    </main>

    <!-- Modal - 图片预览弹窗 -->
    <div class="modal-mask" id="imageModal">
        <div class="modal">
            <div class="modal-head">
                <span class="modal-title" id="modalTitle">图片预览</span>
                <button class="modal-close" onclick="closeModal()">
                    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M18 6L6 18M6 6l12 12"/></svg>
                </button>
            </div>
            <div class="modal-body" id="modalBody">
                <img id="modalImage" src="" alt="示例图片预览" style="display:none;">
                <div class="no-image" id="noImage" style="display:none;">暂无图片预览</div>
            </div>
            <div class="modal-foot">
                <button class="btn btn-secondary btn-sm" onclick="closeModal()">关闭</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        //  项目预设数据配置
        //  status: 'unidentified' 未识别，'identified' 已识别
        // ============================================================
        const PROJECT_DATA = {
            'PRJ-2026-001': {
                status: 'unidentified',  // 未识别
                company: {
                    name: '贵州乌江水电开发有限责任公司',
                    creditCode: '91520000714735261Y',
                    industry: '水电开发',
                    region: '贵州省 遵义市',
                    business: '乌江流域能源梯级的开发与建设；电力、热力、煤炭、新能源的开发、投资、建设、经营和管理；电能、热能的生产和销售等'
                },
                project: {
                    name: '构皮滩水电站项目建设和营运资金',
                    code: 'PRJ-2026-001',

                container.innerHTML = '';
            }

        // 渲染识别结果
        function renderResult(resultData, showResult) {
            const emptyState = document.getElementById('emptyState');
            const resultContent = document.getElementById('resultContent');
            const proofEmpty = document.getElementById('proofEmpty');
            const proofContainer = document.getElementById('proofContainer');

            if (!resultData || !showResult) {
                // 显示空状态
                emptyState.style.display = 'block';
                resultContent.style.display = 'none';
                proofEmpty.style.display = 'block';
                // 隐藏已渲染的佐证材料
                const existingProofs = proofContainer.querySelectorAll('.proof-section');
                existingProofs.forEach(el => el.remove());
                document.getElementById('proofHint').textContent = '请先进行模型识别，识别完成后将展示对应的佐证材料清单';
                return;
            }

            // 隐藏空状态，显示结果
            emptyState.style.display = 'none';
            resultContent.style.display = 'block';
            proofEmpty.style.display = 'none';
            document.getElementById('proofHint').textContent = '请点击上方绿色分类卡片查看对应佐证材料';

            // 渲染分类卡片
            const cardContainer = document.getElementById('classCards');

            let cardsHtml = '';
            let proofsHtml = '';

            resultData.classes.forEach((cls, index) => {
                const proofId = 'proof-' + (index + 1);
                let hintText = cls.standard || '';
                if (cls.remark) {
                    hintText += (hintText ? '\n\n' : '') + '备注：' + cls.remark;
                }
                hintText = hintText.replace(/\n/g, '<br>');

                cardsHtml += `
                    <div class="green-class-card ${index === 0 ? 'active' : ''}" onclick="selectClass(this, '${proofId}')">
                        <span class="info-hint" title="查看条件/标准">ⓘ
                            <span class="hint-tooltip">${hintText || '暂无详细标准信息'}</span>
                        </span>
                        <div class="level-1">${cls.level1}</div>
                        <div class="level-2">${cls.level2}</div>
                        <div class="level-3">${cls.level3}</div>
                        <div class="check-mark" style="${index === 0 ? 'display:inline;' : 'display:none;'}">✓ 已选</div>
                    </div>
                `;

                const proofItems = getProofItems(cls.level3);
                proofsHtml += `
                    <div class="proof-section ${index === 0 ? 'active' : ''}" id="${proofId}" style="${index === 0 ? '' : 'display:none;'}">
                        <div class="proof-header">
                            <span>📎 ${cls.level3} — 佐证材料清单</span>
                            <span class="tag ${index === 0 ? 'tag-success' : 'tag-default'}">${index === 0 ? '当前分类' : '点击选择'}</span>
                        </div>
                        <div class="proof-body">
                            <div style="font-size:13px;color:var(--ink-600);margin-bottom:12px;">建议提供下列佐证材料：</div>
                            <ul style="list-style:disc;padding-left:20px;margin-bottom:16px;font-size:13px;color:var(--ink-700);">
                                ${proofItems.map(item => `<li>${item}</li>`).join('')}
                            </ul>
                            <div style="font-size:13px;color:var(--ink-500);margin-bottom:8px;">佐证材料示例：</div>
                            <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;">
                                ${getExampleFiles(cls.level3).map(f => `
                                    <span class="example-thumb" onclick="openModal('${f.url}', '${f.name}')">
                                        <svg width="16" height="16" viewBox="0 0 16 16" style="vertical-align:middle"><path d="M4 2h5l4 4v8a1 1 0 01-1 1H4a1 1 0 01-1-1V3a1 1 0 011-1z" stroke="currentColor" fill="none" stroke-width="1.3"/><polyline points="9 2 9 6 13 6" stroke="currentColor" fill="none" stroke-width="1.3"/></svg> ${f.name}
                                    </span>
                                `).join('')}
                            </div>
                            <div class="upload-zone" onclick="alert('触发文件选择器')">
                                <svg class="w-10 h-10 mx-auto text-slate-300 mb-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                                <div>将文件拖拽到此处，或 <span style="color:var(--brand-500);font-weight:500;">点击上传</span></div>
                                <div style="font-size:12px;color:var(--ink-400);margin-top:4px;">支持 docx、pdf、png、jpg、jpeg 格式，单个文件不超过 50M</div>
                            </div>
                            <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;">
                                <span style="display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:var(--success-bg);border-radius:var(--radius-sm);font-size:13px;border:1px solid var(--success-border);">
                                    <svg width="16" height="16" viewBox="0 0 16 16" style="vertical-align:middle"><path d="M4 2h5l4 4v8a1 1 0 01-1 1H4a1 1 0 01-1-1V3a1 1 0 011-1z" stroke="currentColor" fill="none" stroke-width="1.3"/><polyline points="9 2 9 6 13 6" stroke="currentColor" fill="none" stroke-width="1.3"/></svg> 示例材料_${index+1}.pdf
                                    <button style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:14px;" onclick="this.closest('span').remove()">×</button>
                                </span>
                            </div>
                        </div>
                    </div>
                `;
            });

            cardContainer.innerHTML = cardsHtml;

            // 移除旧的佐证材料，插入新的
            const oldProofs = proofContainer.querySelectorAll('.proof-section');
            oldProofs.forEach(el => el.remove());
            // 确保 proofEmpty 被移除或隐藏
            const emptyEl = proofContainer.querySelector('#proofEmpty');
            if (emptyEl) emptyEl.style.display = 'none';
            // 插入新的 proof sections
            proofContainer.insertAdjacentHTML('afterbegin', proofsHtml);

            // 识别理由
            document.getElementById('reasonText').textContent = resultData.reason;
            document.getElementById('suggestionText').textContent = resultData.suggestion;
        }

                '4.1.8 新型储能产品制造（3841锂离子电池制造）': [
                    '储能产品技术规格及性能说明',
                    '储能变流器、电池管理系统等配套设备说明',
                    '安全预警与系统防护技术设备说明',
                    '先进冷却与消防技术设备说明'
                ],
                '5.3.1.1 污水处理、再生利用及污泥处理处置设施建设运营': [
                    '污水处理厂建设项目核准/批复文件',
                    '环境影响报告书及批复',
                    '污水处理工艺设计方案',
                    '排放标准达标证明'
                ],
                '2.1.2.1 重点行业水污染治理': [
                    '重点行业污废水治理设施建设方案',
                    '工业废水循环利用设施建设方案',
                    '既有污水处理设施提标改造方案',
                    '清洁生产审核报告'
                ]
            };
            return map[level3] || [
                '项目立项/备案文件',
                '可行性研究报告及批复',
                '环境影响评价文件',
                '其他相关技术证明文件'
            ];
        }

        // ============================================================
        //  根据绿色分类生成示例文件（使用本地图片）
        //  图片存放在与当前页面同级的 "01GreenIdentifyManagement" 文件夹下
        //  没有对应图片的分类显示 "暂无示例"
        // ============================================================
        function getExampleFiles(level3) {
            const map = {
                '4.2.4 大型水利发电设施建设和运营': [
                    { name: '大型水电批复', url: IMAGE_BASE_PATH + '大型水电批复.png' }
                ],
                '5.2.11 水生态系统旱涝灾害防控及应对': [
                    { name: '蓄滞洪区可行性批复', url: IMAGE_BASE_PATH + '蓄滞洪区可行性批复.png' }
                ],
                '6.5.3 城镇集中供热系统清洁化、低碳化建设运营和改造': [
                    { name: '集中供热批复', url: IMAGE_BASE_PATH + '集中供热批复.png' },
                    { name: '集中供热系统-上大压小、清洁利用', url: IMAGE_BASE_PATH + '集中供热系统-上大压小、清洁利用.png' }
                ],
                '1.2.1 新能源汽车及关键零部件制造（3841锂离子电池制造）': [
                    { name: '新能源汽车关键零部件制造项目批复', url: IMAGE_BASE_PATH + '新能源汽车关键零部件制造项目批复.png' }
                ],
                // 以下分类暂无本地图片，显示 "暂无示例"
                '4.1.8 新型储能产品制造（3841锂离子电池制造）': [
                    { name: '暂无示例', url: '' }
                ],
                '5.3.1.1 污水处理、再生利用及污泥处理处置设施建设运营': [
                    { name: '暂无示例', url: '' }
                ],
                '2.1.2.1 重点行业水污染治理': [
                    { name: '暂无示例', url: '' }
                ]
            };
            // 未在 map 中定义的其他分类，返回 "暂无示例"
            return map[level3] || [
                { name: '暂无示例', url: '' }
            ];
        }

        // 绿色分类卡片点击 -> 联动佐证材料
        function selectClass(el, proofId) {
            document.querySelectorAll('.green-class-card').forEach(c => {
                c.classList.remove('active');
                const mark = c.querySelector('.check-mark');
                if (mark) {
                    mark.style.display = 'none';
                }
            });
            el.classList.add('active');
            const mark = el.querySelector('.check-mark');
            if (mark) {
                mark.style.display = 'inline';
            }

            document.querySelectorAll('.proof-section').forEach(p => {
                p.style.display = 'none';
                p.classList.remove('active');
                const headerTag = p.querySelector('.proof-header .tag');
                if (headerTag) {
                    headerTag.className = 'tag tag-default';
                    headerTag.textContent = '点击选择';
                }
            });

            const target = document.getElementById(proofId);
            if (target) {
                target.style.display = 'block';
                target.classList.add('active');
                const headerTag = target.querySelector('.proof-header .tag');
                if (headerTag) {
                    headerTag.className = 'tag tag-success';
                    headerTag.textContent = '当前分类';
                }
            }
        }

        // 模型识别 - 显示识别结果
        function handleRecognize() {
            const projectId = getProjectId();
            const data = PROJECT_DATA[projectId];
            if (!data || !data.result) {
                alert('未找到该项目的预设识别数据');
                return;
            }
            // 展示识别结果（第二个参数 true 表示展示）
            renderResult(data.result, true);
            // 滚动到结果区域
            const section = document.getElementById('resultContent');
            if (section) {
                section.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        // 保存
        function handleSave() {
            const projectId = getProjectId();
            const data = PROJECT_DATA[projectId];
            if (data) {
                alert('项目「' + data.project.name + '」绿色认定已保存成功！');
            } else {
                alert('保存成功！');
            }
        }

        // ============================================================
        //  图片预览弹窗
        // ============================================================
        function openModal(imageUrl, imageName) {
            const modal = document.getElementById('imageModal');
            const img = document.getElementById('modalImage');
            const noImage = document.getElementById('noImage');
            const title = document.getElementById('modalTitle');

            title.textContent = imageName || '图片预览';

            // 如果 URL 为空或 "暂无示例"，显示"暂无示例"状态
            if (imageUrl) {
                img.src = imageUrl;
                img.style.display = 'block';
                noImage.style.display = 'none';
                img.onerror = function() {
                    img.style.display = 'none';
                    noImage.style.display = 'block';
                    noImage.textContent = '图片加载失败，请检查文件是否存在';
                };
            } else {
                img.style.display = 'none';
                noImage.style.display = 'block';
                noImage.textContent = '暂无示例';
            }

            modal.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('imageModal').classList.remove('open');
            document.body.style.overflow = '';
        }

        document.getElementById('imageModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });

        // ============================================================
        //  返回列表
        // ============================================================
        function goBackToList() {
            var dir = window.location.pathname;
            dir = dir.substring(0, dir.lastIndexOf('/') + 1);
            var targetUrl = dir + '项目绿色认定.html';

            if (window.parent !== window) {
                var pageId = 'project-list-' + Date.now() + '-' + Math.random().toString(36).substr(2, 6);
                window.parent.postMessage({
                    type: 'openPage',
                    pageId: pageId,
                    file: targetUrl,
                    label: '项目绿色识别'
                }, '*');
            } else {
                window.location.href = targetUrl;
            }
        }

        // ============================================================
        //  页面初始化
        // ============================================================
        function init() {
            const projectId = getProjectId();
            const data = PROJECT_DATA[projectId];

            if (!data) {
                document.getElementById('companyInfo').innerHTML = '<div class="info-value" style="grid-column:1/-1;color:var(--danger);">未找到项目数据，请检查 projectId 参数</div>';
                document.getElementById('projectInfo').innerHTML = '<div class="info-value" style="grid-column:1/-1;color:var(--danger);">未找到项目数据</div>';
                return;
            }

            renderCompany(data.company);
            renderProject(data.project);
            renderStatusBadge(data.status);

            // 根据识别状态决定是否展示识别结果
            const isIdentified = data.status === 'identified';
            if (isIdentified && data.result) {
                // 已识别：直接展示识别结果
                renderResult(data.result, true);
            } else {
                // 未识别：显示空状态
                renderResult(null, false);
            }
        }

        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', init);
    </script>
