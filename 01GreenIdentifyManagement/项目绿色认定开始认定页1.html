<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目绿色认定操作 · 可持续金融管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --brand-50: #E8F0FB;
            --brand-100: #D1DFF4;
            --brand-500: #2A66C2;
            --brand-700: #143F8F;
            --brand-900: #01256A;
            --green-50: #ECFDF5;
            --green-500: #10B981;
            --green-700: #047857;
            --success: #10B981;
            --success-bg: #ECFDF5;
            --success-border: #A7F3D0;
            --warning: #D97706;
            --warning-bg: #FFFBEB;
            --warning-border: #FDE68A;
            --danger: #DC2626;
            --danger-bg: #FEF2F2;
            --danger-border: #FECACA;
            --info: #2A66C2;
            --info-bg: #E8F0FB;
            --info-border: #D1DFF4;
            --ink-900: #0F172A;
            --ink-800: #1E293B;
            --ink-600: #475569;
            --ink-500: #64748B;
            --ink-400: #94A3B8;
            --ink-300: #CBD5E1;
            --line-200: #E2E8F0;
            --bg-muted: #F1F5F9;
            --bg-subtle: #F8FAFC;
            --white: #FFFFFF;
            --radius-sm: 4px;
            --radius-md: 6px;
            --radius-lg: 8px;
            --radius-xl: 12px;
            --radius-2xl: 16px;
            --shadow-lg: 0 10px 24px rgba(15, 23, 42, .10), 0 4px 8px rgba(15, 23, 42, .04);
            --shadow-xl: 0 20px 40px rgba(15, 23, 42, .16), 0 8px 16px rgba(15, 23, 42, .06);
            --font-sans: 'PingFang SC', 'Microsoft YaHei', 'Inter', system-ui, sans-serif;
            --font-num: 'Inter', 'SF Pro Display', system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', 'SF Mono', 'Menlo', 'Consolas', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-sans);
            color: var(--ink-800);
            background: var(--bg-subtle);
            font-size: 14px;
            line-height: 1.57;
            -webkit-font-smoothing: antialiased;
        }

        .custom-scroll::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
        .custom-scroll::-webkit-scrollbar-thumb:hover {
            background: var(--brand-500);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border-radius: var(--radius-md);
            font-family: inherit;
            font-weight: 500;
            cursor: pointer;
            transition: all .15s;
            border: 1px solid transparent;
            line-height: 1;
            white-space: nowrap;
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
            line-height: 20px;
            height: 28px;
        }
        .btn-md {
            padding: 8px 16px;
            font-size: 14px;
            line-height: 22px;
            height: 32px;
        }
        .btn-primary {
            background: var(--brand-500);
            color: #fff;
        }
        .btn-primary:hover {
            background: var(--brand-700);
        }
        .btn-secondary {
            background: var(--white);
            color: var(--ink-800);
            border-color: var(--ink-300);
        }
        .btn-secondary:hover {
            border-color: var(--brand-500);
            color: var(--brand-500);
        }
        .btn-success {
            background: var(--green-500);
            color: #fff;
        }
        .btn-success:hover {
            background: var(--green-700);
        }
        .btn-outline-brand {
            background: var(--white);
            color: var(--brand-500);
            border-color: #A3C2E8;
        }
        .btn-outline-brand:hover {
            background: var(--brand-50);
            border-color: var(--brand-500);
        }

        .tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-weight: 500;
            line-height: 1.5;
            border: 1px solid transparent;
            white-space: nowrap;
        }
        .tag-default {
            background: var(--bg-muted);
            color: var(--ink-600);
            border-color: var(--line-200);
        }
        .tag-success {
            background: var(--success-bg);
            color: var(--green-700);
            border-color: var(--success-border);
        }
        .tag-danger {
            background: var(--danger-bg);
            color: var(--danger);
            border-color: var(--danger-border);
        }
        .tag-warning {
            background: var(--warning-bg);
            color: var(--warning);
            border-color: var(--warning-border);
        }
        .tag-info {
            background: var(--info-bg);
            color: var(--info);
            border-color: var(--info-border);
        }
        .tag-identified {
            background: #D1FAE5;
            color: #065F46;
            border-color: #A7F3D0;
        }
        .tag-unidentified {
            background: #FEF3C7;
            color: #92400E;
            border-color: #FDE68A;
        }

        .section-card {
            background: var(--white);
            border-radius: var(--radius-xl);
            border: 1px solid var(--line-200);
            overflow: hidden;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 140px 1fr;
            gap: 6px 16px;
            align-items: baseline;
        }
        .info-label {
            font-size: 13px;
            color: var(--ink-500);
            font-weight: 500;
        }
        .info-value {
            font-size: 14px;
            color: var(--ink-900);
            word-break: break-word;
        }

        .green-class-card {
            border: 2px solid var(--line-200);
            border-radius: var(--radius-lg);
            padding: 12px 16px;
            transition: all .2s;
            cursor: pointer;
            background: var(--white);
            position: relative;
        }
        .green-class-card:hover {
            border-color: var(--brand-300);
            background: var(--brand-50);
        }
        .green-class-card.active {
            border-color: var(--brand-500);
            background: var(--brand-50);
            box-shadow: 0 0 0 3px rgba(42, 102, 194, 0.15);
        }
        .green-class-card .level-1 {
            font-size: 14px;
            font-weight: 600;
            color: var(--ink-800);
        }
        .green-class-card .level-2 {
            font-size: 13px;
            color: var(--ink-600);
            margin-top: 2px;
        }
        .green-class-card .level-3 {
            font-size: 13px;
            color: var(--brand-700);
            font-weight: 500;
            margin-top: 2px;
        }
        .green-class-card .check-mark {
            display: none;
            color: var(--brand-500);
            font-weight: 600;
        }
        .green-class-card.active .check-mark {
            display: inline;
        }
        .green-class-card .info-hint {
            position: absolute;
            top: 8px;
            right: 12px;
            color: var(--ink-400);
            cursor: pointer;
            font-size: 16px;
            transition: color .2s;
        }
        .green-class-card .info-hint:hover {
            color: var(--brand-500);
        }
        .hint-tooltip {
            display: none;
            position: absolute;
            right: 0;
            top: 100%;
            margin-top: 6px;
            background: var(--ink-900);
            color: #fff;
            font-size: 12px;
            font-weight: 400;
            padding: 10px 14px;
            border-radius: var(--radius-md);
            max-width: 380px;
            width: max-content;
            z-index: 50;
            line-height: 1.6;
            box-shadow: var(--shadow-lg);
            text-align: left;
        }
        .hint-tooltip::before {
            content: '';
            position: absolute;
            right: 12px;
            top: -6px;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-bottom: 6px solid var(--ink-900);
        }
        .green-class-card:hover .hint-tooltip {
            display: block;
        }

        .reason-card {
            background: var(--bg-muted);
            border-radius: var(--radius-lg);
            padding: 16px;
            border-left: 3px solid var(--brand-500);
        }
        .suggestion-card {
            background: var(--green-50);
            border-radius: var(--radius-lg);
            padding: 16px;
            border-left: 3px solid var(--green-500);
        }

        .proof-section {
            border: 1px solid var(--line-200);
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: all .3s;
        }
        .proof-section .proof-header {
            padding: 12px 16px;
            background: var(--bg-muted);
            font-weight: 500;
            font-size: 14px;
            color: var(--ink-700);
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: default;
        }
        .proof-section .proof-body {
            padding: 16px;
            background: var(--white);
        }
        .proof-section.active {
            border-color: var(--brand-500);
            box-shadow: 0 0 0 2px rgba(42, 102, 194, 0.1);
        }

        .upload-zone {
            border: 2px dashed var(--line-200);
            border-radius: var(--radius-lg);
            padding: 28px 20px;
            text-align: center;
            color: var(--ink-400);
            transition: all .2s;
            cursor: pointer;
        }
        .upload-zone:hover {
            border-color: var(--brand-500);
            background: var(--brand-50);
        }

        .example-thumb {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            background: var(--bg-muted);
            border-radius: var(--radius-sm);
            font-size: 12px;
            border: 1px solid var(--line-200);
            cursor: pointer;
            transition: all .15s;
        }
        .example-thumb:hover {
            background: var(--brand-50);
            border-color: var(--brand-300);
        }

        .modal-mask {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.65);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(4px);
        }
        .modal-mask.open {
            display: flex;
        }
        .modal {
            background: var(--white);
            border-radius: var(--radius-2xl);
            box-shadow: var(--shadow-xl);
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            overflow: hidden;
            animation: modalIn .2s ease-out;
        }
        @keyframes modalIn {
            from {
                opacity: 0;
                transform: translateY(12px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .modal-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 24px;
            border-bottom: 1px solid var(--line-200);
            background: var(--white);
        }
        .modal-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--ink-900);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 400px;
        }
        .modal-close {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--ink-500);
            padding: 4px;
            display: flex;
            border-radius: var(--radius-sm);
            transition: background .15s;
        }
        .modal-close:hover {
            background: var(--bg-muted);
            color: var(--ink-900);
        }
        .modal-body {
            padding: 20px 24px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .modal-body img {
            max-width: 100%;
            max-height: 65vh;
            border-radius: var(--radius-lg);
            object-fit: contain;
            background: var(--bg-muted);
        }
        .modal-body .no-image {
            color: var(--ink-400);
            padding: 40px 0;
            text-align: center;
        }
        .modal-foot {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            padding: 12px 24px;
            border-top: 1px solid var(--line-200);
            background: var(--bg-subtle);
        }

        .empty-result {
            text-align: center;
            padding: 32px 20px;
            color: var(--ink-400);
        }
        .empty-result svg {
            margin: 0 auto 12px;
            color: var(--ink-300);
        }
        .empty-result .title {
            font-size: 15px;
            font-weight: 500;
            color: var(--ink-600);
            margin-bottom: 4px;
        }
        .empty-result .desc {
            font-size: 13px;
        }
    </style>
    <script src="../i18n.js"></script>
</head>
<body>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col overflow-hidden" style="height:100vh;background:var(--bg-subtle);">
        <!-- 返回栏 -->
        <div class="flex items-center justify-between px-8 py-3 flex-shrink-0" style="background:var(--white);border-bottom:1px solid var(--line-200)">
            <button onclick="goBackToList()" style="display:inline-flex;align-items:center;gap:6px;color:#2A66C2;font-weight:500;cursor:pointer;border:none;background:none;font-size:14px;font-family:inherit;padding:0 8px;height:32px;border-radius:6px;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                <span data-i18n="back">返回</span>
            </button>
            <span id="pageTitle" style="font-weight:600;color:var(--ink-800);font-size:15px;">项目绿色认定</span>
            <span id="statusBadge" style="font-size:12px;"></span>
        </div>

        <!-- Content -->
        <div class="flex-1 overflow-y-auto custom-scroll" style="padding:24px;">
            <div class="max-w-5xl mx-auto space-y-6">

                <!-- 企业信息 -->
                <div class="section-card">
                    <div style="padding:16px 24px;border-bottom:1px solid var(--line-200);background:var(--bg-subtle);">
                        <span style="font-weight:600;color:var(--ink-900);font-size:15px;" data-i18n="sec_enterprise">企业信息</span>
                    </div>
                    <div style="padding:20px 24px;">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-3" id="companyInfo">
                        </div>
                    </div>
                </div>

                <!-- 项目信息 -->
                <div class="section-card">
                    <div style="padding:16px 24px;border-bottom:1px solid var(--line-200);background:var(--bg-subtle);">
                        <span style="font-weight:600;color:var(--ink-900);font-size:15px;" data-i18n="sec_project">项目信息</span>
                    </div>
                    <div style="padding:20px 24px;">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-3" id="projectInfo">
                        </div>
                    </div>
                </div>

                <!-- 绿色智能识别 -->
                <div class="section-card">
                    <div style="padding:16px 24px;border-bottom:1px solid var(--line-200);background:var(--bg-subtle);display:flex;align-items:center;justify-content:space-between;">
                        <span style="font-weight:600;color:var(--ink-900);font-size:15px;" data-i18n="sec_ai">绿色智能识别</span>
                        <span class="tag tag-info" data-i18n="llm">大模型</span>
                    </div>
                    <div style="padding:20px 24px;">
                        <div style="margin-bottom:16px;padding:12px 16px;background:var(--info-bg);border-radius:var(--radius-lg);border:1px solid var(--info-border);">
                            <div style="font-size:13px;color:var(--info);font-weight:500;margin-bottom:6px;" data-i18n="project_content">
                                项目建设内容
                            </div>
                            <textarea rows="3" id="projectContent" style="width:100%;padding:8px 12px;border:1px solid var(--line-200);border-radius:var(--radius-md);font-size:14px;font-family:inherit;resize:vertical;outline:none;transition:border .2s;background:var(--white);" onfocus="this.style.borderColor='var(--brand-500)'" onblur="this.style.borderColor='var(--line-200)'"></textarea>
                            <div style="margin-top:10px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
                                <span style="font-size:13px;color:var(--ink-500);" data-i18n="project_content_retry">如需重新识别，可修改上述内容后点击：</span>
                                <button class="btn btn-primary btn-sm" onclick="handleRecognize()" data-i18n="model_identify">模型识别</button>
                            </div>
                        </div>

                        <div id="resultSection">
                            <div id="emptyState" class="empty-result">
                                <svg class="w-16 h-16 mx-auto" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <circle cx="12" cy="12" r="10" stroke="currentColor"/>
                                    <path d="M12 8v4M12 16h.01" stroke="currentColor" stroke-linecap="round"/>
                                </svg>
                                <div class="title" data-i18n="pending_title">暂未识别</div>
                                <div class="desc" data-i18n="pending_desc">点击上方「模型识别」按钮，AI 将自动分析项目绿色属性</div>
                            </div>

                            <div id="resultContent" style="display:none;">
                                <div style="font-size:13px;font-weight:600;color:var(--ink-800);margin-bottom:8px;" data-i18n="ai_result">智能识别结果</div>
                                <div style="font-size:13px;color:var(--ink-500);margin-bottom:12px;">
                                    <span data-i18n="gf_standard">绿色金融标准：</span>
                                    <span style="color:var(--ink-800);font-weight:500;" data-i18n="gf_standard_name">《绿色金融支持项目目录（2025年版）》</span>
                                </div>

                                <div id="classCards" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px;">
                                </div>

                                <div class="reason-card" id="reasonCard" style="margin-bottom:12px;">
                                    <div style="font-size:13px;font-weight:600;color:var(--ink-800);margin-bottom:4px;" data-i18n="id_reason">识别理由</div>
                                    <div id="reasonText" style="font-size:14px;color:var(--ink-700);"></div>
                                </div>

                                <div class="suggestion-card" id="suggestionCard">
                                    <div style="font-size:13px;font-weight:600;color:var(--green-700);margin-bottom:4px;">
                                        <svg width="16" height="16" viewBox="0 0 16 16" style="vertical-align:middle"><rect x="2" y="2" width="12" height="12" rx="2" stroke="currentColor" fill="none" stroke-width="1.3"/><line x1="5" y1="6" x2="11" y2="6" stroke="currentColor" stroke-width="1.3"/><line x1="5" y1="9" x2="11" y2="9" stroke="currentColor" stroke-width="1.3"/></svg>
                                        <span data-i18n="suggestion">业务填报建议</span>
                                    </div>
                                    <div id="suggestionText" style="font-size:14px;color:var(--ink-700);"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 绿色佐证材料 -->
                <div class="section-card" id="proof-section-wrapper">
                    <div style="padding:16px 24px;border-bottom:1px solid var(--line-200);background:var(--bg-subtle);display:flex;align-items:center;justify-content:space-between;">
                        <span style="font-weight:600;color:var(--ink-900);font-size:15px;" data-i18n="green_evidence">绿色佐证材料</span>
                        <span style="font-size:12px;color:var(--ink-400);" id="proofHint">请点击上方绿色分类卡片查看对应佐证材料</span>
                    </div>
                    <div style="padding:20px 24px;" id="proofContainer">
                        <div class="empty-result" id="proofEmpty" style="padding:24px 20px;">
                            <div class="desc" data-i18n="proof_hint_idle">请先进行模型识别，识别完成后将展示对应的佐证材料清单</div>
                        </div>
                    </div>
                </div>

                <div style="display:flex;justify-content:flex-end;gap:12px;padding:4px 0 8px;">
                    <button class="btn btn-secondary btn-md" onclick="goBackToList()"><span data-i18n="back">返回</span></button>
                    <button class="btn btn-primary btn-md" onclick="handleSave()">
                        <svg width="16" height="16" viewBox="0 0 16 16" style="vertical-align:middle"><path d="M14 12v3H2v-3M5 6l3 3 3-3M8 9V2" stroke="currentColor" fill="none" stroke-width="1.5"/></svg>
                        <span data-i18n="save">保存</span>
                    </button>
                </div>

            </div>
        </div>
    </main>

    <!-- Modal -->
    <div class="modal-mask" id="imageModal">
        <div class="modal">
            <div class="modal-head">
                <span class="modal-title" id="modalTitle" data-i18n="preview">图片预览</span>
                <button class="modal-close" onclick="closeModal()">
                    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M18 6L6 18M6 6l12 12"/></svg>
                </button>
            </div>
            <div class="modal-body" id="modalBody">
                <img id="modalImage" src="" alt="" style="display:none;">
                <div class="no-image" id="noImage" style="display:none;" data-i18n="no_image">暂无图片预览</div>
            </div>
            <div class="modal-foot">
                <button class="btn btn-secondary btn-sm" onclick="closeModal()" data-i18n="close">关闭</button>
            </div>
        </div>
    </div>

    <script>
        var PROJECT_DATA = {
            'PRJ-2026-001': {
                status: 'unidentified',
                company: {
                    name: '贵州乌江水电开发有限责任公司',
                    creditCode: '91520000714735261Y',
                    industry: '水电开发',
                    region: '贵州省 遵义市',
                    business: '乌江流域能源梯级的开发与建设；电力、热力、煤炭、新能源的开发、投资、建设、经营和管理；电能、热能的生产和销售等'
                },
                project: {
                    name: '构皮滩水电站项目建设和营运资金',
                    code: 'PRJ-2026-001',
                    industry: '水电开发',
                    location: '贵州省 遵义市 构皮滩',
                    content: '乌江流域能源梯级开发，构皮滩水电站项目建设及营运。'
                },
                result: {

        function renderResult(resultData, showResult) {
            var emptyState = document.getElementById('emptyState');
            var resultContent = document.getElementById('resultContent');
            var proofEmpty = document.getElementById('proofEmpty');

            if (!resultData || !showResult) {
                emptyState.style.display = 'block';
                resultContent.style.display = 'none';
                proofEmpty.style.display = 'block';
                var existingProofs = proofContainer.querySelectorAll('.proof-section');
                for (var i = 0; i < existingProofs.length; i++) existingProofs[i].remove();
                document.getElementById('proofHint').textContent = I18N.t('proof_hint_idle');
                return;
            }

            emptyState.style.display = 'none';
            resultContent.style.display = 'block';
            proofEmpty.style.display = 'none';
            document.getElementById('proofHint').textContent = I18N.t('proof_hint_select');

            var cardContainer = document.getElementById('classCards');
            var cardsHtml = '';
            var proofsHtml = '';

            resultData.classes.forEach(function(cls, index) {
                var proofId = 'proof-' + (index + 1);
                var hintText = cls.standard ? I18N.t(cls.standard) : '';
                if (cls.remark) {
                    hintText += (hintText ? '\n\n' : '') + I18N.t('remark_label') + I18N.t(cls.remark);
                }
                hintText = hintText.replace(/\n/g, '<br>');

                var tL1 = I18N.t(cls.level1);
                var tL2 = I18N.t(cls.level2);
                var tL3 = I18N.t(cls.level3);

                cardsHtml +=
                    '<div class="green-class-card' + (index === 0 ? ' active' : '') + '" onclick="selectClass(this, \'' + proofId + '\')">' +

                        '<div class="level-2">' + tL2 + '</div>' +
                        '<div class="level-3">' + tL3 + '</div>' +
                        '<div class="check-mark" style="' + (index === 0 ? 'display:inline;' : 'display:none;') + '">' + I18N.t('selected') + '</div>' +
                    '</div>';

                var proofItems = getProofItems(cls.level3);
                proofsHtml +=
                    '<div class="proof-section' + (index === 0 ? ' active' : '') + '" id="' + proofId + '" style="' + (index === 0 ? '' : 'display:none;') + '">' +
                        '<div class="proof-header">' +

                            '<ul style="list-style:disc;padding-left:20px;margin-bottom:16px;font-size:13px;color:var(--ink-700);">' +
                                proofItems.map(function(item) { return '<li>' + I18N.t(item) + '</li>'; }).join('') +
                            '</ul>' +
                            '<div style="font-size:13px;color:var(--ink-500);margin-bottom:8px;">' + I18N.t('evidence_examples') + '</div>' +
                            '<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;">' +

        function selectClass(el, proofId) {
            var allCards = document.querySelectorAll('.green-class-card');
            for (var i = 0; i < allCards.length; i++) {
                allCards[i].classList.remove('active');
                var mk = allCards[i].querySelector('.check-mark');
                if (mk) mk.style.display = 'none';
            }
            el.classList.add('active');
            var mark = el.querySelector('.check-mark');
            if (mark) mark.style.display = 'inline';

            var allProofs = document.querySelectorAll('.proof-section');
            for (var j = 0; j < allProofs.length; j++) {
                allProofs[j].style.display = 'none';
                allProofs[j].classList.remove('active');
                var hTag = allProofs[j].querySelector('.proof-header .tag');
                if (hTag) {
                    hTag.className = 'tag tag-default';
                    hTag.textContent = I18N.t('click_select');
                }
            }

            var target = document.getElementById(proofId);
            if (target) {
                target.style.display = 'block';
                target.classList.add('active');
                var hTag = target.querySelector('.proof-header .tag');
                if (hTag) {
                    hTag.className = 'tag tag-success';
                    hTag.textContent = I18N.t('current_cat');
                }
            }
        }

        function handleRecognize() {
            var projectId = getProjectId();
            var data = PROJECT_DATA[projectId];
            if (!data || !data.result) {
                alert(I18N.t('no_identify_data'));
                return;
            }
            renderResult(data.result, true);
            var section = document.getElementById('resultContent');
            if (section) section.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function handleSave() {
            var projectId = getProjectId();
            var data = PROJECT_DATA[projectId];
            if (data) {
                alert(I18N.t('project_label') + '「' + data.project.name + '」' + I18N.t('save_success'));
            } else {
                alert(I18N.t('save_ok'));
            }
        }

        function openModal(imageUrl, imageName) {
            var modal = document.getElementById('imageModal');
            var img = document.getElementById('modalImage');
            var noImage = document.getElementById('noImage');
            var title = document.getElementById('modalTitle');

            title.textContent = imageName || I18N.t('preview');

            if (imageUrl) {
                img.src = imageUrl;
                img.style.display = 'block';
                noImage.style.display = 'none';
                img.onerror = function() {
                    img.style.display = 'none';
                    noImage.style.display = 'block';
                    noImage.textContent = I18N.t('load_fail');
                };
            } else {
                img.style.display = 'none';
                noImage.style.display = 'block';
                noImage.textContent = I18N.t('no_example');
            }

            modal.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('imageModal').classList.remove('open');
            document.body.style.overflow = '';
        }

        document.getElementById('imageModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });

        function goBackToList() {
            var dir = window.location.pathname;
            dir = dir.substring(0, dir.lastIndexOf('/') + 1);
            var targetUrl = dir + '项目绿色认定.html';
            if (window.parent !== window) {
                var pageId = 'project-list-' + Date.now() + '-' + Math.random().toString(36).substr(2, 6);
                window.parent.postMessage({
                    type: 'openPage', pageId: pageId, file: targetUrl, label: '项目绿色识别'
                }, '*');
            } else {
                window.location.href = targetUrl;
            }
        }

        function init() {
            var projectId = getProjectId();
            var data = PROJECT_DATA[projectId];
            if (!data) {
                document.getElementById('companyInfo').innerHTML = '<div class="info-value" style="grid-column:1/-1;color:var(--danger);">' + I18N.t('no_data_check') + '</div>';
                document.getElementById('projectInfo').innerHTML = '<div class="info-value" style="grid-column:1/-1;color:var(--danger);">' + I18N.t('no_data_project') + '</div>';
                return;
            }
            renderCompany(data.company);
            renderProject(data.project);
            renderStatusBadge(data.status);
            // 设置项目内容文本框默认值
            var pcTextarea = document.getElementById('projectContent');
            if (pcTextarea && data.project.content) {
                pcTextarea.value = I18N.t(data.project.content);
            }
            var isIdentified = data.status === 'identified';
            if (isIdentified && data.result) {
                renderResult(data.result, true);
            } else {
                renderResult(null, false);
            }
        }

        function rerenderAll() {
            var projectId = getProjectId();
            var data = PROJECT_DATA[projectId];
            if (!data) return;
            renderCompany(data.company);
            renderProject(data.project);
            renderStatusBadge(data.status);
            // 更新项目内容文本框为当前语言
            var pcTextarea = document.getElementById('projectContent');
            if (pcTextarea && data.project.content) {
                pcTextarea.value = I18N.t(data.project.content);
            }
            var isIdentified = data.status === 'identified';
            if (isIdentified && data.result) {
                renderResult(data.result, true);
            } else {
                renderResult(null, false);
            }
            document.title = I18N.t('pageTitle');
        }

        var _prevOnLangChange = window.onLangChange;
        window.onLangChange = function(lang) {
            if (typeof _prevOnLangChange === 'function') _prevOnLangChange(lang);
            document.documentElement.lang = lang === 'en' ? 'en' : 'zh-CN';
            rerenderAll();
        };

        document.addEventListener('DOMContentLoaded', init);
    </script>
