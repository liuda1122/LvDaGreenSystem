<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="title">S68绿色融资统计报表 · 可持续金融管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --brand-50:#E8F0FB;--brand-100:#D1DFF4;--brand-500:#2A66C2;--brand-700:#143F8F;--brand-900:#01256A;
            --green-50:#ECFDF5;--green-500:#10B981;--green-700:#047857;
            --success:#10B981;--success-bg:#ECFDF5;--success-border:#A7F3D0;
            --warning:#D97706;--warning-bg:#FFFBEB;--warning-border:#FDE68A;
            --danger:#DC2626;--danger-bg:#FEF2F2;--danger-border:#FECACA;
            --ink-900:#0F172A;--ink-800:#1E293B;--ink-600:#475569;--ink-500:#64748B;--ink-400:#94A3B8;--ink-300:#CBD5E1;
            --line-200:#E2E8F0;--bg-muted:#F1F5F9;--bg-subtle:#F8FAFC;--white:#FFFFFF;
            --radius-sm:4px;--radius-md:6px;--radius-lg:8px;--radius-xl:12px;--radius-2xl:16px;
            --font-sans:'PingFang SC','Microsoft YaHei','Inter',system-ui,sans-serif;
            --font-num:'Inter','SF Pro Display',system-ui,sans-serif;
        }
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:var(--font-sans);color:var(--ink-800);background:var(--bg-subtle);font-size:14px;line-height:1.57;-webkit-font-smoothing:antialiased;height:100vh;overflow:hidden}
        .custom-scroll::-webkit-scrollbar{width:6px;height:6px}
        .custom-scroll::-webkit-scrollbar-track{background:transparent}
        .custom-scroll::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
        .custom-scroll::-webkit-scrollbar-thumb:hover{background:var(--brand-500)}
        .btn{display:inline-flex;align-items:center;gap:6px;border-radius:var(--radius-md);font-family:inherit;font-weight:500;cursor:pointer;transition:all .15s;border:1px solid transparent;line-height:1;white-space:nowrap}
        .btn-sm{padding:6px 12px;font-size:12px;line-height:20px;height:28px}
        .btn-primary{background:var(--brand-500);color:#fff}.btn-primary:hover{background:var(--brand-700)}
        .btn-secondary{background:var(--white);color:var(--ink-800);border-color:var(--ink-300)}.btn-secondary:hover{border-color:var(--brand-500);color:var(--brand-500)}
        .btn-outline-brand{background:var(--white);color:var(--brand-500);border-color:#A3C2E8}.btn-outline-brand:hover{background:var(--brand-50);border-color:var(--brand-500)}
        .btn-deep-blue{background:var(--brand-700);color:#fff}.btn-deep-blue:hover{background:var(--brand-900)}
        .btn-light-blue{background:var(--brand-100);color:var(--brand-700);border-color:var(--brand-300)}.btn-light-blue:hover{background:var(--brand-50);border-color:var(--brand-500)}
        .tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:var(--radius-sm);font-size:12px;font-weight:500;line-height:1.5;border:1px solid transparent;white-space:nowrap}
        .tag-success{background:var(--success-bg);color:var(--green-700);border-color:var(--success-border)}
        .tag-warning{background:var(--warning-bg);color:var(--warning);border-color:var(--warning-border)}
        .section-card{background:var(--white);border-radius:var(--radius-xl);border:1px solid var(--line-200);overflow:hidden;height:100%;display:flex;flex-direction:column}
        .table-wrap{overflow:auto;flex:1;position:relative}
        .table-wrap table{width:100%;border-collapse:separate;border-spacing:0;font-size:13px;min-width:1100px}
        .table-wrap thead{position:sticky;top:0;z-index:10}
        .table-wrap th{background:var(--bg-muted);padding:10px 14px;text-align:left;font-weight:600;color:var(--ink-600);border-bottom:1px solid var(--line-200);white-space:nowrap;font-size:12px}
        .table-wrap td{padding:10px 14px;border-bottom:1px solid var(--line-200);vertical-align:middle;white-space:nowrap}
        .table-wrap tbody tr:hover{background:var(--bg-subtle)}
        .table-wrap .col-seq{width:50px;text-align:center;color:var(--ink-400)}
        .table-wrap .col-actions{position:sticky;right:0;background:var(--white);z-index:5;min-width:90px;box-shadow:-4px 0 12px rgba(0,0,0,0.06)}
        .table-wrap thead .col-actions{background:var(--bg-muted);z-index:11}
        .table-wrap tbody tr:hover .col-actions{background:var(--bg-subtle)}
        .table-wrap .col-actions .action-btns{display:flex;gap:4px;flex-wrap:nowrap}
        .filter-row{display:flex;flex-wrap:wrap;align-items:flex-end;gap:12px 16px}
        .filter-group{display:flex;flex-direction:column;gap:4px;min-width:150px;flex:1 0 auto}
        .filter-group label{font-size:12px;color:var(--ink-500);font-weight:500}
        .filter-group input,.filter-group select{padding:6px 10px;border:1px solid var(--line-200);border-radius:var(--radius-md);font-size:13px;background:var(--white);outline:none;width:100%}
        .filter-group input:focus,.filter-group select:focus{border-color:var(--brand-500)}
    </style>
    <script src="../i18n.js"></script>
</head>
<body>
<div class="flex flex-col" style="height:100vh;background:var(--bg-subtle);">
    <div class="flex-1 overflow-hidden" style="padding:16px 24px 24px 24px;">
        <div class="section-card" style="height:100%;">
            <!-- 筛选栏 -->
            <div style="padding:16px 24px;border-bottom:1px solid var(--line-200);background:var(--bg-subtle);flex-shrink:0;">
                <div class="filter-row">
                    <div class="filter-group" style="min-width:160px;flex:1;"><label data-i18n="filter_period">报表期间（季度）</label><select id="selPeriod"><option value="" data-i18n="all_periods">全部期间</option><option value="2025Q2" data-i18n="q2_2025">2025年第二季度</option><option value="2025Q1" data-i18n="q1_2025">2025年第一季度</option><option value="2024Q4" data-i18n="q4_2024">2024年第四季度</option><option value="2024Q3" data-i18n="q3_2024">2024年第三季度</option><option value="2024Q2" data-i18n="q2_2024">2024年第二季度</option><option value="2024Q1" data-i18n="q1_2024">2024年第一季度</option></select></div>
                    <div class="filter-group" style="flex:0 0 auto;flex-direction:row;align-items:flex-end;gap:8px;padding-bottom:1px;">
                        <button class="btn btn-primary btn-sm" onclick="filterData()" data-i18n="search">查询</button>
                        <button class="btn btn-secondary btn-sm" onclick="resetFilter()" data-i18n="reset">重置</button>
                    </div>
                </div>
            </div>
            <!-- 操作栏 -->
            <div class="flex items-center justify-between px-6 py-3 border-b border-slate-100 flex-shrink-0" id="statsBar">
                <span class="text-sm text-slate-400" id="totalCountText" data-i18n-html="total_count">共 6 条（按季生成）</span>
            </div>
            <!-- 表格 -->
            <div class="table-wrap custom-scroll">
                <table>
                    <thead>
                        <tr>
                            <th class="col-seq" data-i18n="th_seq">序号</th>
                            <th data-i18n="th_name">报表名称</th>
                            <th data-i18n="th_code">报表编号</th>
                            <th data-i18n="th_period">报表期间</th>
                            <th data-i18n="th_total_balance">绿色贷款余额（万元）</th>
                            <th data-i18n="th_indicator_count">指标条目数</th>
                            <th data-i18n="th_gen_time">生成时间</th>
                            <th data-i18n="th_submit_time">报送时间</th>
                            <th class="col-actions" data-i18n="th_actions">操作</th>
                        </tr>
                    </thead>
                    <tbody id="reportTableBody">
                    </tbody>
                </table>
            </div>
            <!-- 分页 -->
            <div class="flex items-center justify-between px-6 py-3 border-t border-slate-100 flex-shrink-0" id="paginationBar">
                <span class="text-sm text-slate-400" id="totalRecords">共 6 条</span>
                <div class="flex items-center gap-2">
                    <button class="btn btn-secondary btn-sm" disabled>&#x2039;</button>
                    <span class="px-2 py-1 text-sm bg-brand-500 text-white rounded">1</span>
                    <button class="btn btn-secondary btn-sm" disabled>&#x203A;</button>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    // ==================== I18N 页级字典 ====================
    I18N.setDict({
        title: {zh:'S68绿色融资统计报表 · 可持续金融管理系统', en:'S68 Green Financing Statistics · Sustainable Finance System'},
        filter_period: {zh:'报表期间（季度）', en:'Report Period (Quarter)'},
        all_periods: {zh:'全部期间', en:'All Periods'},
        q2_2025: {zh:'2025年第二季度', en:'2025 Q2'},
        q1_2025: {zh:'2025年第一季度', en:'2025 Q1'},
        q4_2024: {zh:'2024年第四季度', en:'2024 Q4'},
        q3_2024: {zh:'2024年第三季度', en:'2024 Q3'},
        q2_2024: {zh:'2024年第二季度', en:'2024 Q2'},
        q1_2024: {zh:'2024年第一季度', en:'2024 Q1'},
        search: {zh:'查询', en:'Search'},
        reset: {zh:'重置', en:'Reset'},
        th_seq: {zh:'序号', en:'#'},
        th_name: {zh:'报表名称', en:'Report Name'},
        th_code: {zh:'报表编号', en:'Report No.'},
        th_period: {zh:'报表期间', en:'Period'},
        th_total_balance: {zh:'绿色贷款余额（万元）', en:'Green Loan Balance (10k CNY)'},
        th_indicator_count: {zh:'指标条目数', en:'Indicator Count'},
        th_gen_time: {zh:'生成时间', en:'Generated'},
        th_submit_time: {zh:'报送时间', en:'Submitted'},
        th_actions: {zh:'操作', en:'Actions'},
        action_view: {zh:'查看详情', en:'View Details'},
        action_download: {zh:'下载Excel', en:'Download Excel'},
        confirm_download: {zh:'确认下载 S68-{0} 报表Excel文件？', en:'Confirm download S68-{0} report Excel file?'},
        download_ok: {zh:'下载成功！\n\n文件：S68绿色融资统计表_{0}.xlsx', en:'Download successful!\n\nFile: S68 Green Financing Statistics_{0}.xlsx'},
        no_submit: {zh:'—', en:'—'},
        total_count_tmpl: {zh:'共 {0} 条（按季生成）', en:'{0} records (generated quarterly)'},
        total_records_tmpl: {zh:'共 {0} 条', en:'Total: {0} records'},
        report_name_prefix: {zh:'S68绿色融资统计表', en:'S68 Green Financing Statistical Report'}
    });

    // ==================== 数据 ====================
    var reportData = [
        {seq:1, period:'2025Q2', code:'S68-2025Q2', balance:'156,832.50', indicatorCount:326, genTime:'2025-07-01 00:05', submitTime:''},
        {seq:2, period:'2025Q1', code:'S68-2025Q1', balance:'142,156.80', indicatorCount:326, genTime:'2025-04-01 00:03', submitTime:'2025-04-08 14:30'},
        {seq:3, period:'2024Q4', code:'S68-2024Q4', balance:'138,920.30', indicatorCount:326, genTime:'2025-01-01 00:04', submitTime:'2025-01-07 10:15'},
        {seq:4, period:'2024Q3', code:'S68-2024Q3', balance:'135,468.20', indicatorCount:326, genTime:'2024-10-01 00:05', submitTime:'2024-10-10 09:20'},
        {seq:5, period:'2024Q2', code:'S68-2024Q2', balance:'128,765.00', indicatorCount:326, genTime:'2024-07-01 00:06', submitTime:'2024-07-05 16:45'},
        {seq:6, period:'2024Q1', code:'S68-2024Q1', balance:'122,340.00', indicatorCount:326, genTime:'2024-04-01 00:02', submitTime:'2024-04-03 11:00'}
    ];

    var filteredData = reportData.slice();

    function formatT(key, replacements){
        var result = I18N.t(key);
        if(replacements){
            for(var i=0; i<replacements.length; i++){
                result = result.replace('{'+i+'}', replacements[i]);
            }
        }
        return result;
    }

    function renderTable(){
        var tbody = document.getElementById('reportTableBody');
        var html = '';
        for(var i=0; i<filteredData.length; i++){
            var r = filteredData[i];
            var reportName = I18N.t('report_name_prefix') + '-' + r.period;
            var periodText = I18N.t(r.period.toLowerCase().replace('q','q_'));
            var submitTime = r.submitTime || I18N.t('no_submit');
            html += '<tr>'+
                '<td class="col-seq">'+r.seq+'</td>'+
                '<td style="font-weight:500;color:var(--brand-700);">'+reportName+'</td>'+
                '<td style="font-family:monospace;font-size:12px;">'+r.code+'</td>'+
                '<td>'+periodText+'</td>'+
                '<td style="font-family:var(--font-num);text-align:right;">'+r.balance+'</td>'+
                '<td style="font-family:var(--font-num);text-align:right;">'+r.indicatorCount+'</td>'+
                '<td>'+r.genTime+'</td>'+
                '<td>'+submitTime+'</td>'+
                '<td class="col-actions"><div class="action-btns">'+
                    '<button class="btn btn-outline-brand btn-sm" onclick="goToDetail(\''+r.period+'\')" data-i18n="action_view">'+I18N.t('action_view')+'</button>'+
                    '<button class="btn btn-secondary btn-sm" onclick="downloadReport(\''+r.code.split('-')[1]+'\')" data-i18n="action_download">'+I18N.t('action_download')+'</button>'+
                '</div></td>'+
            '</tr>';
        }
        tbody.innerHTML = html;
    }

    function renderStatsBar(){
        var total = filteredData.length;
        document.getElementById('totalCountText').textContent = formatT('total_count_tmpl', [total]);
        document.getElementById('totalRecords').textContent = formatT('total_records_tmpl', [total]);
    }

    function filterData(){
        var selPeriod = document.getElementById('selPeriod').value;
        filteredData = reportData.filter(function(r){
            if(selPeriod && r.period !== selPeriod) return false;
            return true;
        });
        renderTable();
        renderStatsBar();
    }

    function resetFilter(){
        document.getElementById('selPeriod').value = '';
        filteredData = reportData.slice();
        renderTable();
        renderStatsBar();
    }

    // ==================== 语言切换回调 ====================
    window.onLangChange = function(lang){
        renderTable();
        renderStatsBar();
    };

    // ==================== 业务函数 ====================
    function getCurrentDir(){var p=window.location.pathname;return p.substring(0,p.lastIndexOf('/')+1)}
    function goToDetail(period){
        var dir=getCurrentDir();
        var targetUrl=dir+'S68绿色融资统计表.html?period='+period;
        var label = I18N.t('action_view') + ' - S68-' + period;
        if(window.parent!==window){
            window.parent.postMessage({type:'openPage',pageId:'s68-detail-'+period,file:targetUrl,label:label},'*');
        }else{window.location.href=targetUrl}
    }
    function downloadReport(q){
        var confirmMsg = formatT('confirm_download', [q]);
        var okMsg = formatT('download_ok', [q]);
        if(confirm(confirmMsg)){
            alert(okMsg);
        }
    }

    // ==================== 初始化渲染 ====================
    renderTable();
    renderStatsBar();
</script>
</body>
</html>
