    // ==================== 模拟数据生成（供演示用） ====================
    function genMockValue(seq, min, max) {
        // 使用确定性伪随机，保证同一条目每次渲染一致
        var seed = seq * 137 + 42;
        var rand = ((seed * 1103515245 + 12345) & 0x7fffffff) / 0x7fffffff;
        var val = min + rand * (max - min);
        return val;
    }

    function getRowClass(level) {
        if (level === 'total') return 'total-row';
        if (level === 'section') return 'total-row';
        if (level === 'l1') return 'sec-header';
        if (level === 'l2') return 'sub-header';
        if (level === 'appendix-header') return 'appendix-header';
        if (level === 'appendix-item') return 'appendix-item';
        return '';
    }

    function getIndentClass(level) {
        if (level === 'l3') return 'indent-2';
        if (level === 'appendix-item') return 'indent-1';
        return '';
    }

    function getEmpty() { return ''; }

    function formatNum(val) {
        if (val === 0 || val === undefined) return '';
        return val.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    }

    function renderTable() {
        var tbody = document.getElementById('tableBody');
        var html = '';
        var period = getUrlParam('period') || '2025Q2';

        for (var i = 0; i < s68Data.length; i++) {
            var r = s68Data[i];
            var rowClass = getRowClass(r.level);
            var indentClass = getIndentClass(r.level);
            var classStr = (rowClass + ' ' + indentClass).trim();

            // 是否为汇总行或章节标题行（非明细，不填数值）
            var isSummary = (r.level === 'total' || r.level === 'section' || r.level === 'l1' || r.level === 'l2' || r.level === 'appendix-header');

            var balance = isSummary ? getEmpty() : formatNum(genMockValue(r.seq, 50, 5000));
            var households = isSummary ? getEmpty() : Math.floor(genMockValue(r.seq, 1, 30)).toString();
            var npl = isSummary ? getEmpty() : (genMockValue(r.seq, 0, 1) > 0.85 ? formatNum(genMockValue(r.seq, 10, 500)) : '0.00');
            var annualLoan = isSummary ? getEmpty() : formatNum(genMockValue(r.seq, 20, 3000));
            var annualInterest = isSummary ? getEmpty() : formatNum(genMockValue(r.seq, 1, 200));

            html += '<tr class="' + classStr + '" data-tree-lvl="' + (r.level==='total'||r.level==='section'?'0':r.level==='l1'?'1':r.level==='l2'?'2':r.level==='l3'?'3':r.level==='appendix-header'?'0':r.level==='appendix-item'?'3':'') + '">';
            html += '<td class="col-seq">' + r.seq + '</td>';
            html += '<td>' + r.name + '</td>';
            html += '<td class="num">' + balance + '</td>';

    // ==================== 读取URL参数 ====================
    function getUrlParam(name){
        var m = location.search.match(new RegExp('[?&]'+name+'=([^&]*)'));
        return m ? decodeURIComponent(m[1]) : null;
    }

    // ==================== 真树状展开/收起 ====================
    function initTree(){
        var rows=document.querySelectorAll('#tableBody tr[data-tree-lvl]');
        var stack=[];
        rows.forEach(function(row){
            var lvl=parseInt(row.getAttribute('data-tree-lvl')||'0');
            while(stack.length>0&&parseInt(stack[stack.length-1].getAttribute('data-tree-lvl'))>=lvl){stack.pop();}
            if(stack.length>0&&lvl>0){
                var pid=stack[stack.length-1].getAttribute('data-tree-row-id');
                if(pid){row.setAttribute('data-tree-parent-id',pid);row.classList.add('tree-child');}
            }
            if(lvl<=2&&!row.getAttribute('data-tree-row-id')){
                row.setAttribute('data-tree-row-id','ts-'+Math.random().toString(36).substr(2,8));
                stack.push(row);
            }
        });
        rows.forEach(function(row){
            var hasChild=false,rid=row.getAttribute('data-tree-row-id');
            if(!rid)return;
            var next=row.nextElementSibling;
            while(next){
                if(next.getAttribute('data-tree-parent-id')===rid){hasChild=true;break;}
                var nlvl=parseInt(next.getAttribute('data-tree-lvl')||'-1');
                if(nlvl>=0&&nlvl<=parseInt(row.getAttribute('data-tree-lvl')||'0'))break;
                next=next.nextElementSibling;
            }
            if(!hasChild)return;
            var td=row.querySelector('td:nth-child(2)');
            if(!td)return;
            var span=document.createElement('span');
            span.className='tree-toggle';
            span.setAttribute('data-expanded','1');
            span.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8"><polyline points="6 9 12 15 18 9"/></svg>';
            span.style.cssText='display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;margin-right:2px;cursor:pointer;border-radius:3px;transition:all .15s;flex-shrink:0;color:var(--brand-500);';
            span.onmouseenter=function(){this.style.background='rgba(42,102,194,0.12)';};
            span.onmouseleave=function(){this.style.background='transparent';};
            span.onclick=function(e){e.stopPropagation();toggleTree(row);};
            td.insertBefore(span,td.firstChild);
        });
    }
    function toggleTree(row){
        var toggle=row.querySelector('.tree-toggle');
        if(!toggle)return;
        var expanded=toggle.getAttribute('data-expanded')==='1';
        var rid=row.getAttribute('data-tree-row-id');
        function setChildren(parentId,show){
            document.querySelectorAll('#tableBody tr[data-tree-parent-id="'+parentId+'"]').forEach(function(r){
                r.style.display=show?'':'none';
                if(!show){var cid=r.getAttribute('data-tree-row-id');if(cid)setChildren(cid,false);}
                if(show){var ct=r.querySelector('.tree-toggle');var cid2=r.getAttribute('data-tree-row-id');if(ct&&ct.getAttribute('data-expanded')==='1'&&cid2)setChildren(cid2,true);}
            });
        }
        setChildren(rid,!expanded);
        toggle.setAttribute('data-expanded',expanded?'0':'1');
        toggle.innerHTML=expanded?'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8"><polyline points="9 6 15 12 9 18"/></svg>':'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8"><polyline points="6 9 12 15 18 9"/></svg>';
    }

    // ==================== 初始化渲染 ====================
    var urlPeriod = getUrlParam('period') || '2025Q2';
    renderTable();
    setTimeout(initTree,200);
</script>
