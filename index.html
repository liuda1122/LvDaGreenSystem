<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>至简绿达智能体系统 · 菜单导航</title>
    <style>
        :root {
            --brand-50: #E8F0FB;
            --brand-100: #D1DFF4;
            --brand-300: #6E97D6;
            --brand-500: #2A66C2;
            --brand-700: #143F8F;
            --brand-900: #01256A;
            --green-50: #ECFDF5;
            --green-500: #10B981;
            --green-700: #047857;
            --success: #10B981;
            --success-bg: #ECFDF5;
            --success-border: #A7F3D0;
            --warning: #D97706;
            --warning-bg: #FFFBEB;
            --warning-border: #FDE68A;
            --danger: #DC2626;
            --danger-bg: #FEF2F2;
            --danger-border: #FECACA;
            --info: #2A66C2;
            --info-bg: #E8F0FB;
            --info-border: #D1DFF4;
            --ink-900: #0F172A;
            --ink-800: #1E293B;
            --ink-600: #475569;
            --ink-500: #64748B;
            --ink-400: #94A3B8;
            --ink-300: #CBD5E1;
            --line-200: #E2E8F0;
            --bg-muted: #F1F5F9;
            --bg-subtle: #F8FAFC;
            --white: #FFFFFF;
            --radius-sm: 4px;
            --radius-md: 6px;
            --radius-lg: 8px;
            --radius-xl: 12px;
            --radius-2xl: 16px;
            --radius-full: 9999px;
            --shadow-xs: 0 1px 2px rgba(15, 23, 42, .04);
            --shadow-sm: 0 1px 3px rgba(15, 23, 42, .06), 0 1px 2px rgba(15, 23, 42, .04);
            --shadow-md: 0 4px 12px rgba(15, 23, 42, .08), 0 2px 4px rgba(15, 23, 42, .04);
            --s-1: 4px;
            --s-2: 8px;
            --s-3: 12px;
            --s-4: 16px;
            --s-5: 20px;
            --s-6: 24px;
            --s-8: 32px;
            --font-sans: 'PingFang SC', 'Microsoft YaHei', 'Inter', system-ui, sans-serif;
            --font-num: 'Inter', 'SF Pro Display', system-ui, sans-serif;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-sans);
            color: var(--ink-800);
            background: var(--bg-subtle);
            font-size: 14px;
            line-height: 1.57;
            -webkit-font-smoothing: antialiased;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        html {
            height: 100%;
        }

        /* ===== 顶部导航 ===== */
        .topbar {
            height: 54px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 14px;
            background: var(--white);
            border-bottom: 1px solid var(--line-200);
            flex-shrink: 0;
            z-index: 10;
        }

        .topbar-brand-icon {
            width: 30px;
            height: 30px;
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--brand-500);
            flex-shrink: 0;
        }

        .topbar-brand {
            font-size: 17px;
            font-weight: 700;
            white-space: nowrap;
            color: var(--brand-900);
        }

        .topbar-divider {
            width: 1px;
            height: 22px;
            background: var(--line-200);
        }

        .topbar-badge {
            padding: 5px 10px;
            font-size: 12px;
            color: var(--brand-700);
            font-weight: 600;
            background: var(--brand-50);
            border-radius: 20px;
        }

        .topbar-spacer { flex: 1; }

        .role-label-text {
            font-size: 12px;
            color: var(--ink-500);
            margin-right: 8px;
        }

        .role-select {
            padding: 4px 8px;
            border: 1px solid var(--line-200);
            border-radius: var(--radius-md);
            font-size: 12px;
            color: var(--ink-600);
            background: var(--white);
            cursor: pointer;
            font-family: inherit;
        }
        .role-select:focus {
            outline: none;
            border-color: var(--brand-500);
        }

        .user-label {
            font-size: 12px;
            color: var(--ink-500);
        }

        .user-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--brand-500);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            flex-shrink: 0;
        }

        /* ===== 侧边栏 ===== */
        .sidebar {
            width: 232px;
            flex-shrink: 0;
            background: var(--white);
            border-right: 1px solid var(--line-200);
            display: flex;
            flex-direction: column;
            transition: width .25s ease;
            overflow: hidden;
        }
        .sidebar.collapsed {
            width: 0;
            min-width: 0;
            border-right: none;
        }
        .sidebar-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 12px 0;
        }

        .custom-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
        .custom-scroll::-webkit-scrollbar-thumb:hover {
            background: var(--brand-500);
        }

        /* ===== 菜单样式 ===== */
        .menu-l1 {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 10px;
            font-size: 13px;
            color: #334155;
            cursor: pointer;
            border-radius: 8px;
            margin: 0 8px 2px;
            transition: all .2s;
            background: var(--bg-subtle);
            user-select: none;
        }
        .menu-l1:hover {
            background: #EEF2F7;
            color: var(--brand-500);
        }
        .menu-l1.active {
            background: var(--brand-50);
            color: var(--brand-700);
            font-weight: 600;
        }
        .menu-l1.open .l1-arrow {
            transform: rotate(90deg);
            color: var(--brand-500);
        }
        .menu-l1 .l1-arrow {
            width: 13px;
            height: 13px;
            transition: transform .3s;
            color: var(--ink-400);
            flex-shrink: 0;
            margin-left: auto;
        }
        .menu-l1 .menu-icon {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            color: var(--ink-400);
        }
        .menu-l1:hover .menu-icon {
            color: var(--brand-500);
        }

        .submenu {
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            transition: max-height .35s, opacity .25s;
            position: relative;
            margin: 0 8px;
        }
        .menu-l1.open+.submenu {
            max-height: 600px;
            opacity: 1;
            margin: 2px 8px 6px;
        }
        .submenu::before {
            content: '';
            position: absolute;
            left: 20px;
            top: 4px;
            bottom: 4px;
            width: 1px;
            background: var(--line-200);
        }

        .menu-l2 {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px 6px 34px;
            font-size: 12px;
            color: #475569;
            cursor: pointer;
            border-radius: 6px;
            margin: 2px 0;
            transition: all .2s;
            position: relative;
        }
        .menu-l2:hover {
            background: var(--bg-muted);
            color: var(--brand-500);
        }
        .menu-l2.active {
            background: var(--brand-50);
            color: var(--brand-700);
            font-weight: 500;
        }
        .menu-l2.active::before {
            content: '';
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--brand-700);
        }
        .menu-l2 .l2-icon {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
            color: var(--ink-400);
        }
        .menu-l2:hover .l2-icon {
            color: var(--brand-500);
        }

        .menu-divider {
            height: 1px;
            background: var(--line-200);
            margin: 8px 16px;
        }

        /* ===== 内容区 ===== */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg-subtle);
        }

        /* ===== 标签栏 ===== */
        .tab-bar {
            height: 40px;
            display: flex;
            align-items: center;
            padding: 0 12px;
            background: var(--white);
            border-bottom: 1px solid var(--line-200);
            flex-shrink: 0;
        }
        .tab-bar-inner {
            display: flex;
            align-items: center;
            gap: 0;
            flex: 1;
            overflow-x: auto;
            height: 100%;
        }
        .page-tab {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 14px;
            height: 100%;
            font-size: 12px;
            color: var(--ink-500);
            cursor: pointer;
            position: relative;
            transition: all .2s;
            white-space: nowrap;
            user-select: none;
            flex-shrink: 0;
        }
        .page-tab:hover {
            color: var(--brand-500);
        }
        .page-tab.active {
            color: var(--brand-500);
            font-weight: 500;
        }
        .page-tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 12px;
            right: 12px;
            height: 2px;
            background: var(--brand-500);
            border-radius: 2px 2px 0 0;
        }
        .page-tab .tab-close {
            width: 14px;
            height: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 3px;
            opacity: 0;
            transition: all .15s;
            flex-shrink: 0;
        }
        .page-tab:hover .tab-close {
            opacity: .4;
        }
        .page-tab .tab-close:hover {
            opacity: 1;
            background: var(--line-200);
        }

        /* ===== iframe 容器 ===== */
        .iframe-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            min-height: 0;
        }
        .iframe-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }
        .iframe-container iframe.active {
            display: block;
        }

        /* ===== 侧边栏折叠按钮 ===== */
        .sidebar-toggle {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: var(--radius-md);
            color: var(--ink-400);
            transition: all .2s;
            flex-shrink: 0;
            margin: 0 4px;
        }
        .sidebar-toggle:hover {
            background: var(--bg-muted);
            color: var(--brand-500);
        }

        /* ===== 动画 ===== */
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .spinner {
            width: 28px;
            height: 28px;
            border: 3px solid var(--line-200);
            border-top-color: var(--brand-500);
            border-radius: 50%;
            animation: spin .8s linear infinite;
        }

        .leaf-sway {
            animation: leaf-sway 3.5s ease-in-out infinite;
            transform-origin: 50% 90%;
        }
        @keyframes leaf-sway {
            0%,
            100% {
                transform: rotate(-3deg);
            }
            50% {
                transform: rotate(3deg);
            }
        }
        @keyframes breathe {
            0%,
            100% {
                opacity: .4;
                transform: scale(1);
            }
            50% {
                opacity: .7;
                transform: scale(1.08);
            }
        }
        .breathe {
            animation: breathe 4s ease-in-out infinite;
        }
        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }
            100% {
                background-position: 200% 0;
            }
        }
        .shimmer-text {
            background: linear-gradient(90deg, var(--brand-900) 0%, var(--brand-500) 40%, var(--green-500) 60%, var(--brand-900) 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 6s linear infinite;
        }

        /* ===== 语言切换按钮 ===== */
        .lang-toggle {
            display: flex;
            align-items: center;
            gap: 3px;
            padding: 4px 10px;
            font-size: 12px;
            font-weight: 600;
            color: var(--brand-700);
            background: var(--brand-50);
            border: 1px solid var(--brand-100);
            border-radius: var(--radius-full);
            cursor: pointer;
            user-select: none;
            transition: all .2s;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .lang-toggle:hover {
            background: var(--brand-100);
            border-color: var(--brand-300);
        }
        .lang-toggle .lang-active {
            background: var(--brand-500);
            color: #fff;
            padding: 2px 7px;
            border-radius: var(--radius-full);
            transition: all .2s;
        }
        .lang-toggle .lang-inactive {
            padding: 2px 4px;
            transition: all .2s;
        }
    </style>
</head>
<body>

    <!-- ===== 顶部导航栏 ===== -->
    <header class="topbar">
        <div class="sidebar-toggle" onclick="toggleSidebar()" title="收起/展开菜单">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="6" x2="21" y2="6"/>
                <line x1="3" y1="12" x2="21" y2="12"/>
                <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
        </div>
        <div style="display:flex;align-items:center;gap:10px;">
            <div class="topbar-brand-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" style="width:16px;height:16px;">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M12 6v6l4 2"/>
                </svg>
            </div>
            <div>
                <div id="sysBrandName" class="topbar-brand">至简绿达智能体系统</div>
            </div>
        </div>
        <div class="topbar-divider"></div>
        <span id="sysBadge" class="topbar-badge">绿色识别业务管理</span>
        <div class="topbar-spacer"></div>
        <span class="role-label-text">当前角色</span>
        <select class="role-select" id="roleSelect" onchange="switchRole(this.value)">
            <option value="总行管理员">总行管理员</option>
            <option value="总行公司复核">总行公司复核</option>
            <option value="总行公司初审">总行公司初审</option>
            <option value="公司绿金联系人">公司绿金联系人</option>
            <option value="客户经理">客户经理</option>
        </select>
        <span id="sysUserLabel" class="user-label">张管理 / admin_001</span>
        <div class="user-avatar" id="userAvatar">张</div>
        <button class="lang-toggle" id="langToggle" onclick="switchLang()" title="切换语言 / Switch Language">
            <span class="lang-active">中</span><span class="lang-inactive">En</span>
        </button>
    </header>

    <!-- ===== 主体 ===== -->
    <div style="display:flex;flex:1;overflow:hidden;min-height:0;">

        <!-- 侧边栏 -->
        <aside class="sidebar custom-scroll" id="sidebar">
            <div class="sidebar-scroll" id="sidebarScroll"></div>
        </aside>

        <!-- 内容区 -->
        <main class="content-area">
            <!-- 标签栏 -->
            <div class="tab-bar">
                <div class="tab-bar-inner custom-scroll" id="tabBar"></div>
            </div>
            <!-- iframe 容器 -->
            <div class="iframe-container" id="iframeContainer">
                <!-- 欢迎页 -->
                <div id="welcomePage" style="display:flex;align-items:center;justify-content:center;height:100%;">
                    <div style="text-align:center;">
                        <div style="font-size:48px;margin-bottom:16px;">🌿</div>
                        <div id="welcomeTitle" style="font-size:18px;font-weight:600;color:var(--ink-800);margin-bottom:8px;">绿色识别业务管理</div>
                        <div id="welcomeSub" style="font-size:13px;color:var(--ink-500);line-height:1.8;">请从左侧菜单选择功能模块<br/>支持多标签页同时打开</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // ==================== 国际化 (i18n) ====================
        var currentLang = 'zh';

        var i18n = {
            // ---- 系统 UI ----
            pageTitle:      { zh:'至简绿达智能体系统 · 绿色识别业务管理',    en:'ZhiJian LvDa Agent · Green Identification' },
            sysBrandName:   { zh:'至简绿达智能体系统',               en:'ZhiJian LvDa Agent' },
            sysBadge:       { zh:'绿色识别业务管理',                     en:'Green Identification Mgmt' },
            sysUserLabel:   { zh:'张管理 / admin_001',                   en:'Zhang / admin_001' },
            welcomeTitle:   { zh:'绿色识别业务管理',               en:'Green Identification Management' },
            welcomeSub:     { zh:'请从左侧菜单选择功能模块<br/>支持多标签页同时打开', en:'Select a module from the left menu<br/>Multi-tab browsing supported' },
            toggleTitle:    { zh:'切换语言 / Switch Language',   en:'切换语言 / Switch Language' },

            // ---- 一级菜单 ----
            'menu-green-marketing':        { zh:'潜在客户业务营销',  en:'Potential Client Marketing' },
            'menu-zero-carbon-library':    { zh:'潜在项目业务营销',  en:'Potential Project Marketing' },
            'menu-green-business-analysis': { zh:'绿色业务分析',      en:'Green Business Analysis' },
            'menu-green-identify':         { zh:'绿色识别业务管理',  en:'Green Identification Mgmt' },

            // ---- 二级菜单 ----
            'menu-potential-clients':           { zh:'绿色潜在客户业务营销',         en:'Green Potential Clients' },
            'menu-transition-clients':          { zh:'转型潜在客户业务营销',         en:'Transition Client Marketing' },
            'menu-client-mkt-process':          { zh:'潜在客户营销过程管理',         en:'Client Marketing Process' },
            'menu-zc-potential-project-mkt':    { zh:'潜在项目业务营销',             en:'Potential Project Marketing' },
            'menu-zc-project-mkt-process':      { zh:'项目营销过程管理',             en:'Project Marketing Process' },
            'menu-green-industry-map':          { zh:'绿色产业地图',                 en:'Green Industry Map' },
            'menu-bank-green-portrait':         { zh:'绿色金融业务画像',               en:'Green Finance Business Profile' },
            'menu-project-green-identify':      { zh:'项目绿色识别',                 en:'Project Green Identification' },
            'menu-zc-env-benefit':              { zh:'环境效益测算',                 en:'Environmental Benefit Calc' },
            'menu-contract-identify':           { zh:'合同绿色认定',                 en:'Contract Green Identification' },
            'menu-a3327-report':                { zh:'绿色贷款统计报送',             en:'Green Loan Statistics Report' },
            'menu-loan-pre-identify':           { zh:'贷款预识别',                   en:'Loan Pre-identification' }
        };

        function t(key) {
            var entry = i18n[key];
            if (!entry) return key;
            return entry[currentLang] || entry['zh'] || key;
        }

        // ==================== 角色管理 ====================
        var currentRole = '总行管理员';

        var roleUserMap = {
            '总行管理员':     { name: '张管理', id: 'admin_001' },
            '总行公司复核':   { name: '李复核', id: 'reviewer_002' },
            '总行公司初审':   { name: '王初审', id: 'reviewer_001' },
            '公司绿金联系人': { name: '赵绿金', id: 'green_001' },
            '客户经理':       { name: '陈经理', id: 'mgr_005' }
        };

        function updateUserInfo(role) {
            var user = roleUserMap[role];
            if (!user) return;
            document.getElementById('sysUserLabel').textContent = user.name + ' / ' + user.id;
            document.getElementById('userAvatar').textContent = user.name.charAt(0);
        }

        function switchRole(role) {
            currentRole = role;
            localStorage.setItem('lvda-role', role);
            updateUserInfo(role);
            document.getElementById('roleSelect').value = role;

            // 通知所有已打开的 iframe 角色变化
            Object.keys(tabIframes).forEach(function(id) {
                try {
                    tabIframes[id].contentWindow.postMessage({ type: 'roleChange', role: role }, '*');
                } catch (e) {}
            });

            // 通知父页面角色变化
            if (window.parent && window.parent !== window) {
                try {
                    window.parent.postMessage({ type: 'roleChange', role: role }, '*');
                } catch (e) {}
            }
        }

        // ==================== 语言切换 ====================
        function switchLang() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            localStorage.setItem('lvda-lang', currentLang);
            applyLang();
            // 语言切换后恢复当前角色的用户信息
            updateUserInfo(currentRole);
        }

        function applyLang() {
            // 1. 页面标题
            document.title = t('pageTitle');

            // 2. 顶栏静态文本
            var brandNameEl = document.getElementById('sysBrandName');
            if (brandNameEl) brandNameEl.textContent = t('sysBrandName');
            var badgeEl = document.getElementById('sysBadge');
            if (badgeEl) badgeEl.textContent = t('sysBadge');

            // 3. 欢迎页
            var welcomeTitleEl = document.getElementById('welcomeTitle');
            if (welcomeTitleEl) welcomeTitleEl.textContent = t('welcomeTitle');
            var welcomeSubEl = document.getElementById('welcomeSub');
            if (welcomeSubEl) welcomeSubEl.innerHTML = t('welcomeSub');

            // 4. 语言按钮样式
            var btn = document.getElementById('langToggle');
            if (btn) {
                if (currentLang === 'zh') {
                    btn.innerHTML = '<span class="lang-active">中</span><span class="lang-inactive">En</span>';
                } else {
                    btn.innerHTML = '<span class="lang-inactive">中</span><span class="lang-active">En</span>';
                }
                btn.title = t('toggleTitle');
            }

            // 5. 重建侧边栏菜单
            buildSidebar();

            // 6. 更新标签栏（tab 文本来自菜单翻译 key）
            updateAllTabLabels();

            // 7. 通知所有 iframe 子页面切换语言
            notifyIframesLangChange();
        }

        function updateAllTabLabels() {
            // 更新 openTabs 中的 label 为翻译后的文本
            openTabs.forEach(function(tab) {
                var menuKey = 'menu-' + tab.id;
                var translated = t(menuKey);
                if (translated !== menuKey) {
                    tab.label = translated;
                }
            });
            renderTabs();

            // 更新侧边栏高亮
            document.querySelectorAll('.menu-l2').forEach(function(m) { m.classList.remove('active'); });
            if (activeTabId) {
                var menuEl = document.querySelector('[data-page="' + activeTabId + '"]');
                if (menuEl) menuEl.classList.add('active');
            }
        }

        function notifyIframesLangChange() {
            Object.keys(tabIframes).forEach(function(id) {
                var iframe = tabIframes[id];
                if (iframe && iframe.contentWindow) {
                    iframe.contentWindow.postMessage({ type: 'langChange', lang: currentLang }, '*');
                }
            });
        }

        // ==================== SVG 图标 ====================
        var icons = {
            dash: '<svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="2" width="20" height="14" rx="2"/><line x1="8" y1="20" x2="16" y2="20"/><line x1="12" y1="16" x2="12" y2="20"/><rect x="4" y="6" width="3" height="6"/><rect x="9" y="8" width="3" height="4"/><rect x="14" y="4" width="3" height="8"/></svg>',
            project: '<svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/><path d="M8 12h8"/></svg>',
            'zero-carbon': '<svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></svg>',
            report: '<svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>',
            analytics: '<svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>'
        };

        // ==================== 菜单配置（label 现在通过 t('menu-' + id) 获取） ====================
        var menuConfig = [{
            type: 'l1',
            id: 'green-marketing',
            icon: 'dash',
            children: [
                { type: 'l2', id: 'green-industry-map',   file: '06GreenIndustryMap/绿色产业地图.html' },
                { type: 'l2', id: 'potential-clients',      file: '02PotentialClientList/绿色潜在客户清单.html' },
                { type: 'l2', id: 'transition-clients',     file: '02PotentialClientList/转型潜在客户业务营销.html' },
                { type: 'l2', id: 'client-mkt-process',      file: '02PotentialClientList/潜在客户营销过程管理.html' }
            ]
        }, {
            type: 'l1',
            id: 'zero-carbon-library',
            icon: 'zero-carbon',
            children: [
                { type: 'l2', id: 'zc-potential-project-mkt', file: '04ZeroCarbonProjectLibrary/潜在项目业务营销.html' },
                { type: 'l2', id: 'zc-project-mkt-process',   file: '04ZeroCarbonProjectLibrary/项目营销过程管理.html' }
            ]
        }, {
            type: 'l1',
            id: 'green-identify',
            icon: 'project',
            children: [
                { type: 'l2', id: 'bank-green-portrait',      file: '06GreenIndustryMap/行内绿色金融业务画像及客户画像分析.html' },
                { type: 'l2', id: 'project-green-identify', file: '01GreenIdentifyManagement/项目绿色认定.html' },
                { type: 'l2', id: 'zc-env-benefit',         file: '04ZeroCarbonProjectLibrary/环境效益测算.html' },
                { type: 'l2', id: 'contract-identify',       file: '01GreenIdentifyManagement/合同绿色认定.html' },
                { type: 'l2', id: 'loan-pre-identify',       file: '01GreenIdentifyManagement/loan-pre-identify.html' }
            ]
        }, {
            type: 'l1',
            id: 'a3327-report',
            icon: 'report',
            file: '05GreenLoanReport/A3327报表列表.html'
        }];

        // ==================== 渲染侧边栏 ====================
        function buildSidebar() {
            var html = '';
            menuConfig.forEach(function(section) {
                var labelKey = 'menu-' + section.id;
                // 叶子节点（无 children）：直接点击打开页面
                if (!section.children && section.file) {
                    html += '<div class="menu-l1" onclick="openPageDirect(\'' + section.id + '\',\'' + section.file + '\',\'' + t(labelKey) + '\')" data-menu="' + section.id + '" data-file="' + section.file + '" data-menu-key="' + labelKey + '">';
                    html += (icons[section.icon] || '') + '<span>' + t(labelKey) + '</span>';
                    html += '</div>';
                } else {
                    html += '<div class="menu-l1" onclick="toggleMenu(this)" data-menu="' + section.id + '">';
                    html += (icons[section.icon] || '') + '<span>' + t(labelKey) + '</span>';
                    html += '<svg class="l1-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>';
                    html += '</div><div class="submenu">';
                    section.children.forEach(function(item) {
                        var itemKey = 'menu-' + item.id;
                        var label = t(itemKey);
                        html += '<div class="menu-l2" data-page="' + item.id + '" data-file="' + item.file + '" data-menu-key="' + itemKey + '" onclick="openPage(this)">' + label + '</div>';
                    });
                    html += '</div>';
                }
            });
            document.getElementById('sidebarScroll').innerHTML = html;
        }

        // ==================== Tab 管理 ====================
        var openTabs = [];
        var activeTabId = null;
        var tabIframes = {};

        // ==================== 菜单点击 ====================
        function openPage(menuEl) {
            var pageId = menuEl.dataset.page;
            var file = menuEl.dataset.file;
            var label = menuEl.dataset.menuKey ? t(menuEl.dataset.menuKey) : menuEl.textContent.trim();

            // 更新侧边栏高亮
            document.querySelectorAll('.menu-l2').forEach(function(m) { m.classList.remove('active'); });
            menuEl.classList.add('active');

            // 展开上级菜单
            var l1 = menuEl.closest('.submenu').previousElementSibling;
            if (l1 && !l1.classList.contains('open')) {
                l1.classList.add('open');
            }

            // ============================================================
            //  关键修改：发送 postMessage 给父页面，让父页面打开业务页面
            // ============================================================
            if (window.parent && window.parent !== window) {
                // 当前页面在 iframe 中，通知父页面
                window.parent.postMessage({
                    type: 'openPage',
                    pageId: pageId,
                    file: file,
                    label: label
                }, '*');
            } else {
                // 当前页面独立打开（未嵌入 iframe），直接创建 iframe 显示
                // 这个分支用于您直接打开 01LvDaGreenSystem/index.html 时调试
                var existing = openTabs.find(function(t) { return t.id === pageId; });
                if (existing) {
                    switchTab(pageId);
                    return;
                }

                var tab = { id: pageId, label: label, file: file, menuKey: menuEl.dataset.menuKey };
                openTabs.push(tab);
                activeTabId = pageId;

                var separator = file.indexOf('?') === -1 ? '?' : '&';
                var iframe = document.createElement('iframe');
                iframe.src = file + separator + 'lang=' + currentLang;
                iframe.id = 'iframe-' + pageId;
                iframe.classList.add('active');
                iframe.setAttribute('data-lang', currentLang);
                tabIframes[pageId] = iframe;

                iframe.onload = function() {
                    try {
                        iframe.contentWindow.postMessage({ type: 'roleChange', role: currentRole }, '*');
                    } catch (e) {}
                };

                Object.keys(tabIframes).forEach(function(id) {
                    if (id !== pageId) tabIframes[id].classList.remove('active');
                });
                document.getElementById('welcomePage').style.display = 'none';
                document.getElementById('iframeContainer').appendChild(iframe);

                renderTabs();
            }
        }

        function openPageDirect(pageId, file, label) {
            // 同样优先使用 postMessage 通知父页面
            if (window.parent && window.parent !== window) {
                window.parent.postMessage({
                    type: 'openPage',
                    pageId: pageId,
                    file: file,
                    label: label
                }, '*');
                return;
            }

            // 独立打开时的备用逻辑
            var existing = openTabs.find(function(t) { return t.id === pageId; });
            if (existing) {
                switchTab(pageId);
                return;
            }

            var tab = { id: pageId, label: label, file: file, menuKey: null };
            openTabs.push(tab);
            activeTabId = pageId;

            var separator = file.indexOf('?') === -1 ? '?' : '&';
            var iframe = document.createElement('iframe');
            iframe.src = file + separator + 'lang=' + currentLang;
            iframe.id = 'iframe-' + pageId;
            iframe.classList.add('active');
            iframe.setAttribute('data-lang', currentLang);
            tabIframes[pageId] = iframe;

            iframe.onload = function() {
                try {
                    iframe.contentWindow.postMessage({ type: 'roleChange', role: currentRole }, '*');
                } catch (e) {}
            };

            Object.keys(tabIframes).forEach(function(id) {
                if (id !== pageId) tabIframes[id].classList.remove('active');
            });
            document.getElementById('welcomePage').style.display = 'none';
            document.getElementById('iframeContainer').appendChild(iframe);

            renderTabs();
        }

        function switchTab(pageId) {
            if (activeTabId === pageId) return;
            activeTabId = pageId;

            Object.keys(tabIframes).forEach(function(id) {
                tabIframes[id].classList.toggle('active', id === pageId);
            });

            document.querySelectorAll('.menu-l2').forEach(function(m) { m.classList.remove('active'); });
            var menuEl = document.querySelector('[data-page="' + pageId + '"]');
            if (menuEl) menuEl.classList.add('active');

            renderTabs();
        }

        function closeTab(pageId, e) {
            e.stopPropagation();
            var idx = openTabs.findIndex(function(t) { return t.id === pageId; });
            if (idx === -1) return;

            var iframe = tabIframes[pageId];
            if (iframe && iframe.parentNode) iframe.parentNode.removeChild(iframe);
            delete tabIframes[pageId];

            openTabs.splice(idx, 1);

            if (activeTabId === pageId) {
                if (openTabs.length > 0) {
                    var next = openTabs[Math.min(idx, openTabs.length - 1)];
                    activeTabId = next.id;
                    var nextIframe = tabIframes[activeTabId];
                    if (nextIframe) nextIframe.classList.add('active');
                } else {
                    activeTabId = null;
                    document.getElementById('welcomePage').style.display = 'flex';
                }
            }

            document.querySelectorAll('.menu-l2').forEach(function(m) { m.classList.remove('active'); });
            if (activeTabId) {
                var menuEl = document.querySelector('[data-page="' + activeTabId + '"]');
                if (menuEl) menuEl.classList.add('active');
            }

            renderTabs();
        }

        function renderTabs() {
            var tabBar = document.getElementById('tabBar');
            var html = '';
            openTabs.forEach(function(tab) {
                var isActive = tab.id === activeTabId;
                // 如果 tab 有 menuKey，实时翻译
                var displayLabel = tab.menuKey ? t(tab.menuKey) : tab.label;
                tab.label = displayLabel;
                html += '<div class="page-tab' + (isActive ? ' active' : '') + '" onclick="switchTab(\'' + tab.id + '\')" title="' + displayLabel + '">';
                html += '<span>' + displayLabel + '</span>';
                html += '<span class="tab-close" onclick="closeTab(\'' + tab.id + '\',event)"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg></span>';
                html += '</div>';
            });
            tabBar.innerHTML = html;
        }

        // ==================== 菜单折叠 ====================
        function toggleMenu(el) {
            var wasOpen = el.classList.contains('open');
            var allL1 = document.querySelectorAll('.menu-l1');
            allL1.forEach(function(m) {
                if (m !== el) m.classList.remove('open');
            });
            if (wasOpen) {
                el.classList.remove('open');
            } else {
                el.classList.add('open');
            }
        }

        // ==================== 侧边栏收起 ====================
        function toggleSidebar() {
            var sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('collapsed');
        }

        // ==================== 初始化语言 ====================
        applyLang();

        // ==================== 初始化角色 ====================
        (function() {
            var savedRole = localStorage.getItem('lvda-role');
            if (savedRole && roleUserMap[savedRole]) {
                currentRole = savedRole;
                document.getElementById('roleSelect').value = savedRole;
            }
            updateUserInfo(currentRole);
        })();

        // ==================== 默认展开第一个菜单 ====================
        (function() {
            var firstL1 = document.querySelector('.menu-l1');
            if (firstL1) firstL1.classList.add('open');
        })();

        // ==================== 监听父页面消息 ====================
        window.addEventListener('message', function(e) {
            // 处理父页面语言切换
            if (e.data && e.data.type === 'langChange' && e.data.lang) {
                if (e.data.lang !== currentLang) {
                    currentLang = e.data.lang;
                    applyLang();
                }
                return;
            }

            // 处理子页面请求打开新页面
            if (e.data && e.data.type === 'openPage') {
                var pageId = e.data.pageId;
                var file = e.data.file;
                var label = e.data.label;

                var menuEl = document.querySelector('[data-page="' + pageId + '"]');
                if (menuEl) {
                    openPage(menuEl);
                } else {
                    openPageDirect(pageId, file, label);
                }
                return;
            }

            // 处理父页面角色切换
            if (e.data && e.data.type === 'roleChange' && e.data.role) {
                if (e.data.role !== currentRole && roleUserMap[e.data.role]) {
                    currentRole = e.data.role;
                    updateUserInfo(currentRole);
                    document.getElementById('roleSelect').value = currentRole;
                    localStorage.setItem('lvda-role', currentRole);
                }
                return;
            }

            // 处理子页面自适应高度
            if (e.data && e.data.type === 'resize' && e.data.height) {
                Object.keys(tabIframes).forEach(function(id) {
                    var f = tabIframes[id];
                    if (f && f.classList.contains('active') && f.contentWindow === e.source) {
                        f.style.height = e.data.height + 'px';
                    }
                });
            }
        });
    </script>

</body>
