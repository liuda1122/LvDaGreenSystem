<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>绿色产业地图</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{background:#F8FAFC;height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
        .img-container{width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:12px}
        .img-container img{max-width:100%;max-height:100%;object-fit:contain;border-radius:8px;box-shadow:0 4px 24px rgba(0,0,0,.08)}
        .placeholder{text-align:center;color:#94A3B8;font-size:14px}
        .placeholder .icon{font-size:64px;margin-bottom:16px}
    </style>
</head>
<body>
    <div class="img-container">
        <img src="../02PotentialClientList/绿色产业地图.png"
             alt="绿色产业地图"
             onerror="this.style.display='none';document.getElementById('placeholder').style.display='block';"
             style="max-width:100%;max-height:100%;object-fit:contain;">
        <div id="placeholder" class="placeholder" style="display:none;">
            <div class="icon">🗺️</div>
            <div style="font-size:18px;font-weight:600;color:#475569;margin-bottom:8px;">绿色产业地图</div>
            <div>全国绿色产业企业分布 · GIS可视化</div>
            <div style="margin-top:12px;font-size:12px;color:#94A3B8;">请将地图图片保存至：02PotentialClientList/绿色产业地图.png</div>
        </div>
    </div>
</body>
</html>
