<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>绿色金融业务画像</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../i18n.js"></script>
  <style>
    :root {
      --brand-50:#E8F0FB; --brand-500:#2A66C2; --brand-700:#143F8F;
      --green-50:#ECFDF5; --green-500:#10B981; --green-700:#047857;
      --red-500:#EF4444; --ink-900:#0F172A; --ink-800:#1E293B; --ink-600:#475569;
      --ink-500:#64748B; --ink-400:#94A3B8; --ink-300:#CBD5E1;
      --line-200:#E2E8F0; --bg-muted:#F1F5F9; --bg-subtle:#F8FAFC; --white:#FFFFFF;
      --radius-sm:4px; --radius-md:6px; --radius-lg:8px; --radius-xl:12px;
      --font-sans:'PingFang SC','Microsoft YaHei','Inter',system-ui,sans-serif;
      --font-num:'Inter','SF Pro Display',system-ui,sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font-sans);color:var(--ink-800);background:var(--bg-subtle);font-size:14px;line-height:1.57;height:100vh;overflow:hidden}
    .custom-scroll::-webkit-scrollbar{width:6px;height:6px}
    .custom-scroll::-webkit-scrollbar-track{background:transparent}
    .custom-scroll::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
    .btn{display:inline-flex;align-items:center;gap:6px;border-radius:var(--radius-md);font-family:inherit;font-weight:500;cursor:pointer;transition:all .15s;border:1px solid transparent;line-height:1;white-space:nowrap}
    .btn-sm{padding:6px 12px;font-size:12px;line-height:20px;height:28px}
    .btn-primary{background:var(--brand-500);color:#fff}.btn-primary:hover{background:var(--brand-700)}
    .btn-secondary{background:var(--white);color:var(--ink-800);border-color:var(--ink-300)}.btn-secondary:hover{border-color:var(--brand-500);color:var(--brand-500)}
    .btn-outline-brand{background:var(--white);color:var(--brand-500);border-color:#A3C2E8}.btn-outline-brand:hover{background:var(--brand-50);border-color:var(--brand-500)}
    .section-card{background:var(--white);border-radius:var(--radius-xl);border:1px solid var(--line-200);overflow:hidden;display:flex;flex-direction:column}
    .stat-card{background:var(--white);border-radius:var(--radius-xl);border:1px solid var(--line-200);padding:20px 24px;display:flex;flex-direction:column;gap:4px}
    .stat-label{font-size:13px;color:var(--ink-500);font-weight:500}
    .stat-value{font-size:28px;font-weight:700;color:var(--brand-700);font-family:var(--font-num);line-height:1.2}
    .stat-change{font-size:12px;font-weight:600}
    .stat-change.up{color:var(--green-700)}
    .filter-row{display:flex;flex-wrap:wrap;align-items:flex-end;gap:12px 16px}
    .filter-group{display:flex;flex-direction:column;gap:4px;min-width:140px}
    .filter-group label{font-size:12px;color:var(--ink-500);font-weight:500}
    .filter-group input,.filter-group select{padding:6px 10px;border:1px solid var(--line-200);border-radius:var(--radius-md);font-size:13px;background:var(--white);outline:none;height:32px;min-width:0}
    .filter-group input:focus,.filter-group select:focus{border-color:var(--brand-500)}
    .table-wrap{overflow:auto;flex:1;position:relative}
    .table-wrap table{width:100%;border-collapse:separate;border-spacing:0;font-size:13px;min-width:2200px}
    .table-wrap thead{position:sticky;top:0;z-index:10}
    .table-wrap th{background:var(--bg-muted);padding:10px 14px;text-align:left;font-weight:600;color:var(--ink-600);border-bottom:1px solid var(--line-200);white-space:nowrap;font-size:12px;text-transform:uppercase;letter-spacing:.3px}
    .table-wrap td{padding:10px 14px;border-bottom:1px solid var(--line-200);vertical-align:middle;white-space:nowrap}
    .table-wrap tbody tr:hover{background:var(--bg-subtle)}
  </style>
</head>
<body>
<div class="flex flex-col" style="height:100vh;background:var(--bg-subtle);">
  <div class="flex-1 overflow-hidden" style="padding:20px 24px 24px;">
    <!-- 统计卡片 -->

      <div class="stat-card">
        <div class="stat-label" data-i18n="card_balance">绿色贷款余额</div>
        <div class="stat-value">856,320<span style="font-size:14px;font-weight:400;color:var(--ink-500);"> 万元</span></div>
        <div class="stat-change up">▲ 18.7% <span style="font-weight:400;color:var(--ink-400);">较上年</span></div>
      </div>
      <div class="stat-card">
        <div class="stat-label" data-i18n="card_clients">绿色贷款企业客户数量</div>
        <div class="stat-value">128<span style="font-size:14px;font-weight:400;color:var(--ink-500);"> 家</span></div>
        <div class="stat-change up">▲ 12.3% <span style="font-weight:400;color:var(--ink-400);">较上年</span></div>
      </div>
    </div>

    <!-- 已认定绿色贷款明细 -->
    <div class="section-card" style="flex:1;min-height:0;">
      <!-- 筛选栏 -->
      <div style="padding:14px 24px;border-bottom:1px solid var(--line-200);background:var(--bg-subtle);flex-shrink:0;">
        <div class="filter-row">
          <div class="filter-group" style="min-width:200px;flex:1.5;"><label data-i18n="f_contract">合同信息</label><input type="text" data-i18n-placeholder="ph_contract" placeholder="请输入合同名称/编号"></div>
          <div class="filter-group" style="min-width:200px;flex:1.5;"><label data-i18n="f_client">企业信息</label><input type="text" data-i18n-placeholder="ph_client" placeholder="企业名称/编号/统一社会信用代码"></div>
          <div class="filter-group" style="min-width:160px;flex:1;"><label data-i18n="f_gf_cat">绿色金融分类（2025）</label><select><option data-i18n="opt_all">全部</option></select></div>
          <div class="filter-group" style="min-width:150px;flex:1;"><label data-i18n="f_branch">辖区分行</label><select><option data-i18n="opt_all">全部</option></select></div>
          <div style="display:flex;align-items:flex-end;gap:8px;padding-bottom:1px;">
            <button class="btn btn-primary btn-sm" data-i18n="btn_search">查询</button>
            <button class="btn btn-secondary btn-sm" data-i18n="btn_reset">重置</button>
          </div>
        </div>
      </div>

      <!-- 操作栏 -->
      <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 24px;border-bottom:1px solid var(--line-200);flex-shrink:0;">
        <div style="display:flex;gap:8px;">
          <button class="btn btn-secondary btn-sm" data-i18n="btn_export">导出数据</button>
        </div>
        <span style="font-size:14px;color:var(--ink-400);" id="totalCount">共 8 条</span>
      </div>

      <!-- 表格 -->
      <div class="table-wrap custom-scroll">
        <table>
          <thead>
            <tr>
              <th style="width:46px;text-align:center;" data-i18n="th_seq">序号</th>
              <th data-i18n="th_client_type">客户类型</th>
              <th data-i18n="th_client_code">客户编号</th>
              <th data-i18n="th_client_name">客户名称</th>
              <th data-i18n="th_contract_code">合同编号</th>
              <th data-i18n="th_biz_cat">业务品种大类</th>
              <th data-i18n="th_biz_type">业务品种</th>
              <th data-i18n="th_amount">合同金额（万元）</th>
              <th data-i18n="th_balance">合同余额（万元）</th>
              <th data-i18n="th_ratio">绿色贷款比例</th>
              <th data-i18n="th_industry">贷款投向行业</th>
              <th data-i18n="th_client_ind">客户国民经济行业分类</th>
              <th data-i18n="th_gf_cat">绿色金融分类（2025）</th>
              <th data-i18n="th_purpose">绿色融资用途</th>
              <th data-i18n="th_line">业务条线</th>
              <th data-i18n="th_status">合同状态</th>
              <th data-i18n="th_proj_code">项目代码</th>
              <th data-i18n="th_proj_name">项目名称</th>
              <th data-i18n="th_date">认定日期</th>
              <th data-i18n="th_host">主办机构</th>
              <th data-i18n="th_branch">辖区分行</th>
              <th data-i18n="th_mgr">主办经理/工号</th>
              <th data-i18n="th_update">最近更新时间</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>

      <!-- 分页 -->
      <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 24px;border-top:1px solid var(--line-200);flex-shrink:0;">
        <span style="font-size:14px;color:var(--ink-400);">共 8 条</span>
        <div style="display:flex;align-items:center;gap:4px;">
          <button class="btn btn-secondary btn-sm">‹</button>
          <span style="padding:4px 8px;background:var(--brand-500);color:#fff;border-radius:4px;font-size:14px;">1</span>
          <button class="btn btn-secondary btn-sm">›</button>
        </div>
      </div>
    </div>
  </div>
</div>
